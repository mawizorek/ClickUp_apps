<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Reports · Brain Config</title>
<style>
  :root {
    --bg: oklch(14% 0.01 260); --surface: oklch(18% 0.012 260); --surface-2: oklch(22% 0.012 260); --surface-3: oklch(25% 0.014 260);
    --text: oklch(90% 0.008 260); --text-dim: oklch(62% 0.008 260); --text-faint: oklch(50% 0.008 260);
    --accent: oklch(72% 0.14 260); --agent: oklch(70% 0.12 20); --border: oklch(24% 0.015 260);
    --doc: oklch(20% 0.008 260); --doc-rule: oklch(30% 0.012 260); --doc-border: oklch(34% 0.014 260);
    --med: oklch(75% 0.12 80); --med-bg: oklch(30% 0.06 80); --low: oklch(70% 0.09 260); --low-bg: oklch(28% 0.04 260);
    --done: oklch(72% 0.13 160); --done-bg: oklch(28% 0.06 160); --err: oklch(68% 0.16 25);
    --radius: 6px; --ac: var(--accent); --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; font-optical-sizing:auto; -webkit-font-smoothing:antialiased; min-height:100vh; padding:24px 16px; }
  h1,h2,h3 { letter-spacing:-0.01em; }
  .container { max-width:900px; margin:0 auto; }
  code { font-family:ui-monospace,"SF Mono",Menlo,monospace; }
  button { font:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
  .crumb { font-size:0.6875rem; color:var(--text-faint); margin-bottom:14px; display:flex; align-items:center; gap:6px; }
  .crumb a { color:var(--text-dim); } .crumb a:hover { color:var(--accent); text-decoration:none; } .crumb .sep { opacity:0.5; }
  .topbar { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .back { display:inline-flex; align-items:center; gap:5px; font-size:0.75rem; font-weight:600; color:var(--text-dim); padding:5px 11px 5px 8px; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); transition:all 150ms var(--ease); }
  .back:hover { color:var(--text); border-color:var(--accent); text-decoration:none; } .back i { width:13px; height:13px; }
  .kicker { font-size:0.6875rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-faint); font-weight:600; }
  header.home { margin-bottom:20px; } header.home h1 { font-size:1.5rem; font-weight:700; margin-bottom:4px; } header.home .sub { color:var(--text-dim); font-size:0.8125rem; max-width:60ch; }
  .tabs { display:flex; gap:8px; margin:16px 0 20px; }
  .tab { font-size:0.75rem; color:var(--text-dim); background:var(--surface); padding:6px 14px; border-radius:100px; border:1px solid transparent; transition:all 150ms var(--ease); font-variant-numeric:tabular-nums; }
  .tab:hover { background:var(--surface-2); } .tab.active { border-color:var(--accent); background:var(--surface-2); color:var(--accent); }
  .tab strong { color:var(--text); font-weight:600; } .tab.active strong { color:var(--accent); }
  .agent-list { display:flex; flex-direction:column; gap:1px; }
  .arow { display:grid; grid-template-columns:auto minmax(0,1fr) auto; gap:12px; align-items:center; width:100%; text-align:left; padding:12px 14px; background:var(--surface); border:1px solid transparent; border-radius:var(--radius); transition:all 150ms var(--ease); }
  .arow:hover { background:var(--surface-2); border-color:var(--agent); }
  .disc { width:34px; height:34px; border-radius:var(--radius); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.8125rem; font-weight:700; color:var(--agent); background:oklch(70% 0.12 20 / 0.14); }
  .arow-id { min-width:0; } .arow-id .nm { font-size:0.875rem; font-weight:650; display:flex; align-items:center; gap:8px; } .arow-id .rl { font-size:0.6875rem; color:var(--text-faint); } .arow-id .bl { font-size:0.75rem; color:var(--text-dim); margin-top:3px; line-height:1.4; overflow:hidden; text-overflow:ellipsis; }
  .arow-meta { text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:4px; white-space:nowrap; } .arow-meta .rc { font-size:0.6875rem; color:var(--text-dim); font-variant-numeric:tabular-nums; } .arow-meta .rc b { color:var(--text); font-weight:650; }
  .pill { font-size:0.625rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:2px 8px; border-radius:100px; white-space:nowrap; }
  .pill.adjust { color:var(--med); background:var(--med-bg); } .pill.solid { color:var(--done); background:var(--done-bg); } .pill.empty { color:var(--text-faint); background:var(--surface-3); }
  .feed { display:flex; flex-direction:column; gap:1px; }
  .frow { width:100%; text-align:left; display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center; background:var(--surface); border:1px solid transparent; border-radius:var(--radius); padding:10px 14px; transition:all 150ms var(--ease); }
  .frow:hover { background:var(--surface-2); border-color:var(--agent); }
  .fdisc { width:26px; height:26px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:0.6875rem; font-weight:700; color:var(--agent); background:oklch(70% 0.12 20 / 0.14); }
  .frow .fmid { min-width:0; } .frow .fmid .ft { font-size:0.8125rem; font-weight:600; } .frow .fmid .fs { font-size:0.6875rem; color:var(--text-faint); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .frow .fwhen { font-size:0.6875rem; color:var(--text-faint); text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .adetail-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; } .adetail-head .disc { width:44px; height:44px; font-size:1rem; } .adetail-head h1 { font-size:1.25rem; font-weight:700; } .adetail-head .rl { font-size:0.75rem; color:var(--text-faint); margin-top:2px; }
  .pager { margin-bottom:18px; } .pager-inner { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:6px; }
  .pg-arrow { width:36px; height:36px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:var(--text-dim); background:var(--surface-2); border:1px solid var(--border); transition:all 150ms var(--ease); flex-shrink:0; }
  .pg-arrow:hover:not(:disabled) { color:var(--text); border-color:var(--accent); } .pg-arrow:disabled { opacity:0.3; cursor:not-allowed; } .pg-arrow i { width:16px; height:16px; }
  .pg-center { flex:1; text-align:center; min-width:0; padding:0 4px; } .pg-center .pt { font-size:0.8125rem; font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .pg-center .pw { font-size:0.6875rem; color:var(--text-faint); font-variant-numeric:tabular-nums; margin-top:2px; }
  .dots { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:8px; } .dots .d { width:6px; height:6px; border-radius:50%; background:var(--surface-3); transition:all 150ms var(--ease); } .dots .d.on { background:var(--accent); transform:scale(1.3); } .dots .d.done { background:var(--done); opacity:0.6; }
  .allbtn { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; margin-top:10px; padding:8px; font-size:0.75rem; font-weight:600; color:var(--text-dim); background:transparent; border:1px solid var(--border); border-radius:5px; transition:all 150ms var(--ease); } .allbtn:hover { color:var(--text); border-color:var(--accent); } .allbtn i { width:14px; height:14px; }
  .solo-label { text-align:center; font-size:0.6875rem; color:var(--text-faint); font-variant-numeric:tabular-nums; padding:9px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); }
  #repslot { animation:fade .3s var(--ease); }
  .report-sheet { background:var(--doc); border:1px solid var(--doc-border); border-radius:var(--radius); padding:22px 22px 16px; max-width:680px; margin:0 auto; }
  @media (max-width:560px){ .report-sheet { padding:18px 15px 14px; } }
  .doc-mast { border-bottom:2px solid var(--doc-rule); padding-bottom:13px; margin-bottom:15px; }
  .doc-tag { display:inline-flex; align-items:center; gap:6px; font-size:0.5625rem; font-weight:700; text-transform:uppercase; letter-spacing:0.14em; color:var(--agent); margin-bottom:9px; } .doc-tag::before { content:""; width:6px; height:6px; border-radius:1px; background:var(--agent); transform:rotate(45deg); }
  .doc-title { font-family:ui-serif,"Iowan Old Style",Georgia,serif; font-size:1.35rem; font-weight:600; line-height:1.2; } .doc-byline { font-size:0.8125rem; color:var(--text-dim); margin-top:5px; font-weight:550; }
  .doc-metaline { display:flex; flex-wrap:wrap; gap:4px 16px; margin-top:9px; font-family:ui-monospace,Menlo,monospace; font-size:0.6875rem; color:var(--text-faint); } .doc-metaline .mk { color:var(--text-dim); }
  .doc-verdict { padding:13px 0; border-bottom:1px solid var(--doc-rule); } .doc-verdict .g { display:flex; align-items:baseline; gap:9px; flex-wrap:wrap; margin-bottom:7px; } .doc-verdict .g b { font-size:1rem; font-weight:700; } .doc-verdict p { font-size:0.8125rem; color:var(--text-dim); line-height:1.55; }
  .tally { display:flex; gap:6px; margin-top:11px; flex-wrap:wrap; } .chip { display:inline-flex; align-items:baseline; gap:5px; font-size:0.6875rem; font-weight:550; padding:4px 9px; border-radius:5px; background:var(--surface-2); color:var(--text-dim); } .chip b { font-size:0.8125rem; font-weight:700; font-variant-numeric:tabular-nums; } .chip.med b{color:var(--med);} .chip.low b{color:var(--low);} .chip.done b{color:var(--done);}
  .doc-h { display:flex; align-items:baseline; justify-content:space-between; gap:10px; font-size:0.6875rem; font-weight:700; letter-spacing:0.06em; color:var(--text-dim); text-transform:uppercase; padding-bottom:6px; margin:20px 0 2px; border-bottom:1px solid var(--doc-rule); } .doc-h .cnt { text-transform:none; letter-spacing:0; color:var(--text-faint); font-weight:600; font-variant-numeric:tabular-nums; }
  .df { padding:11px 0; border-bottom:1px solid var(--doc-rule); } .df:last-child { border-bottom:none; } .df-top { display:flex; align-items:center; gap:7px; margin-bottom:5px; flex-wrap:wrap; } .df-num { font-family:ui-monospace,Menlo,monospace; font-size:0.6875rem; font-weight:700; color:var(--text-faint); }
  .sev { font-size:0.5625rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; padding:2px 7px; border-radius:4px; } .sev.med{color:var(--med);background:var(--med-bg);} .sev.low{color:var(--low);background:var(--low-bg);} .sev.resolved{color:var(--done);background:var(--done-bg);}
  .df-cat { font-size:0.6875rem; color:var(--text-faint); font-weight:550; } .df-cat.fixed { margin-left:auto; color:var(--done); font-weight:600; display:inline-flex; align-items:center; gap:4px; } .df-cat.fixed i{width:12px;height:12px;}
  .df-body { font-size:0.8125rem; line-height:1.55; } .df-body code,.df-fix code { font-size:0.86em; color:var(--accent); background:var(--surface-2); padding:1px 5px; border-radius:3px; }
  .df-fix { margin-top:7px; font-size:0.75rem; color:var(--text-dim); display:flex; gap:7px; } .df-fix .k { color:var(--text-faint); font-weight:700; text-transform:uppercase; font-size:0.5625rem; letter-spacing:0.05em; padding-top:2px; flex-shrink:0; } .df-fix.done { color:var(--done); } .df-fix.done .k { color:var(--done); }
  .dt { margin-top:2px; } .dt-row { display:grid; grid-template-columns:1fr auto; gap:1px 12px; padding:8px 0; border-bottom:1px solid var(--doc-rule); } .dt-row:last-child { border-bottom:none; } .dt-row .nm { font-family:ui-monospace,Menlo,monospace; font-size:0.78rem; font-weight:600; } .dt-row .sz { font-size:0.75rem; color:var(--text-dim); font-variant-numeric:tabular-nums; text-align:right; } .dt-row .rd { grid-column:1/-1; font-size:0.6875rem; color:var(--text-faint); display:flex; align-items:center; gap:6px; margin-top:2px; } .dt-row.flag .rd { color:var(--med); }
  .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; } .dot.ok{background:var(--done);} .dot.no{background:var(--err);} .dot.na{background:var(--text-faint);}
  .dclean { margin-top:2px; } .dclean .r { display:flex; align-items:flex-start; gap:7px; font-size:0.78rem; color:var(--text-dim); padding:5px 0; } .dclean .r i { width:14px; height:14px; color:var(--done); flex-shrink:0; margin-top:2px; } .dclean .r code { font-size:0.86em; color:var(--text); }
  .dl { padding:10px 0; border-bottom:1px solid var(--doc-rule); } .dl:last-child { border-bottom:none; } .dl-top { display:flex; align-items:center; gap:7px; } .dl-name { font-size:0.8125rem; font-weight:650; } .dl-stat { margin-left:auto; font-size:0.5625rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:2px 7px; border-radius:4px; } .dl-stat.flag { color:var(--med); background:var(--med-bg); } .dl-stat.ok { color:var(--done); background:var(--done-bg); } .dl-body { font-size:0.78rem; color:var(--text-dim); line-height:1.5; margin-top:6px; }
  .doc-callout { margin-top:15px; padding:12px 14px; border:1px solid var(--med-bg); border-radius:5px; background:oklch(30% 0.06 80 / 0.25); } .doc-callout .ct { font-size:0.5625rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--med); font-weight:700; } .doc-callout .cb { font-size:0.8125rem; color:var(--text); margin-top:5px; line-height:1.5; }
  .doc-foot { margin-top:16px; padding-top:11px; border-top:2px solid var(--doc-rule); font-family:ui-monospace,Menlo,monospace; font-size:0.625rem; color:var(--text-faint); display:flex; justify-content:space-between; flex-wrap:wrap; gap:5px; }
  dialog { border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); padding:0; max-width:460px; width:92vw; box-shadow:0 24px 60px oklch(0 0 0 / .6); } dialog::backdrop { background:oklch(8% 0.01 260 / .72); }
  .sheet-head { display:flex; align-items:center; justify-content:space-between; padding:13px 15px; border-bottom:1px solid var(--border); } .sheet-head h3 { font-size:0.9375rem; font-weight:650; } .sheet-head .x { color:var(--text-faint); padding:4px; display:flex; } .sheet-head .x:hover{color:var(--text);} .sheet-head .x i{width:16px;height:16px;}
  .sheet-body { padding:10px; max-height:66vh; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
  .idxrow { width:100%; text-align:left; display:flex; align-items:center; gap:10px; padding:10px 11px; background:var(--surface-2); border:1px solid transparent; border-radius:5px; transition:all 150ms var(--ease); } .idxrow:hover { border-color:var(--accent); } .idxrow.current { border-color:var(--accent); background:oklch(72% 0.14 260 / 0.1); }
  .idxrow .marker { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; } .idxrow.past .marker { background:var(--text-faint); } .idxrow .im { flex:1; min-width:0; } .idxrow .im .it { font-size:0.8125rem; font-weight:600; display:flex; align-items:center; gap:6px; } .idxrow .im .iw { font-size:0.6875rem; color:var(--text-faint); margin-top:2px; font-variant-numeric:tabular-nums; } .idxrow .idelta { font-size:0.625rem; color:var(--text-faint); text-align:right; white-space:nowrap; }
  .latest-tag { font-size:0.5rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--accent); background:oklch(72% 0.14 260 / 0.15); padding:2px 6px; border-radius:3px; }
  .state { text-align:center; padding:40px 20px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); } .state i { width:24px; height:24px; color:var(--text-faint); } .state .t { font-size:0.875rem; font-weight:600; color:var(--text-dim); margin-top:10px; } .state .s { font-size:0.78rem; color:var(--text-faint); margin-top:5px; line-height:1.5; } .state .retry { margin-top:14px; padding:6px 14px; font-size:0.78rem; font-weight:600; color:var(--text); background:var(--surface-2); border:1px solid var(--border); border-radius:5px; }
  .skel { height:0.9rem; border-radius:4px; background:linear-gradient(90deg,var(--surface-2),var(--surface-3),var(--surface-2)); background-size:200% 100%; animation:sh 1.2s ease-in-out infinite; } @keyframes sh { from{background-position:200% 0;} to{background-position:-200% 0;} }
  footer { margin-top:34px; padding-top:16px; border-top:1px solid var(--border); font-size:0.6875rem; color:var(--text-faint); line-height:1.5; }
  @keyframes fade { from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:none;} } #app { animation:fade .3s var(--ease); }
</style>
</head>
<body>
  <div class="container">
    <div class="crumb"><a href="https://mawizorek.github.io/ClickUp_apps/brain-config/">Brain Config</a><span class="sep">/</span><span>Agent Reports</span></div>
    <div id="app"></div>
    <footer>A Brain Config surface. Reads each agent's report history from <code>brain-config/agents/&lt;agent&gt;/reports/</code>. Agents emit report data as JSON; this viewer renders it.</footer>
  </div>
  <dialog id="histSheet"></dialog>
<script>
const RAW="https://raw.githubusercontent.com/mawizorek/ClickUp_apps/main/";
const MANIFEST=RAW+"agent-reports/manifest.json";
const agIdxURL=id=>RAW+"brain-config/agents/"+id+"/reports/index.json";
const repURL=(id,file)=>RAW+"brain-config/agents/"+id+"/reports/"+file;
let AGENTS=[]; let VIEW={screen:'home',tab:'agents'}; let BOOT='loading';
const byId=id=>AGENTS.find(a=>a.id===id);
async function fetchJSON(u){ const r=await fetch(u,{cache:'no-store'}); if(!r.ok) throw new Error(r.status); return r.json(); }
function rel(iso){ const d=new Date(iso),m=Math.round((Date.now()-d)/60000); if(m<1)return 'just now'; if(m<60)return m+'m ago'; const h=Math.round(m/60); if(h<24)return h+'h ago'; return Math.round(h/24)+'d ago'; }
function fmt(iso){ const d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
async function boot(){ BOOT='loading'; render();
  try { const m=await fetchJSON(MANIFEST); AGENTS=m.agents;
    await Promise.all(AGENTS.map(async a=>{ try{ const idx=await fetchJSON(agIdxURL(a.id)); a.reports=idx.reports||[]; }catch(e){ a.reports=[]; } }));
    BOOT='ready'; }
  catch(e){ BOOT='error'; }
  render();
}
async function ensureReport(a,ri){ const e=a.reports[ri]; if(!e||e._loaded||e._loading)return; e._loading=true;
  try{ const full=await fetchJSON(repURL(a.id,e.file)); Object.assign(e,full); e._loaded=true; }catch(err){ e._error=true; } e._loading=false;
  if(VIEW.screen==='agent'&&VIEW.agent===a.id) render(); }
function go(v){ VIEW={...VIEW,...v}; render(); window.scrollTo(0,0); }
function render(){ const app=document.getElementById('app');
  if(BOOT==='loading'){ app.innerHTML=`<div class="state"><div class="skel" style="width:160px;margin:0 auto"></div><div class="t">Loading agents…</div></div>`; return; }
  if(BOOT==='error'){ app.innerHTML=`<div class="state"><i data-lucide="cloud-off"></i><div class="t">Couldn't reach the report data</div><div class="s">The report files may still be propagating. Give it a moment.</div><button class="retry" onclick="boot()">Retry</button></div>`; if(window.lucide)lucide.createIcons(); return; }
  if(VIEW.screen==='home') app.innerHTML=Home();
  else if(VIEW.screen==='agent') app.innerHTML=AgentDetail(byId(VIEW.agent));
  if(window.lucide) lucide.createIcons();
}
function Home(){ const total=AGENTS.reduce((s,a)=>s+a.reports.length,0); const at=VIEW.tab==='agents';
  return `<header class="home"><div class="kicker">Brain Config · Registry</div><h1>Agent Reports</h1>
    <div class="sub">Each agent files its reports here. Open an agent to read the latest, then page back through everything they've filed.</div></header>
    <div class="tabs"><button class="tab ${at?'active':''}" onclick="go({tab:'agents'})">Agents <strong>${AGENTS.length}</strong></button>
      <button class="tab ${!at?'active':''}" onclick="go({tab:'feed'})">All Reports <strong>${total}</strong></button></div>${at?AgentList():Feed()}`;
}
function AgentList(){ return `<div class="agent-list">${AGENTS.map(a=>{ const l=a.reports[0],n=a.reports.length;
  const meta=l?`<span class="rc"><b>${n}</b> report${n>1?'s':''} · ${rel(l.ts)}</span><span class="pill ${l.verdictPill}">${l.pillText}</span>`:`<span class="rc">no reports</span><span class="pill empty">awaiting</span>`;
  return `<button class="arow" onclick="go({screen:'agent',agent:'${a.id}',ri:0})">
    <div class="disc">${a.initials}</div>
    <div class="arow-id"><div class="nm">${a.name}</div><div class="rl">${a.role}</div><div class="bl">${a.blurb}</div></div>
    <div class="arow-meta">${meta}</div></button>`; }).join('')}</div>`; }
function Feed(){ const all=AGENTS.flatMap(a=>a.reports.map((r,i)=>({...r,agent:a,idx:i}))).sort((x,y)=>new Date(y.ts)-new Date(x.ts));
  if(!all.length) return `<div class="state"><i data-lucide="inbox"></i><div class="t">No reports filed yet</div></div>`;
  return `<div class="feed">${all.map(r=>`<button class="frow" onclick="go({screen:'agent',agent:'${r.agent.id}',ri:${r.idx}})">
    <div class="fdisc">${r.agent.initials}</div><div class="fmid"><div class="ft">${r.agent.name} · ${r.reportType}</div><div class="fs">${r.verdictWord} · ${r.target}</div></div>
    <div class="fwhen">${rel(r.ts)}</div></button>`).join('')}</div>`; }
function AgentDetail(a){ const head=`<div class="topbar"><button class="back" onclick="go({screen:'home'})"><i data-lucide="chevron-left"></i>Agents</button></div>
    <div class="adetail-head"><div class="disc">${a.initials}</div><div><h1>${a.name}</h1><div class="rl">${a.role}</div></div></div>`;
  if(!a.reports.length) return head+`<div class="state"><i data-lucide="file-clock"></i><div class="t">No reports filed yet</div><div class="s">${a.name} hasn't run since reporting went live. Their report browser will populate here on first file.</div></div>`;
  const ri=Math.min(VIEW.ri??0,a.reports.length-1),r=a.reports[ri],n=a.reports.length,newer=ri>0,older=ri<n-1;
  let pager; if(n===1){ pager=`<div class="pager"><div class="solo-label">Only report on file · ${fmt(r.ts)}</div></div>`; }
  else { pager=`<div class="pager"><div class="pager-inner">
      <button class="pg-arrow" ${older?'':'disabled'} onclick="go({ri:${ri+1}})" aria-label="Older report"><i data-lucide="chevron-left"></i></button>
      <div class="pg-center"><div class="pt">${ri===0?'Latest report':'Report '+(ri+1)+' of '+n}</div><div class="pw">${fmt(r.ts)}</div></div>
      <button class="pg-arrow" ${newer?'':'disabled'} onclick="go({ri:${ri-1}})" aria-label="Newer report"><i data-lucide="chevron-right"></i></button></div>
      <div class="dots">${a.reports.map((rr,i)=>`<span class="d ${i===ri?'on':(i<ri?'':'done')}"></span>`).join('')}</div>
      <button class="allbtn" onclick="openHist('${a.id}',${ri})"><i data-lucide="list"></i>View all ${n} reports</button></div>`; }
  let doc; if(r._loaded) doc=ReportDoc(a,r); else if(r._error) doc=`<div class="state"><i data-lucide="file-x"></i><div class="t">Couldn't load this report</div></div>`; else { ensureReport(a,ri); doc=LoadingDoc(a,r); }
  return head+pager+`<div id="repslot">${doc}</div>`;
}
function LoadingDoc(a,r){ return `<div class="report-sheet"><div class="doc-mast"><div class="doc-tag">Report</div>
    <div class="doc-title">${r.reportType}</div><div class="doc-byline">${a.name} · ${a.role}</div></div>
    <div class="skel" style="width:100%;height:3rem;margin:12px 0"></div><div class="skel" style="width:80%;margin:8px 0"></div><div class="skel" style="width:90%;margin:8px 0"></div></div>`; }
function openHist(aid,cur){ const a=byId(aid),s=document.getElementById('histSheet');
  s.innerHTML=`<div class="sheet-head"><h3>${a.name} · history</h3><button class="x" onclick="document.getElementById('histSheet').close()"><i data-lucide="x"></i></button></div>
    <div class="sheet-body">${a.reports.map((r,i)=>`<button class="idxrow ${i===cur?'current':(i===0?'':'past')}" onclick="document.getElementById('histSheet').close(); go({screen:'agent',agent:'${a.id}',ri:${i}})">
      <span class="marker"></span><div class="im"><div class="it">${r.reportType} ${i===0?'<span class="latest-tag">Latest</span>':''}</div><div class="iw">${fmt(r.ts)} · ${r.verdictWord}</div></div>
      <div class="idelta">${r.delta||''}</div></button>`).join('')}</div>`;
  s.showModal(); if(window.lucide) lucide.createIcons(); }
function ReportDoc(a,r){ const mast=`<div class="doc-mast"><div class="doc-tag">Report</div><div class="doc-title">${r.reportType}</div>
    <div class="doc-byline">${a.name} · ${a.role}</div>
    <div class="doc-metaline"><span><span class="mk">Subject</span> ${r.target}</span><span><span class="mk">Filed</span> ${fmt(r.ts)}</span></div></div>`;
  const verdict=`<div class="doc-verdict"><div class="g"><b>${r.verdictWord}</b><span class="pill ${r.verdictPill}">${r.pillText}</span></div>
    <p>${r.summary}</p><div class="tally">${r.tally.map(t=>`<span class="chip ${t.c}"><b>${t.n}</b> ${t.l}</span>`).join('')}</div></div>`;
  const body=r.type==='audit'?AuditDoc(r):r.type==='review'?ReviewDoc(r):'';
  const foot=`<div class="doc-foot"><span>Filed by ${a.name}</span><span>report ${r.id}</span></div>`;
  return `<div class="report-sheet">${mast}${verdict}${body}${foot}</div>`; }
function AuditDoc(r){ return `<div class="doc-h">Findings <span class="cnt">${r.findings.length}</span></div>
    ${r.findings.map(f=>`<div class="df"><div class="df-top"><span class="df-num">${f.num}</span><span class="sev ${f.sev}">${f.sev==='resolved'?'Fixed':f.sev==='med'?'Medium':'Low'}</span>
      <span class="df-cat">${f.cat}</span>${f.fixed?'<span class="df-cat fixed"><i data-lucide="check-circle-2"></i>committed</span>':''}</div>
      <div class="df-body">${f.body}</div><div class="df-fix ${f.fixed?'done':''}"><span class="k">${f.fixed?'Done':'Fix'}</span><span>${f.fix}</span></div></div>`).join('')}
    <div class="doc-h">Size &amp; Rendition <span class="cnt">${r.apps.length} apps</span></div>
    <div class="dt">${r.apps.map(p=>`<div class="dt-row ${p.flag?'flag':''}"><span class="nm">${p.name}</span><span class="sz">${p.size}</span><span class="rd"><span class="dot ${p.dot}"></span>${p.rd}</span></div>`).join('')}</div>
    <div class="doc-h">Passed Clean <span class="cnt">${r.clean.length}</span></div>
    <div class="dclean">${r.clean.map(c=>`<div class="r"><i data-lucide="check"></i><span>${c}</span></div>`).join('')}</div>`; }
function ReviewDoc(r){ return `<div class="doc-h">Seven Lenses <span class="cnt">${r.lenses.filter(l=>l.status==='flag').length} flagged</span></div>
    ${r.lenses.map(l=>`<div class="dl"><div class="dl-top"><span class="dl-name">${l.name}</span><span class="dl-stat ${l.status}">${l.status==='ok'?'Clean':'Flag'}</span></div>
      ${l.status!=='ok'?`<div class="dl-body">${l.body}</div>`:''}</div>`).join('')}
    <div class="doc-callout"><div class="ct">Highest-value change before building</div><div class="cb">${r.call}</div></div>`; }
boot();
</script>
</body>
</html>
