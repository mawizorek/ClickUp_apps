<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e12">
<meta name="description" content="FIFA World Cup 2026 knockout bracket & schedule tracker.">
<meta name="robots" content="noindex, nofollow">
<title>FIFA World Cup 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>\u26BD</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
 :root {
 --bg: oklch(10% 0.012 250);
 --surface-1: oklch(16% 0.01 250);
 --surface-2: oklch(21% 0.008 250);
 --surface-3: oklch(26% 0.006 250);
 --text: oklch(94% 0.006 250);
 --text-mid: oklch(78% 0.008 250);
 --text-muted: oklch(62% 0.01 250);
 --text-dim: oklch(48% 0.008 250);
 --accent: oklch(75% 0.18 155);
 --accent-surface: oklch(20% 0.05 155);
 --live: oklch(70% 0.22 25);
 --live-surface: oklch(20% 0.06 25);
 --gold: oklch(82% 0.15 85);
 --gold-surface: oklch(20% 0.05 85);
 --winner-bg: oklch(18% 0.03 155);
 --loser-text: oklch(42% 0.008 250);
 --border: oklch(28% 0.006 250);
 --border-light: oklch(32% 0.005 250);
 --connector: oklch(35% 0.01 250);
 --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
 }

 * { box-sizing: border-box; margin: 0; padding: 0; }

 body {
 font-family: 'Inter', system-ui, sans-serif;
 background: var(--bg);
 color: var(--text);
 min-height: 100svh;
 overflow-x: hidden;
 -webkit-font-smoothing: antialiased;
 font-feature-settings: 'tnum';
 padding-bottom: env(safe-area-inset-bottom);
 }

 header { position: sticky; top: 0; z-index: 20; background: var(--bg); border-bottom: 1px solid var(--border); }
 .header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
 .header-top h1 { font-size: 1rem; font-weight: 800; letter-spacing: -0.02em; }

 .view-toggle { display: flex; background: var(--surface-2); border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; }
 .view-btn { padding: 8px 16px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); background: none; border: none; cursor: pointer; transition: all 150ms var(--ease-out); }
 .view-btn.active { background: var(--accent-surface); color: var(--accent); border: 1px solid oklch(35% 0.08 155); border-radius: 6px; }

 .updated-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px; background: var(--surface-1); border-bottom: 1px solid var(--border); }
 .updated-label { font-size: 0.625rem; font-weight: 600; color: var(--text-dim); letter-spacing: 0.04em; text-transform: uppercase; }
 .updated-value { font-size: 0.6875rem; font-weight: 600; color: var(--text-muted); }
 .updated-value.fresh { color: var(--accent); }

 .schedule-view, .bracket-view { display: none; }
 .schedule-view.active, .bracket-view.active { display: block; }

 .time-nav { display: flex; overflow-x: auto; scrollbar-width: none; padding: 12px 16px; gap: 6px; }
 .time-nav::-webkit-scrollbar { display: none; }
 .time-btn { flex-shrink: 0; padding: 8px 14px; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); background: var(--surface-1); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 150ms var(--ease-out); white-space: nowrap; }
 .time-btn:hover { border-color: var(--border-light); color: var(--text-mid); }
 .time-btn.active { background: var(--surface-3); border-color: var(--text-muted); color: var(--text); font-weight: 700; }
 .time-btn .ct { color: var(--text-dim); margin-left: 4px; }

 .schedule-content { padding: 0 16px 100px; }
 @media (min-width: 640px) { .schedule-content { max-width: 480px; margin: 0 auto; } .bracket-round { min-width: 150px; } }

 .day-group { margin-bottom: 24px; }
 .day-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
 .day-label .date { font-size: 0.8125rem; font-weight: 700; color: var(--text); }
 .day-label .relative { font-size: 0.6875rem; font-weight: 700; color: var(--accent); background: var(--accent-surface); padding: 3px 8px; border-radius: 4px; border: 1px solid oklch(30% 0.06 155); }
 .day-label .round-tag { font-size: 0.625rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); margin-left: auto; }

 .day-matches { display: flex; flex-direction: column; gap: 8px; }

 .match { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 150ms var(--ease-out); }
 .match:hover { border-color: var(--border-light); }
 .match.is-live { border-color: var(--live); box-shadow: 0 0 16px oklch(50% 0.12 25 / 0.15); }
 .match.open { border-color: var(--text-muted); }

 .match-top { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: var(--surface-2); border-bottom: 1px solid var(--border); }
 .match-top .info { font-size: 0.6875rem; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
 .match-top .badge { font-size: 0.625rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }

 .badge.ft { color: var(--accent); background: var(--accent-surface); border: 1px solid oklch(30% 0.06 155); }
 .badge.aet { color: var(--gold); background: var(--gold-surface); border: 1px solid oklch(30% 0.06 85); }
 .badge.pso { color: var(--gold); background: var(--gold-surface); border: 1px solid oklch(30% 0.06 85); }
 .badge.live { color: var(--live); background: var(--live-surface); border: 1px solid oklch(30% 0.08 25); animation: pulse 2s infinite; }
 .badge.upcoming { color: var(--text-mid); background: var(--surface-3); border: 1px solid var(--border-light); }

 @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }

 .countdown-chip { font-size: 0.625rem; font-weight: 700; color: var(--accent); background: var(--accent-surface); border: 1px solid oklch(30% 0.06 155); padding: 2px 7px; border-radius: 4px; letter-spacing: 0.02em; }

 /* condensed summary (completed, collapsed) */
 .match-summary { display: none; align-items: center; gap: 8px; padding: 9px 10px; }
 .match.completed .match-summary { display: flex; }
 .match.completed.open .match-summary { display: none; }
 .ms-winner { font-size: 0.8125rem; font-weight: 700; color: var(--text); }
 .ms-score { font-size: 0.8125rem; font-weight: 800; color: var(--accent); font-feature-settings: 'tnum'; }
 .ms-loser { font-size: 0.8125rem; font-weight: 500; color: var(--text-dim); }
 .ms-note { font-size: 0.625rem; font-weight: 600; color: var(--gold); margin-left: 2px; }
 .ms-chevron { margin-left: auto; }

 .match-teams { padding: 8px 10px; display: flex; flex-direction: column; gap: 4px; }
 .match.completed .match-teams { display: none; }
 .match.completed.open .match-teams { display: flex; }

 .team { display: flex; align-items: center; gap: 8px; padding: 5px 7px; border-radius: 6px; min-height: 32px; }
 .team.w { background: var(--winner-bg); }
 .team.l .t-name { color: var(--loser-text); }
 .team.l .t-score { color: var(--loser-text); }

 .t-code { width: 28px; font-size: 0.625rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.02em; }
 .t-name { flex: 1; font-size: 0.8125rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
 .t-score { font-size: 0.9375rem; font-weight: 800; min-width: 16px; text-align: right; }
 .team.w .t-score { color: var(--accent); }
 .t-rank { font-size: 0.6875rem; font-weight: 500; font-style: italic; color: var(--text-dim); min-width: 24px; text-align: right; }

 .t-name.potential { color: var(--text-muted); font-style: italic; font-weight: 500; }
 .t-name.potential .pfx { color: var(--text-dim); font-style: normal; font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.04em; margin-right: 4px; }

 .match-note { padding: 0 10px 8px; font-size: 0.6875rem; color: var(--gold); font-weight: 500; }
 .match.completed:not(.open) .match-note { display: none; }
 .match.tbd .t-name { color: var(--text-dim); font-style: italic; font-weight: 500; }

 .chevron { width: 14px; height: 14px; color: var(--text-dim); transition: transform 240ms var(--ease-out); flex-shrink: 0; }
 .match.open .chevron { transform: rotate(180deg); }

 .match-drawer { max-height: 0; overflow: hidden; transition: max-height 260ms var(--ease-out); }
 .match.open .match-drawer { max-height: 300px; }
 .drawer-inner { padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; background: var(--surface-1); }
 .drawer-row { display: flex; align-items: baseline; gap: 8px; font-size: 0.75rem; }
 .drawer-row .k { color: var(--text-dim); font-weight: 600; font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.05em; min-width: 92px; flex-shrink: 0; }
 .drawer-row .v { color: var(--text-mid); font-weight: 600; }
 .drawer-row .v.accent { color: var(--accent); }
 .drawer-row .v.gold { color: var(--gold); }

 .bracket-view { padding: 16px; padding-bottom: 100px; overflow-x: auto; }
 .bracket-hint { font-size: 0.6875rem; color: var(--text-dim); text-align: center; padding-bottom: 12px; }
 .bracket-scroll { min-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px; }
 .bracket-container { display: flex; gap: 6px; min-width: max-content; align-items: flex-start; }
 .bracket-round { display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
 .bracket-round-label { font-size: 0.625rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); text-align: center; padding: 6px 0 8px; position: sticky; top: 0; }

 .bracket-match { background: var(--surface-1); border: 1px solid var(--border); border-radius: 6px; padding: 0; overflow: hidden; margin-bottom: 2px; transition: opacity 200ms var(--ease-out), box-shadow 200ms var(--ease-out), border-color 200ms var(--ease-out); }
 .bracket-match.completed { border-color: var(--border-light); }
 .bracket-match.is-final { border-color: var(--gold); box-shadow: 0 0 8px oklch(70% 0.1 85 / 0.1); }
 .bracket-match.dim { opacity: 0.26; }
 .bracket-match.on-path { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 14px oklch(70% 0.18 155 / 0.35); opacity: 1; }

 .bm-team { display: flex; align-items: center; padding: 6px 8px; gap: 6px; border-bottom: 1px solid oklch(24% 0.005 250); cursor: pointer; min-height: 30px; }
 .bm-team:last-child { border-bottom: none; }
 .bm-team.w { background: var(--winner-bg); }
 .bm-team.l .bm-name { color: var(--loser-text); }
 .bm-team.picked { background: var(--accent-surface); }
 .bm-code { font-size: 0.5625rem; font-weight: 700; color: var(--text-dim); width: 22px; }
 .bm-name { flex: 1; font-size: 0.6875rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .bm-name.potential { color: var(--text-muted); font-style: italic; font-weight: 500; }
 .bm-score { font-size: 0.75rem; font-weight: 800; min-width: 14px; text-align: right; }
 .bm-team.w .bm-score { color: var(--accent); }
 .bm-team.l .bm-score { color: var(--loser-text); }
 .bm-status { font-size: 0.5625rem; font-weight: 700; text-align: center; padding: 2px; letter-spacing: 0.04em; color: var(--text-dim); background: var(--surface-2); }
 .bm-status.done { color: var(--accent); }
 .bm-status.pen { color: var(--gold); }

 /* tighter completed bracket rows so R32 doesn't run so long */
 .bracket-match.completed .bm-status { display: none; }
 .bracket-match.completed .bm-team { padding: 3px 8px; min-height: 22px; border-bottom-color: oklch(20% 0.004 250); }
 .bracket-match.completed .bm-team.l { opacity: 0.5; }
 .bracket-match.completed .bm-team.l .bm-name { font-size: 0.625rem; font-weight: 500; }

 .bracket-connectors { display: flex; flex-direction: column; justify-content: space-around; width: 16px; min-width: 16px; position: relative; }
 .connector-pair { display: flex; flex-direction: column; align-items: center; flex: 1; justify-content: center; position: relative; }
 .connector-pair::before { content: ''; position: absolute; right: 0; top: 25%; bottom: 25%; width: 1px; background: var(--connector); }
 .connector-pair::after { content: ''; position: absolute; right: 0; top: 50%; width: 8px; height: 1px; background: var(--connector); }

 .trophy { text-align: center; font-size: 1.5rem; padding: 8px 0; }
 .loading-msg { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 0.875rem; }

 @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<header>
 <div class="header-top">
 <h1>World Cup 2026</h1>
 <div class="view-toggle">
 <button class="view-btn active" data-view="schedule">Schedule</button>
 <button class="view-btn" data-view="bracket">Bracket</button>
 </div>
 </div>
 <div class="updated-bar">
 <span class="updated-label">Data updated</span>
 <span class="updated-value" id="updatedTime">loading&#8230;</span>
 </div>
</header>

<div class="schedule-view active" id="scheduleView">
 <div class="time-nav" id="timeNav"></div>
 <div class="schedule-content" id="scheduleContent">
 <div class="loading-msg">Loading match data&#8230;</div>
 </div>
</div>

<div class="bracket-view" id="bracketView">
 <div class="bracket-hint">Tap a team to trace its path to the Final</div>
 <div class="bracket-scroll">
 <div class="bracket-container" id="bracketContent"></div>
 </div>
</div>

<noscript><div class="loading-msg">This app needs JavaScript enabled.</div></noscript>

<script>
 const APP_VERSION = 'v2.1';
 const DATA_URL = './data.json';
 const CACHE_KEY = 'world-cup-bracket-data';
 const REPO_OWNER = 'mawizorek';
 const REPO_NAME = 'ClickUp_apps';
 const DATA_PATH = 'world-cup-bracket/data.json';
 const POTENTIAL_PREFIX = 'winner of';
 const ET_UTC_OFFSET = 4; // EDT = UTC-4 during the tournament (July)

 let allMatches = [];
 let rankings = {};
 const fedBy = {};
 let pickedTeam = null;

 // ---------- data ----------
 async function fetchLastUpdated() {
 const el = document.getElementById('updatedTime');
 try {
 const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/commits?path=${DATA_PATH}&per_page=1`);
 if (!res.ok) throw new Error('API error');
 const commits = await res.json();
 if (commits.length > 0) {
 const date = new Date(commits[0].commit.author.date);
 const now = new Date();
 const diffMins = Math.floor((now - date) / 60000);
 const diffHrs = Math.floor((now - date) / 3600000);
 const diffDays = Math.floor((now - date) / 86400000);
 let rel;
 if (diffMins < 2) rel = 'just now';
 else if (diffMins < 60) rel = `${diffMins}m ago`;
 else if (diffHrs < 24) rel = `${diffHrs}h ago`;
 else rel = `${diffDays}d ago`;
 const timeStr = date.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
 el.textContent = `${timeStr} (${rel})`;
 el.classList.toggle('fresh', diffHrs < 6);
 }
 } catch (e) { el.textContent = 'unavailable'; }
 }

 async function loadData() {
 try {
 const res = await fetch(DATA_URL);
 if (!res.ok) throw new Error('Fetch failed');
 const json = await res.json();
 localStorage.setItem(CACHE_KEY, JSON.stringify(json));
 return json;
 } catch (e) {
 const cached = localStorage.getItem(CACHE_KEY);
 if (cached) return JSON.parse(cached);
 return null;
 }
 }

 async function init() {
 fetchLastUpdated();
 const data = await loadData();
 if (!data) {
 document.getElementById('scheduleContent').innerHTML = '<div class="loading-msg">Could not load match data. Open via GitHub Pages or ensure data.json is in the same folder.</div>';
 return;
 }
 allMatches = data.matches;
 rankings = data.rankings || {};
 buildFedBy();
 setupViewToggle();
 renderTimeNav();
 renderSchedule('today');
 startCountdownTicker();
 }

 // ---------- helpers ----------
 const cc = (n) => {
 const m = { 'Canada':'CAN','South Africa':'RSA','Brazil':'BRA','Japan':'JPN','Germany':'GER',
 'Paraguay':'PAR','Netherlands':'NED','Morocco':'MAR','France':'FRA','Sweden':'SWE',
 'Ivory Coast':'CIV','Norway':'NOR','Mexico':'MEX','Ecuador':'ECU','England':'ENG',
 'DR Congo':'COD','Belgium':'BEL','Senegal':'SEN','USA':'USA','Bosnia-Herz.':'BIH',
 'Spain':'ESP','Austria':'AUT','Portugal':'POR','Croatia':'CRO','Switzerland':'SUI',
 'Algeria':'ALG','Argentina':'ARG','Cape Verde':'CPV','Australia':'AUS','Egypt':'EGY',
 'Colombia':'COL','Ghana':'GHA','TBD':'\u2014' };
 return m[n] || n.substring(0,3).toUpperCase();
 };

 const isComplete = (m) => ['ft','aet','pso'].includes(m.status);
 const winnerName = (m) => m.winner === 'home' ? m.home : m.winner === 'away' ? m.away : null;
 const rankOf = (name) => (name && rankings[name]) ? rankings[name] : null;
 const today = new Date().toISOString().slice(0, 10);

 function buildFedBy() {
 Object.keys(fedBy).forEach(k => delete fedBy[k]);
 allMatches.forEach(m => { if (m.feedsTo) (fedBy[m.feedsTo] = fedBy[m.feedsTo] || []).push(m.id); });
 }
 const byId = (id) => allMatches.find(x => x.id === id);

 // CORE: resolve one slot to a display label. Depth-1 only, never recurse.
 function slotLabel(match, side) {
 const name = match[side];
 if (name && name !== 'TBD') return { text: name, code: cc(name), potential: false };
 const feeders = fedBy[match.id] || [];
 const feederId = side === 'home' ? feeders[0] : feeders[1];
 const fm = byId(feederId);
 if (!fm) return { text: 'TBD', code: '\u2014', potential: false, tbd: true };
 if (isComplete(fm)) { const w = winnerName(fm); return { text: w, code: cc(w), potential: false }; }
 if (fm.home === 'TBD' || fm.away === 'TBD') return { text: 'TBD', code: '\u2014', potential: false, tbd: true };
 return { text: `${cc(fm.home)}/${cc(fm.away)}`, code: '', potential: true };
 }

 function pathIn(m) {
 const feeders = (fedBy[m.id] || []).map(byId).filter(Boolean);
 if (!feeders.length) return null;
 return feeders.map(fm => (fm.home === 'TBD' || fm.away === 'TBD') ? 'TBD' : `${cc(fm.home)} v ${cc(fm.away)}`).join('  \u00b7  ');
 }

 function advancesToFace(m) {
 if (!m.feedsTo) return null;
 const dm = byId(m.feedsTo);
 if (!dm) return null;
 const otherId = (fedBy[dm.id] || []).find(id => id !== m.id);
 const of = byId(otherId);
 if (!of) return 'TBD';
 if (isComplete(of)) return winnerName(of);
 if (of.home !== 'TBD' && of.away !== 'TBD') return `${cc(of.home)}/${cc(of.away)} winner`;
 return 'TBD';
 }

 // ---------- countdown ----------
 function kickoffDate(m) {
 if (!m.time || m.time === 'TBD') return null;
 const t = m.time.replace(/\s*ET$/i, '').trim();
 const mt = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
 if (!mt) return null;
 let h = +mt[1]; const min = +mt[2]; const ap = mt[3].toUpperCase();
 if (ap === 'PM' && h !== 12) h += 12;
 if (ap === 'AM' && h === 12) h = 0;
 const [Y, Mo, D] = m.day.split('-').map(Number);
 return new Date(Date.UTC(Y, Mo - 1, D, h + ET_UTC_OFFSET, min));
 }
 function fmtCountdown(target) {
 let diff = target - new Date();
 if (diff <= 0) return 'kicked off';
 const d = Math.floor(diff / 86400000); diff -= d * 86400000;
 const h = Math.floor(diff / 3600000); diff -= h * 3600000;
 const mi = Math.floor(diff / 60000);
 if (d > 0) return `in ${d}d ${h}h`;
 if (h > 0) return `in ${h}h ${mi}m`;
 return `in ${mi}m`;
 }
 let tickerStarted = false;
 function startCountdownTicker() {
 if (tickerStarted) return; tickerStarted = true;
 setInterval(() => {
 document.querySelectorAll('[data-countdown]').forEach(el => {
 el.textContent = fmtCountdown(new Date(+el.dataset.countdown));
 });
 }, 30000);
 }

 // ---------- view toggle ----------
 function setupViewToggle() {
 document.querySelectorAll('.view-btn').forEach(btn => {
 btn.addEventListener('click', () => {
 document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
 btn.classList.add('active');
 const v = btn.dataset.view;
 document.getElementById('scheduleView').classList.toggle('active', v === 'schedule');
 document.getElementById('bracketView').classList.toggle('active', v === 'bracket');
 if (v === 'bracket') renderBracket();
 });
 });
 }

 // ---------- schedule ----------
 const periods = [
 { id: 'today', label: 'Today', filter: m => m.day === today },
 { id: 'weekend', label: 'This Week', filter: m => {
 const d = new Date(m.day); const now = new Date();
 const weekEnd = new Date(now); weekEnd.setDate(now.getDate() + (7 - now.getDay()));
 return d >= new Date(today) && d <= weekEnd;
 }},
 { id: 'r32', label: 'R32', filter: m => m.round === 'R32' },
 { id: 'r16', label: 'R16', filter: m => m.round === 'R16' },
 { id: 'later', label: 'QF+', filter: m => ['QF','SF','Final'].includes(m.round) },
 { id: 'all', label: 'All', filter: () => true },
 ];

 function renderTimeNav() {
 const nav = document.getElementById('timeNav');
 nav.innerHTML = periods.map((p, i) => {
 const count = allMatches.filter(p.filter).length;
 return `<button class="time-btn${i === 0 ? ' active' : ''}" data-period="${p.id}">${p.label}<span class="ct">${count}</span></button>`;
 }).join('');
 nav.querySelectorAll('.time-btn').forEach(btn => {
 btn.addEventListener('click', () => {
 nav.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
 btn.classList.add('active');
 renderSchedule(btn.dataset.period);
 });
 });
 }

 function renderSchedule(periodId) {
 const period = periods.find(p => p.id === periodId);
 const matches = allMatches.filter(period.filter);
 const container = document.getElementById('scheduleContent');
 const groups = {};
 matches.forEach(m => { (groups[m.dayLabel] = groups[m.dayLabel] || []).push(m); });

 let html = '';
 Object.entries(groups).forEach(([day, dayMatches]) => {
 const roundLabel = dayMatches[0].round;
 const isToday = dayMatches[0].day === today;
 html += `<div class="day-group"><div class="day-label">`
 + `<span class="date">${day}</span>`
 + `${isToday ? '<span class="relative">Today</span>' : ''}`
 + `<span class="round-tag">${roundLabel}</span></div>`
 + `<div class="day-matches">${dayMatches.map(renderMatchCard).join('')}</div></div>`;
 });
 if (!html) html = '<div class="loading-msg">No matches in this window.</div>';
 container.innerHTML = html;
 bindCardTaps();
 }

 function teamRow(m, side) {
 const done = isComplete(m);
 const isW = m.winner === side;
 const isL = done && m.winner && m.winner !== side;
 const sl = slotLabel(m, side);
 const score = m[side === 'home' ? 'hs' : 'as'];
 const nameHtml = sl.potential
 ? `<span class="t-name potential"><span class="pfx">${POTENTIAL_PREFIX}</span>${sl.text}</span>`
 : `<span class="t-name">${sl.text}</span>`;
 let right = '';
 if (done && score !== null && score !== undefined) {
 right = `<span class="t-score">${score}</span>`;
 } else if (!done && !sl.potential && !sl.tbd) {
 const r = rankOf(sl.text);
 if (r) right = `<span class="t-rank">#${r}</span>`;
 }
 return `<div class="team ${isW ? 'w' : ''} ${isL ? 'l' : ''}">`
 + `<span class="t-code">${sl.code || '\u2014'}</span>`
 + nameHtml + right + `</div>`;
 }

 function summaryLine(m) {
 const w = winnerName(m);
 const loserSide = m.winner === 'home' ? 'away' : 'home';
 const l = m[loserSide];
 const ws = m[m.winner === 'home' ? 'hs' : 'as'];
 const ls = m[loserSide === 'home' ? 'hs' : 'as'];
 const note = m.psoNote ? `<span class="ms-note">${m.psoNote}</span>` : '';
 return `<div class="match-summary">`
 + `<span class="ms-winner">${w}</span>`
 + `<span class="ms-score">${ws}-${ls}</span>`
 + `<span class="ms-loser">${l}</span>${note}`
 + `<svg class="chevron ms-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>`
 + `</div>`;
 }

 function renderMatchCard(m) {
 const done = isComplete(m);
 const classes = ['match', done ? 'completed' : '', m.status === 'live' ? 'is-live' : '', m.tbd ? 'tbd' : ''].filter(Boolean).join(' ');
 const statusText = m.status === 'ft' ? 'FT' : m.status === 'aet' ? 'AET' : m.status === 'pso' ? 'PEN' : m.status === 'live' ? 'LIVE' : (m.time || 'TBD');
 const statusClass = m.status === 'upcoming' ? 'upcoming' : m.status;

 const ko = (!done && m.day === today) ? kickoffDate(m) : null;
 const chip = ko ? `<span class="countdown-chip" data-countdown="${ko.getTime()}">${fmtCountdown(ko)}</span>` : '';

 return `<div class="${classes}" data-id="${m.id}">`
 + `<div class="match-top"><span class="info">${m.venue}${chip}</span>`
 + `<span class="badge ${statusClass}">${statusText}</span></div>`
 + `${done ? summaryLine(m) : ''}`
 + `<div class="match-teams">${teamRow(m, 'home')}${teamRow(m, 'away')}`
 + `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin:2px auto 0"><path d="M6 9l6 6 6-6"/></svg>`
 + `</div>`
 + `${m.psoNote ? `<div class="match-note">${m.psoNote}</div>` : ''}`
 + renderDrawer(m)
 + `</div>`;
 }

 function renderDrawer(m) {
 const done = isComplete(m);
 let rows = '';
 rows += `<div class="drawer-row"><span class="k">Venue</span><span class="v">${m.venue || 'TBD'}</span></div>`;
 if (m.time && m.time !== 'TBD') rows += `<div class="drawer-row"><span class="k">Kickoff</span><span class="v">${m.time}</span></div>`;

 if (!done) {
 const ko = kickoffDate(m);
 if (ko) rows += `<div class="drawer-row"><span class="k">Starts</span><span class="v accent" data-countdown="${ko.getTime()}">${fmtCountdown(ko)}</span></div>`;
 const pin = pathIn(m);
 if (pin) rows += `<div class="drawer-row"><span class="k">Path in</span><span class="v">${pin}</span></div>`;
 } else {
 const face = advancesToFace(m);
 const w = winnerName(m);
 if (w) rows += `<div class="drawer-row"><span class="k">Advances</span><span class="v accent">${cc(w)} \u2192 ${face || 'TBD'}</span></div>`;
 if (m.psoNote) rows += `<div class="drawer-row"><span class="k">Shootout</span><span class="v gold">${m.psoNote}</span></div>`;
 }
 return `<div class="match-drawer"><div class="drawer-inner">${rows}</div></div>`;
 }

 function bindCardTaps() {
 document.getElementById('scheduleContent').querySelectorAll('.match').forEach(card => {
 card.addEventListener('click', () => {
 const open = card.classList.contains('open');
 document.querySelectorAll('.match.open').forEach(c => c.classList.remove('open'));
 if (!open) card.classList.add('open');
 });
 });
 }

 // ---------- bracket ----------
 function renderBracket() {
 const container = document.getElementById('bracketContent');
 const roundOrder = ['R32', 'R16', 'QF', 'SF', 'Final'];
 const roundLabels = { R32: 'Round of 32', R16: 'Round of 16', QF: 'Quarters', SF: 'Semis', Final: 'Final' };
 let html = '';
 roundOrder.forEach((round, rIdx) => {
 const matches = allMatches.filter(m => m.round === round);
 html += `<div class="bracket-round"><div class="bracket-round-label">${roundLabels[round]}</div>`
 + matches.map(renderBracketMatch).join('')
 + `${round === 'Final' ? '<div class="trophy">\uD83C\uDFC6</div>' : ''}</div>`;
 if (rIdx < roundOrder.length - 1) {
 const nextMatches = allMatches.filter(m => m.round === roundOrder[rIdx + 1]);
 html += `<div class="bracket-connectors">${nextMatches.map(() => '<div class="connector-pair"></div>').join('')}</div>`;
 }
 });
 container.innerHTML = html;
 bindBracketTaps();
 if (pickedTeam) applyPathHighlight(pickedTeam);
 }

 function bmTeam(m, side) {
 const done = isComplete(m);
 const isW = m.winner === side;
 const isL = done && m.winner && m.winner !== side;
 const sl = slotLabel(m, side);
 const score = m[side === 'home' ? 'hs' : 'as'];
 const tappable = sl.text && sl.text !== 'TBD' && !sl.potential;
 const nameHtml = sl.potential ? `<span class="bm-name potential">${sl.text}</span>` : `<span class="bm-name">${sl.text}</span>`;
 return `<div class="bm-team ${isW ? 'w' : ''} ${isL ? 'l' : ''}" ${tappable ? `data-team="${sl.text}"` : ''}>`
 + `<span class="bm-code">${sl.code || '\u2014'}</span>`
 + nameHtml
 + `${score !== null && score !== undefined ? `<span class="bm-score">${score}</span>` : ''}</div>`;
 }

 function renderBracketMatch(m) {
 const done = isComplete(m);
 const isFinal = m.round === 'Final';
 const classes = ['bracket-match', done ? 'completed' : '', isFinal ? 'is-final' : ''].filter(Boolean).join(' ');
 const statusText = m.status === 'ft' ? 'FT' : m.status === 'aet' ? 'AET' : m.status === 'pso' ? 'PEN' : '';
 const statusClass = ['pso','aet'].includes(m.status) ? 'pen' : done ? 'done' : '';
 return `<div class="${classes}" data-match-id="${m.id}">`
 + `${statusText ? `<div class="bm-status ${statusClass}">${statusText}</div>` : ''}`
 + bmTeam(m, 'home') + bmTeam(m, 'away')
 + `</div>`;
 }

 function bindBracketTaps() {
 document.getElementById('bracketContent').querySelectorAll('.bm-team[data-team]').forEach(el => {
 el.addEventListener('click', (e) => {
 e.stopPropagation();
 const team = el.dataset.team;
 if (pickedTeam === team) { clearPathHighlight(); }
 else { pickedTeam = team; applyPathHighlight(team); }
 });
 });
 }

 function buildPathSet(team) {
 const startMatches = allMatches.filter(m => (m.home === team || m.away === team));
 const path = new Set();
 startMatches.forEach(sm => {
 let cur = sm; let alive = true;
 while (cur && alive) {
 path.add(cur.id);
 if (isComplete(cur)) { if (winnerName(cur) !== team) { alive = false; break; } }
 cur = cur.feedsTo ? byId(cur.feedsTo) : null;
 }
 });
 return path;
 }

 function applyPathHighlight(team) {
 const path = buildPathSet(team);
 document.querySelectorAll('.bracket-match').forEach(el => {
 const id = +el.dataset.matchId;
 el.classList.toggle('on-path', path.has(id));
 el.classList.toggle('dim', !path.has(id));
 });
 document.querySelectorAll('.bm-team').forEach(el => el.classList.toggle('picked', el.dataset.team === team));
 }

 function clearPathHighlight() {
 pickedTeam = null;
 document.querySelectorAll('.bracket-match').forEach(el => { el.classList.remove('on-path'); el.classList.remove('dim'); });
 document.querySelectorAll('.bm-team').forEach(el => el.classList.remove('picked'));
 }

 document.getElementById('bracketView').addEventListener('click', (e) => {
 if (pickedTeam && !e.target.closest('.bm-team[data-team]')) clearPathHighlight();
 });

 init();
</script>
</body>
</html>
