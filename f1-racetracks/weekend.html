<!DOCTYPE html>
<!--
  F1 Race Weekend (weekend lens) — v6 shell.
  Per-round race-weekend detail layer, DECOMPOSED to source modules under source/weekend/.
  styles : source/weekend/base.css   (tokens, topbar, drill-through nav, chrome)
           source/weekend/panels.css (all section styling + animations)
           source/weekend/story.css  (Story mode: Results/Story toggle + replay surface)
  logic  : source/weekend/data.js    (store fetch + embed fallback + live swing)
           source/weekend/story.js   (Story mode engine — defines window.mountStory)
           source/weekend/render.js  (section renderers + Results/Story toggle, v2.1)
           source/weekend/nav.js     (topbar, prev/next, routing, boot)
  DATA: derives everything from the canonical per-round store (f1-results/2026/);
        fails soft to an embedded Canada snapshot off-origin. Championship swing computed live.
        Story mode derives its position ladder from the round's own classification; per-second
        telemetry + team radio are illustrative/future (flagged in-UI) until the R2 tier + archived radio land.
  NAV: Weekend is a DRILL-THROUGH, not a peer tab — switcher is Matrix / History / Circuits.
       Entered from a History card or a Circuit card (weekend.html#/<slug>); links back to the guide.
  LOAD ORDER: data.js (globals) → story.js (window.mountStory) → render.js (uses mountStory) → nav.js (boots).
  CACHE-BUST: bump every ?v= token below on each source deploy.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Weekend · F1 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="source/weekend/base.css?v=6">
<link rel="stylesheet" href="source/weekend/panels.css?v=6">
<link rel="stylesheet" href="source/weekend/story.css?v=6">
</head>
<body>
  <div id="topbar"></div>
  <div id="wknav"></div>
  <div id="mast"></div>
  <div id="app"></div>
  <footer>
    <span>Race Weekend <b class="num" id="foot-stamp">v6</b> · derived from results store</span>
    <span class="num">f1-results/2026/</span>
  </footer>
  <script src="source/weekend/data.js?v=6"></script>
  <script src="source/weekend/story.js?v=6"></script>
  <script src="source/weekend/render.js?v=6"></script>
  <script src="source/weekend/nav.js?v=6"></script>
</body>
</html>
