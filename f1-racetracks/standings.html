<!DOCTYPE html>
<!-- INFRASTRUCTURE: standalone lens of the F1 Racetracks app. Add-only sibling to index.html; does NOT modify the main app. -->
<!-- DATA: fetches the canonical per-round store at ../f1-results/2026/ (index.json + round files). Engine only; no data duplicated here. Ricky's data commits flow through automatically. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#26262e">
<title>2026 F1 Championship Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:oklch(0.15 0.012 255);--s1:oklch(0.185 0.014 255);--s2:oklch(0.225 0.016 255);
    --s3:oklch(0.275 0.018 255);--line:oklch(0.32 0.018 255);--line-soft:oklch(0.26 0.016 255);
    --txt:oklch(0.96 0.006 255);--txt-mid:oklch(0.74 0.010 255);--txt-dim:oklch(0.55 0.012 255);
    --gold:oklch(0.86 0.155 90);--silver:oklch(0.86 0.010 255);--bronze:oklch(0.73 0.10 55);
    --purple:oklch(0.72 0.17 300);--amber:oklch(0.80 0.155 78);--mover:oklch(0.78 0.13 200);--red:oklch(0.64 0.20 25);
    --t-mercedes:oklch(0.80 0.13 182);--t-ferrari:oklch(0.64 0.22 26);--t-mclaren:oklch(0.74 0.17 58);
    --t-redbull:oklch(0.60 0.15 268);--t-racingbulls:oklch(0.72 0.13 262);--t-alpine:oklch(0.74 0.13 232);
    --t-astonmartin:oklch(0.66 0.13 168);--t-williams:oklch(0.66 0.16 252);--t-haas:oklch(0.80 0.02 255);
    --t-audi:oklch(0.70 0.085 35);--t-cadillac:oklch(0.78 0.10 88);--ease:cubic-bezier(0.22,1,0.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;padding:clamp(10px,2.2vw,22px);padding-bottom:calc(env(safe-area-inset-bottom) + 22px)}
  .num{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}

  header.mast{display:flex;align-items:flex-end;justify-content:space-between;gap:12px 20px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}
  .eyebrow{font-family:'Chakra Petch',sans-serif;font-size:0.64rem;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:var(--txt-dim);display:flex;align-items:center;gap:9px}
  .eyebrow::before{content:"";width:22px;height:2px;background:var(--red);display:inline-block}
  h1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(1.2rem,3.4vw,1.9rem);line-height:1.02;letter-spacing:-0.01em;margin-top:5px;text-wrap:balance}
  h1 b{color:var(--red)}
  .leader-strip{display:flex;border:1px solid var(--line);background:var(--s1)}
  .leader-cell{display:flex;flex-direction:column;gap:2px;padding:7px 13px;border-right:1px solid var(--line-soft)}
  .leader-cell:last-child{border-right:0}
  .leader-cell .k{font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--txt-dim);font-weight:600}
  .leader-cell .v{font-size:0.96rem;font-weight:600;display:flex;align-items:baseline;gap:5px}
  .leader-cell .v .pts{font-size:0.74rem;color:var(--txt-mid)}

  .controls{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:11px}
  .seg{display:inline-flex;border:1px solid var(--line);background:var(--s1)}
  .seg button{font-family:'Chakra Petch',sans-serif;font-size:0.74rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--txt-mid);background:transparent;border:0;cursor:pointer;padding:8px 15px;transition:color .15s var(--ease),background .15s var(--ease)}
  .seg button + button{border-left:1px solid var(--line)}
  .seg button[aria-selected="true"]{background:var(--s3);color:var(--txt)}
  .seg button:hover:not([aria-selected="true"]){color:var(--txt)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:0.68rem;color:var(--txt-dim);align-items:center}
  .legend.off{display:none}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;display:inline-block}
  .dot.fl{background:var(--purple);border-radius:50%}
  .sw{width:13px;height:13px;display:inline-block}
  .sw.win{color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:800;font-size:0.74rem;line-height:1}
  .sw.story{background:color-mix(in oklch,var(--amber) 26%,transparent);border:1px solid color-mix(in oklch,var(--amber) 50%,var(--line))}
  .sw.mv{background:color-mix(in oklch,var(--mover) 22%,transparent);border:1px solid color-mix(in oklch,var(--mover) 50%,var(--line))}

  .state{padding:60px 20px;text-align:center;color:var(--txt-dim);font-size:0.9rem;border:1px solid var(--line);background:var(--s1)}
  .state .sp{display:inline-block;width:22px;height:22px;border:2px solid var(--line);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .scroll-wrap{overflow-x:auto;border:1px solid var(--line);background:var(--s1);-webkit-overflow-scrolling:touch}
  table.matrix{border-collapse:collapse;width:100%}
  th,td{padding:0}
  thead th{position:sticky;top:0;z-index:3;background:var(--s2);border-bottom:1px solid var(--line);font-family:'Chakra Petch',sans-serif;font-weight:600;color:var(--txt-mid);height:48px;vertical-align:middle}
  .col-pos{min-width:32px;width:32px;text-align:center;left:0;position:sticky;z-index:5}
  .col-drv{text-align:left;left:32px;position:sticky;z-index:5;min-width:146px}
  /* PTS is sticky WITHOUT a left offset on purpose: it glides over the name column
     on horizontal scroll (a deliberate touch Michael liked) then off-screen, while
     race cells slide underneath the frozen name. Higher z + solid bg keep it legible.
     Do NOT add a left offset to 'fix' this. */
  .col-pts{text-align:center;position:sticky;z-index:6;min-width:54px;border-right:2px solid var(--line)}
  thead .col-pos,thead .col-drv,thead .col-pts{z-index:7;background:var(--s2)}
  td.col-pos,td.col-drv,td.col-pts{background:var(--s1)}
  tbody tr:hover td.col-pos,tbody tr:hover td.col-drv,tbody tr:hover td.col-pts{background:var(--s2)}

  .rnd-h{text-align:center;min-width:56px;border-left:1px solid var(--line-soft);cursor:pointer;user-select:none;transition:background .12s var(--ease);position:relative}
  .rnd-h:hover{background:var(--s3)}
  .rnd-h .rn{font-size:0.58rem;color:var(--txt-dim);letter-spacing:0.1em}
  .rnd-h .rc{font-size:0.82rem;letter-spacing:0.04em;display:block}
  .rnd-h .spr{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:0.5rem;font-weight:700;color:var(--bg);background:var(--amber);padding:0 4px;margin-top:2px;letter-spacing:0.06em}
  .th-pad{padding:0 11px;text-align:left;font-size:0.64rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:5px}
  .col-pts .th-pad{justify-content:center;padding:0}
  .col-pos .th-pad{justify-content:center;padding:0;cursor:default}
  /* subtle sort glyph; brightens to gold when its column is the active sort */
  .sicon{font-size:0.66rem;color:var(--txt-dim);opacity:0.5;transition:color .12s,opacity .12s}
  .rnd-h .sicon{position:absolute;top:4px;right:5px}
  [data-active="1"] .sicon,.rnd-h[data-active="1"] .sicon{color:var(--gold);opacity:1}

  tbody tr{border-bottom:1px solid var(--line-soft)}
  tbody tr:last-child{border-bottom:0}
  tbody tr:hover td{background:var(--s2)}
  .pos-rank{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.88rem;text-align:center;color:var(--txt-mid)}

  .drv{display:flex;align-items:center;gap:9px;padding:0 11px;height:45px;cursor:pointer;width:100%;border:0;background:transparent;color:inherit;text-align:left;font-family:inherit}
  .drv:hover .drv-name{color:var(--txt)}
  .team-bar{width:4px;height:25px;flex:none;background:var(--team)}
  .drv-id{display:flex;flex-direction:column;gap:1px;min-width:0}
  .drv-name{font-weight:600;font-size:0.87rem;color:var(--txt);white-space:nowrap;letter-spacing:-0.005em}
  .drv-name .fn{color:var(--txt-mid);font-weight:500}
  .drv-team{font-size:0.62rem;color:var(--txt-dim);letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap}

  td.col-pts .tot{height:45px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:0.98rem}
  tbody tr:first-child td.col-pts .tot{color:var(--gold)}

  .cell{width:100%;height:45px;border:0;border-left:1px solid var(--line-soft);background:transparent;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:inherit;color:inherit;padding:4px 2px;transition:background .12s var(--ease)}
  .cell:hover{background:var(--s3) !important}
  .cell:focus-visible{outline:2px solid var(--purple);outline-offset:-2px}
  .cell .cp{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.92rem;line-height:1;color:var(--txt)}
  .cell .cpts{font-family:'JetBrains Mono',monospace;font-size:0.56rem;color:var(--txt-dim);line-height:1}
  .cell.win .cp{color:var(--gold);font-weight:800}
  .cell.p2 .cp{color:var(--silver)}
  .cell.p3 .cp{color:var(--bronze)}
  .cell.zero .cp{color:var(--txt-dim);font-weight:500}
  .cell.zero .cpts{display:none}
  .cell.dnf .cp{color:var(--red);font-size:0.66rem;font-weight:700;letter-spacing:0.04em}
  .cell.dnf .cpts{display:none}
  .cell.story{background:color-mix(in oklch,var(--amber) 20%,transparent)}
  .cell.story::before{content:"";position:absolute;inset:0;border:1px solid color-mix(in oklch,var(--amber) 45%,transparent);pointer-events:none}
  .cell.mover{background:color-mix(in oklch,var(--mover) 16%,transparent)}
  .cell.dnfhot{background:color-mix(in oklch,var(--red) 15%,transparent)}
  .cell.dnfhot::before{content:"";position:absolute;inset:0;border:1px solid color-mix(in oklch,var(--red) 40%,transparent);pointer-events:none}
  .cell .flmark{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--purple)}
  .cell .sprmark{font-family:'JetBrains Mono',monospace;font-size:0.48rem;font-weight:700;color:var(--amber);line-height:1;margin-top:1px}
  .cell .deep{position:absolute;bottom:4px;left:5px;width:4px;height:4px;background:var(--txt-dim);border-radius:50%}
  .cell.story .deep,.cell.mover .deep{background:var(--txt-mid)}
  .cell.empty{cursor:default}
  .cell.empty .cp{color:var(--txt-dim);font-weight:500}

  .wcc{border:1px solid var(--line);background:var(--s1)}
  .wcc-row{display:grid;grid-template-columns:44px 4px 1fr auto auto;align-items:center;gap:14px;padding:0 18px;height:56px;border-bottom:1px solid var(--line-soft);position:relative}
  .wcc-row:last-child{border-bottom:0}
  .wcc-rank{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.02rem;color:var(--txt-mid);text-align:center}
  .wcc-row:first-child .wcc-rank{color:var(--gold)}
  .wcc-bar{width:4px;height:30px;background:var(--team)}
  .wcc-name{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:1rem}
  .wcc-wins{font-size:0.68rem;color:var(--txt-dim);letter-spacing:0.06em;text-transform:uppercase}
  .wcc-pts{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:1.18rem;min-width:58px;text-align:right}
  .wcc-track{position:absolute;left:0;bottom:0;height:2px;background:var(--team);opacity:0.5}
  .hidden{display:none !important}

  .scrim{position:fixed;inset:0;background:oklch(0.10 0.01 255 / 0.66);opacity:0;pointer-events:none;transition:opacity .25s var(--ease);z-index:60}
  .scrim.open{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;right:0;height:100dvh;width:min(420px,94vw);background:var(--s1);border-left:1px solid var(--line);transform:translateX(102%);transition:transform .32s var(--ease);z-index:61;display:flex;flex-direction:column;box-shadow:-24px 0 60px oklch(0.08 0.01 255 / 0.5)}
  .panel.open{transform:translateX(0)}
  .panel-head{position:relative;padding:19px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;overflow:hidden}
  .panel-head::before{content:"";position:absolute;inset:0;background:linear-gradient(150deg,color-mix(in oklch,var(--team) 22%,var(--s1)) 0%,var(--s1) 62%);opacity:0.9;z-index:0}
  .panel-head > *{position:relative;z-index:1}
  .panel-ey{font-family:'Chakra Petch',sans-serif;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--txt-mid);font-weight:600;margin-bottom:8px}
  .panel-drv{font-family:'Chakra Petch',sans-serif;font-size:1.45rem;font-weight:700;line-height:1.03;letter-spacing:-0.01em}
  .panel-team{display:inline-flex;align-items:center;gap:8px;margin-top:8px;font-size:0.72rem;color:var(--txt-mid);letter-spacing:0.05em;text-transform:uppercase;font-weight:500}
  .panel-team .team-bar{height:14px;width:3px}
  .x{flex:none;width:34px;height:34px;border:1px solid var(--line);background:color-mix(in oklch,var(--s2) 70%,transparent);color:var(--txt-mid);cursor:pointer;font-size:1.1rem;line-height:1;display:grid;place-items:center;transition:background .15s var(--ease),color .15s var(--ease)}
  .x:hover{background:var(--s3);color:var(--txt)}
  .panel-body{padding:18px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}

  .flow{display:flex;align-items:center;gap:14px}
  .flow .node{display:flex;flex-direction:column;gap:3px;align-items:center}
  .flow .node .nl{font-size:0.54rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--txt-dim);font-weight:600}
  .flow .node .nv{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:1.9rem;line-height:0.9}
  .flow .node .nv.win{color:var(--gold)}
  .flow .node .nv.dnf{color:var(--red);font-size:1.25rem}
  .flow .arrow{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt-dim)}
  .flow .arrow .delta{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.8rem}
  .flow .arrow .delta.up{color:var(--mover)}
  .flow .arrow .delta.down{color:var(--red)}
  .flow .arrow .track{width:100%;height:1px;background:var(--line);position:relative}
  .flow .arrow .track::after{content:"\203A";position:absolute;right:-2px;top:-11px;font-size:1rem}

  .badges{display:flex;gap:8px;flex-wrap:wrap}
  .badge{font-family:'Chakra Petch',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border:1px solid var(--line)}
  .badge.fl{color:var(--purple);border-color:color-mix(in oklch,var(--purple) 50%,var(--line))}
  .badge.spr{color:var(--amber);border-color:color-mix(in oklch,var(--amber) 45%,var(--line))}

  .story-box{border:1px solid color-mix(in oklch,var(--amber) 35%,var(--line));background:color-mix(in oklch,var(--amber) 7%,var(--s1));padding:12px 14px;display:flex;gap:10px}
  .story-box.mv{border-color:color-mix(in oklch,var(--mover) 35%,var(--line));background:color-mix(in oklch,var(--mover) 8%,var(--s1))}
  .story-box .sdot{flex:none;width:8px;height:8px;border-radius:50%;background:var(--amber);margin-top:6px}
  .story-box.mv .sdot{background:var(--mover)}
  .story-box .stext p{font-size:0.89rem;color:var(--txt);line-height:1.5}
  .story-box .stext p + p{margin-top:5px;color:var(--txt-mid);font-size:0.83rem}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line-soft);border:1px solid var(--line-soft)}
  .stat{background:var(--s1);padding:10px 12px;display:flex;flex-direction:column;gap:3px}
  .stat .sl{font-size:0.54rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--txt-dim);font-weight:600}
  .stat .sv{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.96rem}
  .stat .sv small{font-family:'Inter',sans-serif;font-weight:500;font-size:0.64rem;color:var(--txt-mid)}
  .stat.illus .sv{color:var(--txt-mid)}
  .stat.illus .sv::after{content:"~";color:var(--txt-dim);font-size:0.7rem;margin-left:2px}

  .tyres{display:flex;gap:5px;align-items:center}
  .tyre{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:0.64rem;border:2px solid}
  .tyre.S{border-color:var(--red);color:var(--red)}.tyre.M{border-color:var(--amber);color:var(--amber)}
  .tyre.H{border-color:var(--txt);color:var(--txt)}.tyre.I{border-color:var(--mover);color:var(--mover)}
  .tyre-arrow{color:var(--txt-dim);font-size:0.76rem}

  .report p{font-size:0.85rem;color:var(--txt-mid);line-height:1.55}
  .illus-note{font-size:0.64rem;color:var(--txt-dim);line-height:1.45}
  .illus-note b{color:var(--amber);font-weight:600}

  .h2h{display:flex;align-items:center;gap:12px;border:1px solid var(--line-soft);background:var(--s1);padding:12px 14px}
  .h2h .h2h-l{font-size:0.54rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--txt-dim);font-weight:600}
  .h2h .h2h-score{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:1.3rem;display:flex;align-items:baseline;gap:6px}
  .h2h .win-n{color:var(--gold)}.h2h .lose-n{color:var(--txt-mid)}
  .h2h .h2h-vs{font-size:0.74rem;color:var(--txt-mid);margin-left:auto;text-align:right}
  .h2h .h2h-vs b{color:var(--txt);font-weight:600}

  .traj{border:1px solid var(--line-soft);background:var(--s1);padding:12px 14px}
  .traj .tl{font-size:0.54rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--txt-dim);font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between}
  .traj svg{width:100%;height:50px;display:block}

  .season-list{display:flex;flex-direction:column;gap:1px;background:var(--line-soft);border:1px solid var(--line-soft)}
  .season-row{background:var(--s1);display:grid;grid-template-columns:30px 1fr auto auto;gap:12px;align-items:center;padding:9px 13px}
  .season-row .sr-rn{font-family:'JetBrains Mono',monospace;font-size:0.64rem;color:var(--txt-dim)}
  .season-row .sr-ev{font-size:0.79rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .season-row .sr-fin{font-family:'JetBrains Mono',monospace;font-size:0.77rem;font-weight:700}
  .season-row .sr-pts{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--txt-mid);min-width:26px;text-align:right}
  .section-h{font-family:'Chakra Petch',sans-serif;font-size:0.6rem;font-weight:600;letter-spacing:0.13em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:8px;display:block}

  footer{margin-top:18px;padding-top:12px;border-top:1px solid var(--line-soft);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:0.66rem;color:var(--txt-dim)}
  footer .num{color:var(--txt-mid)}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important}}
  @media (max-width:560px){
    .panel{width:100vw}
    .col-drv{min-width:100px}
    .drv-team{display:none}.drv-name .fn{display:none}
    .team-bar{height:22px}
    .leader-strip{width:100%}.leader-cell{flex:1}
    .stat-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
  <header class="mast">
    <div>
      <span class="eyebrow">FIA Formula 1 World Championship</span>
      <h1>2026 Season <b>/</b> Points Matrix</h1>
    </div>
    <div class="leader-strip" id="leaderStrip"></div>
  </header>

  <div class="controls">
    <div class="seg" role="tablist" aria-label="View">
      <button role="tab" aria-selected="true" data-view="drivers">Drivers Matrix</button>
      <button role="tab" aria-selected="false" data-view="constructors">Constructors</button>
    </div>
    <div class="legend" id="legend">
      <span><i class="sw win">1</i> Win</span>
      <span><i class="dot fl"></i> Fastest lap</span>
      <span><i class="sw story"></i> Story</span>
      <span><i class="sw mv"></i> Mover</span>
    </div>
  </div>

  <div id="stage">
    <div class="state"><span class="sp"></span><br>Loading the 2026 season\u2026</div>
  </div>

  <footer>
    <span>Standings computed live from race + sprint &middot; a lens of the F1 Racetracks app</span>
    <span>CHAMPIONSHIP MATRIX <span class="num" id="stamp">v1</span></span>
  </footer>

  <div class="scrim" id="scrim"></div>
  <aside class="panel" id="panel" role="dialog" aria-modal="false" aria-label="Profile"></aside>

<script>
const APP_VERSION='v1';
const DATA_BASE='../f1-results/2026/';
const TEAM_VAR={"Mercedes":"--t-mercedes","Ferrari":"--t-ferrari","McLaren":"--t-mclaren","Red Bull":"--t-redbull","Racing Bulls":"--t-racingbulls","Alpine":"--t-alpine","Aston Martin":"--t-astonmartin","Williams":"--t-williams","Haas":"--t-haas","Audi":"--t-audi","Cadillac":"--t-cadillac"};
const teamColor=t=>`var(${TEAM_VAR[t]||'--txt-dim'})`;

/* Illustrative per-cell granular detail (grid/best/pits/tyres/story tags).
   NOT in the JSON store yet \u2014 flagged as preview until sourced from OpenF1.
   Keyed round:driverId. Story keys resolve against STORY below. */
const STORY={"pole-to-win":"Converted pole to a lights-to-flag win.","streak":"Extended the winning streak from the front.","streak-end":"The race that ended the streak.","maiden":"A landmark maiden result.","charge":"Charged from P{grid} to P{finish}.","recovery":"Recovery drive from P{grid}.","lost-lead-rel":"Led before a reliability failure ended it.","reliability":"Retired with a mechanical failure while running strong.","late-sc":"A late safety car reshuffled the finish.","held-podium":"Managed the tyres to hold the podium.","undercut":"Jumped track position with an early stop.","appeal":"Result restored on appeal."};
const DETAIL={"8:86ae52qva":{grid:1,best:"1:06.983",pits:2,tyres:["M","H"],story:["pole-to-win"]},"8:86ae52rym":{grid:5,best:"1:07.112",pits:2,tyres:["M","H"],story:["charge"]},"5:86ae52qvh":{grid:3,best:"1:13.510",pits:2,tyres:["M","H"],story:["streak"]},"7:86ae52rxg":{grid:2,best:"1:15.880",pits:3,tyres:["S","M","M"],story:["maiden","undercut"]},"7:86ae52qvh":{grid:4,best:"1:15.990",pits:2,tyres:["M","H"],story:["streak-end","reliability"]},"9:86ae52rxd":{grid:6,best:"1:29.440",pits:1,tyres:["M","H"],story:["late-sc"]},"2:86ae52qvh":{grid:1,best:"1:35.275",pits:1,tyres:["M","H"],story:["pole-to-win","maiden"]}};
const renderStory=(keys,row)=>keys.map(k=>(STORY[k]||k).replace("{grid}",row.grid??"?").replace("{finish}",row.finish??"?"));

let ROUNDS=[],DRV={},STANDINGS=[],sortMode='champ';
const FIRST=id=>(DRV[id].name).replace("Andrea Kimi ","").split(" ")[0];
const LAST=id=>{const n=DRV[id].name;return n==="Andrea Kimi Antonelli"?"Antonelli":n.split(" ").slice(-1)[0];};

async function load(){
  try{
    const idx=await fetch(DATA_BASE+'index.json',{cache:'no-cache'}).then(r=>{if(!r.ok)throw 0;return r.json();});
    const files=idx.rounds.sort((a,b)=>a.round-b.round);
    ROUNDS=await Promise.all(files.map(f=>fetch(DATA_BASE+f.file.replace('./',''),{cache:'no-cache'}).then(r=>{if(!r.ok)throw 0;return r.json();})));
    compute();
    render();
  }catch(e){
    document.getElementById('stage').innerHTML='<div class="state">Could not load the season data.<br><span style="font-size:0.78rem">This lens reads the results store at <code>'+DATA_BASE+'</code>; it needs to run on GitHub Pages (same origin), not opened as a local file.</span></div>';
  }
}

function compute(){
  DRV={};
  ROUNDS.forEach(rd=>{
    const rows=[...(rd.classification||[]),...((rd.sprint&&rd.sprint.classification)||[])];
    rows.forEach(r=>{ if(r.driverId){ DRV[r.driverId]={name:r.driver,team:r.team}; } });
  });
  const race=id=>ROUNDS.reduce((t,rd)=>{const r=(rd.classification||[]).find(x=>x.driverId===id);return t+(r?r.points:0);},0);
  const spr=id=>ROUNDS.reduce((t,rd)=>{if(!rd.sprint)return t;const r=rd.sprint.classification.find(x=>x.driverId===id);return t+(r?r.points:0);},0);
  STANDINGS=Object.keys(DRV).map(id=>({id,name:DRV[id].name,team:DRV[id].team,race:race(id),sprint:spr(id),total:race(id)+spr(id)})).sort((a,b)=>b.total-a.total||LAST(a.id).localeCompare(LAST(b.id)));
  STANDINGS.forEach((d,i)=>d.champRank=i+1);
}

const raceRow=(rd,id)=>(rd.classification||[]).find(x=>x.driverId===id);
function wins(id){return ROUNDS.filter(rd=>{const r=raceRow(rd,id);return r&&r.pos===1;}).length;}
function bestFin(id){let b=99;ROUNDS.forEach(rd=>{const r=raceRow(rd,id);if(r&&r.status==='FIN'&&r.pos&&r.pos<b)b=r.pos;});return b;}
function teammate(id){const t=DRV[id].team;return Object.keys(DRV).find(k=>k!==id&&DRV[k].team===t);}
function h2h(id,mate){let me=0,them=0;ROUNDS.forEach(rd=>{const a=raceRow(rd,id),b=raceRow(rd,mate);if(a&&b&&a.status==='FIN'&&b.status==='FIN'){if(a.pos<b.pos)me++;else them++;}});return[me,them];}
function rankTrajectory(id){const cum={};Object.keys(DRV).forEach(k=>cum[k]=0);const tr=[];ROUNDS.forEach(rd=>{(rd.classification||[]).forEach(r=>cum[r.driverId]+=r.points);if(rd.sprint)rd.sprint.classification.forEach(r=>cum[r.driverId]+=r.points);const board=Object.keys(cum).sort((a,b)=>cum[b]-cum[a]);tr.push(board.indexOf(id)+1);});return tr;}

function cellMeta(rd,id){
  const r=raceRow(rd,id);if(!r)return null;
  const det=DETAIL[`${rd.round}:${id}`];
  const note=r.stewardNote?{text:r.stewardNote,onRoad:r.onRoadPos}:null;
  const gridDelta=(det&&det.grid&&r.pos)?det.grid-r.pos:null;
  const hasStory=!!(note||(det&&det.story&&det.story.length));
  const bigMover=gridDelta!==null&&gridDelta>=5;
  const dnfHot=r.status==='DNF'&&note;
  return{r,pos:r.pos,status:r.status,pts:r.points,det,note,gridDelta,hasStory,bigMover,dnfHot,hasDeep:!!det};
}

function orderedRows(){const rows=[...STANDINGS];if(sortMode==='champ')return rows;if(sortMode==='name')return rows.sort((a,b)=>LAST(a.id).localeCompare(LAST(b.id)));const rd=ROUNDS.find(x=>x.round===sortMode);const rank=id=>{const r=raceRow(rd,id);if(!r)return 999;if(r.status==='DNF')return 900;return r.pos;};return rows.sort((a,b)=>rank(a.id)-rank(b.id)||b.total-a.total);}

function render(){
  const roundsDesc=[...ROUNDS].sort((a,b)=>b.round-a.round);
  const L=STANDINGS[0],s2=STANDINGS[1];
  document.getElementById('leaderStrip').innerHTML=`<div class="leader-cell"><span class="k">Leader</span><span class="v" style="color:${teamColor(L.team)}">${LAST(L.id)} <span class="pts num">${L.total}</span></span></div><div class="leader-cell"><span class="k">Margin</span><span class="v num">+${L.total-s2.total}</span></div><div class="leader-cell"><span class="k">Rounds</span><span class="v num">${ROUNDS.length} <span class="pts">/ 22</span></span></div>`;
  document.getElementById('stamp').textContent=APP_VERSION;
  let head=`<tr><th class="col-pos"><div class="th-pad">#</div></th><th class="col-drv" data-active="${sortMode==='name'?1:0}"><div class="th-pad" data-sort="name">Driver<span class="sicon">\u21C5</span></div></th><th class="col-pts" data-active="${sortMode==='champ'?1:0}"><div class="th-pad" data-sort="champ">PTS<span class="sicon">\u21C5</span></div></th>`;
  roundsDesc.forEach(rd=>{head+=`<th class="rnd-h" data-sort="${rd.round}" data-active="${sortMode===rd.round?1:0}"><span class="rn num">R${rd.round}</span><span class="rc">${(rd.name.match(/\b([A-Z]{3})\b/)||[])[1]||rd.slug.slice(0,3).toUpperCase()}</span>${rd.sprint?'<span class="spr">SPR</span>':''}<span class="sicon">\u21C5</span></th>`;});
  head+=`</tr>`;
  let body='';
  orderedRows().forEach(d=>{
    body+=`<tr><td class="col-pos"><div class="pos-rank">${d.champRank}</div></td><td class="col-drv"><button class="drv" data-driver="${d.id}"><span class="team-bar" style="--team:${teamColor(d.team)}"></span><span class="drv-id"><span class="drv-name"><span class="fn">${FIRST(d.id)} </span>${LAST(d.id)}</span><span class="drv-team">${d.team}</span></span></button></td><td class="col-pts"><div class="tot num">${d.total}</div></td>`;
    roundsDesc.forEach(rd=>{
      const m=cellMeta(rd,d.id);
      if(!m){body+=`<td><div class="cell empty"><span class="cp">&mdash;</span></div></td>`;return;}
      let cls='cell';
      if(m.status==='DNF')cls+=' dnf';else if(m.pos===1)cls+=' win';else if(m.pos===2)cls+=' p2';else if(m.pos===3)cls+=' p3';else if(m.pts===0)cls+=' zero';
      if(m.hasStory&&m.status!=='DNF')cls+=' story';else if(m.dnfHot)cls+=' dnfhot';else if(m.bigMover)cls+=' mover';
      let inner=m.status==='DNF'?`<span class="cp">DNF</span>`:`<span class="cp">${m.pos}</span>`+(m.pts>0?`<span class="cpts">+${m.pts}</span>`:'');
      const sp=rd.sprint?rd.sprint.classification.find(x=>x.driverId===d.id):null;
      if(sp&&sp.points>0)inner+=`<span class="sprmark">S+${sp.points}</span>`;
      if(rd.fastestLap&&rd.fastestLap.driverId===d.id)inner+=`<span class="flmark"></span>`;
      if(m.hasDeep)inner+=`<span class="deep"></span>`;
      body+=`<td><button class="cell ${cls}" data-cell="${rd.round}:${d.id}">${inner}</button></td>`;
    });
    body+=`</tr>`;
  });
  // constructors
  const map={};STANDINGS.forEach(d=>{map[d.team]=map[d.team]||{team:d.team,total:0,wins:0};map[d.team].total+=d.total;});
  ROUNDS.forEach(rd=>{const w=(rd.classification||[]).find(x=>x.pos===1);if(w)map[DRV[w.driverId].team].wins++;});
  const wrows=Object.values(map).sort((a,b)=>b.total-a.total);const wmax=wrows[0].total;
  const wcc=wrows.map((t,i)=>`<div class="wcc-row"><div class="wcc-rank num">${i+1}</div><div class="wcc-bar" style="--team:${teamColor(t.team)}"></div><div class="wcc-name">${t.team}</div><div class="wcc-wins">${t.wins} ${t.wins===1?'win':'wins'}</div><div class="wcc-pts num">${t.total}</div><div class="wcc-track" style="--team:${teamColor(t.team)};width:${(t.total/wmax*100).toFixed(1)}%"></div></div>`).join('');
  document.getElementById('stage').innerHTML=`<div class="scroll-wrap" id="matrixWrap"><table class="matrix"><thead>${head}</thead><tbody>${body}</tbody></table></div><div class="wcc hidden" id="wccWrap">${wcc}</div>`;
}

function teamChip(t){return `<span class="panel-team"><span class="team-bar" style="--team:${teamColor(t)}"></span>${t}</span>`;}
function tyreChips(arr){return arr?`<div class="tyres">`+arr.map((c,i)=>`${i>0?'<span class="tyre-arrow">\u203A</span>':''}<span class="tyre ${c}">${c}</span>`).join('')+`</div>`:'';}

function raceBrief(roundNo,id){
  const rd=ROUNDS.find(x=>x.round==roundNo);const m=cellMeta(rd,id);const det=m.det||{};const finish=m.status==='DNF'?'DNF':m.pos;det.finish=finish;
  const name=DRV[id].name,team=DRV[id].team;const isFL=rd.fastestLap&&rd.fastestLap.driverId===id,isPole=rd.pole&&rd.pole.driverId===id;
  const sp=rd.sprint?rd.sprint.classification.find(x=>x.driverId===id):null;const total=(sp?sp.points:0)+m.pts;
  let badges='';if(isPole)badges+=`<span class="badge">Pole</span>`;if(isFL)badges+=`<span class="badge fl">Fastest Lap</span>`;if(sp)badges+=`<span class="badge spr">Sprint P${sp.pos} \u00B7 +${sp.points}</span>`;
  let flow;if(det.grid){const gd=m.gridDelta,dcls=gd>0?'up':(gd<0?'down':''),dtxt=gd>0?`\u25B2 +${gd}`:(gd<0?`\u25BC ${gd}`:'\u2013 held');flow=`<div class="flow"><div class="node"><span class="nl">Grid</span><span class="nv num">${det.grid}</span></div><div class="arrow"><span class="delta ${dcls} num">${m.status==='DNF'?'':dtxt}</span><span class="track"></span></div><div class="node"><span class="nl">Finish</span><span class="nv ${finish===1?'win':''} ${m.status==='DNF'?'dnf':''} num">${m.status==='DNF'?'DNF':'P'+finish}</span></div></div>`;}else{flow=`<div class="flow"><div class="node"><span class="nl">Finish</span><span class="nv ${finish===1?'win':''} ${m.status==='DNF'?'dnf':''} num">${m.status==='DNF'?'DNF':'P'+finish}</span></div></div>`;}
  const noteText=m.note?m.note.text:null;const tagText=(det.story&&det.story.length)?renderStory(det.story,det):[];let storyHtml='';if(noteText||tagText.length){const isMv=!m.note&&m.bigMover;storyHtml=`<div class="story-box ${isMv?'mv':''}"><span class="sdot"></span><div class="stext">${noteText?`<p>${noteText}${m.note.onRoad?` <b>(on road: P${m.note.onRoad})</b>`:''}</p>`:''}${tagText.map(t=>`<p>${t}</p>`).join('')}</div></div>`;}
  const hasIllus=!!det.grid;const il=hasIllus?'illus':'';let stats=`<div class="stat-grid"><div class="stat"><span class="sl">Race Pts</span><span class="sv num">${m.pts}</span></div><div class="stat"><span class="sl">Sprint</span><span class="sv num">${sp?sp.points:'&mdash;'}</span></div><div class="stat"><span class="sl">Total</span><span class="sv num">${total}</span></div>`;if(det.best)stats+=`<div class="stat ${il}"><span class="sl">Best Lap</span><span class="sv num">${det.best}</span></div>`;if(det.pits!=null)stats+=`<div class="stat ${il}"><span class="sl">Pits</span><span class="sv num">${det.pits}</span></div>`;if(det.tyres)stats+=`<div class="stat ${il}"><span class="sl">Tyres</span>${tyreChips(det.tyres)}</div>`;stats+=`</div>`;
  const illusNote=hasIllus?`<div class="illus-note"><b>Preview:</b> grid, lap, pits and tyres are illustrative; verified values (OpenF1) fill these once sourced.</div>`:'';
  return `<div class="panel-head" style="--team:${teamColor(team)}"><div><div class="panel-ey">R${rd.round} \u00B7 ${rd.name}${rd.sprint?' \u00B7 Sprint':''}</div><div class="panel-drv">${name}</div>${teamChip(team)}</div><button class="x" aria-label="Close">&times;</button></div><div class="panel-body">${flow}${badges?`<div class="badges">${badges}</div>`:''}${storyHtml}${stats}<div class="report">${rd.summary?`<p>${rd.summary}</p>`:''}</div>${illusNote}</div>`;
}

function seasonBrief(id){
  const d=STANDINGS.find(x=>x.id===id),w=wins(id),best=bestFin(id);
  const rows=ROUNDS.map(rd=>{const r=raceRow(rd,id);const sp=rd.sprint?rd.sprint.classification.find(x=>x.driverId===id):null;let fin='&mdash;',pts=0;if(r){fin=r.status==='DNF'?'DNF':'P'+r.pos;pts=r.points+(sp?sp.points:0);}const cd=(rd.name.match(/\b([A-Z]{3})\b/)||[])[1]||rd.slug.slice(0,3).toUpperCase();return `<div class="season-row"><span class="sr-rn num">R${rd.round}</span><span class="sr-ev">${cd} \u00B7 ${rd.name.replace(' Grand Prix','')}</span><span class="sr-fin num" style="color:${r&&r.pos===1?'var(--gold)':r&&r.status==='DNF'?'var(--red)':'var(--txt)'}">${fin}</span><span class="sr-pts num">${pts||''}</span></div>`;}).join('');
  const mate=teammate(id);let h2hHtml='';if(mate){const[me,them]=h2h(id,mate);h2hHtml=`<div class="h2h"><div><div class="h2h-l">Teammate H2H</div><div class="h2h-score"><span class="${me>=them?'win-n':'lose-n'}">${me}</span><span style="color:var(--txt-dim);font-size:0.9rem">\u2013</span><span class="${them>me?'win-n':'lose-n'}">${them}</span></div></div><div class="h2h-vs">race finishes<br>vs <b>${LAST(mate)}</b></div></div>`;}
  const tr=rankTrajectory(id);const N=tr.length;const maxR=Math.max(...tr,3);const pts=tr.map((rk,i)=>[N>1?(i/(N-1))*100:0,((rk-1)/(maxR-1))*100]);const poly=pts.map(p=>`${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');const dots=pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${i===N-1?3.5:2}" fill="${i===N-1?teamColor(d.team):'var(--txt-dim)'}"/>`).join('');const traj=`<div class="traj"><div class="tl"><span>Championship Position</span><span class="num" style="color:var(--txt-mid)">R1 \u2192 R${N}</span></div><svg viewBox="-4 -6 108 112" preserveAspectRatio="none"><polyline points="${poly}" fill="none" stroke="${teamColor(d.team)}" stroke-width="2" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>${dots}</svg></div>`;
  return `<div class="panel-head" style="--team:${teamColor(d.team)}"><div><div class="panel-ey">Season \u00B7 Championship P${d.champRank}</div><div class="panel-drv">${d.name}</div>${teamChip(d.team)}</div><button class="x" aria-label="Close">&times;</button></div><div class="panel-body"><div class="stat-grid"><div class="stat"><span class="sl">Total</span><span class="sv num" style="color:${d.champRank===1?'var(--gold)':'var(--txt)'}">${d.total}</span></div><div class="stat"><span class="sl">Pos</span><span class="sv num">P${d.champRank}</span></div><div class="stat"><span class="sl">Race / Spr</span><span class="sv num">${d.race}<small> / ${d.sprint}</small></span></div><div class="stat"><span class="sl">Wins</span><span class="sv num">${w}</span></div><div class="stat"><span class="sl">Best</span><span class="sv num">${best===99?'&mdash;':'P'+best}</span></div><div class="stat"><span class="sl">Rounds</span><span class="sv num">${ROUNDS.length}</span></div></div>${h2hHtml}${traj}<div><span class="section-h">Round by round</span><div class="season-list">${rows}</div></div></div>`;
}

const scrim=document.getElementById('scrim'),panel=document.getElementById('panel');
function openPanel(html,team){panel.style.setProperty('--team',teamColor(team));panel.innerHTML=html;panel.classList.add('open');scrim.classList.add('open');panel.querySelector('.x')?.focus();}
function closePanel(){panel.classList.remove('open');scrim.classList.remove('open');}

document.addEventListener('click',e=>{
  const sortEl=e.target.closest('[data-sort]');if(sortEl){const v=sortEl.dataset.sort;sortMode=(v==='champ'||v==='name')?v:parseInt(v,10);render();return;}
  const cell=e.target.closest('[data-cell]');if(cell){const[rn,id]=cell.dataset.cell.split(':');openPanel(raceBrief(rn,id),DRV[id].team);return;}
  const drv=e.target.closest('[data-driver]');if(drv){openPanel(seasonBrief(drv.dataset.driver),DRV[drv.dataset.driver].team);return;}
  if(e.target.closest('.x')){closePanel();return;}
  const seg=e.target.closest('.seg button');if(seg){document.querySelectorAll('.seg button').forEach(b=>b.setAttribute('aria-selected','false'));seg.setAttribute('aria-selected','true');const drivers=seg.dataset.view==='drivers';const mw=document.getElementById('matrixWrap'),ww=document.getElementById('wccWrap');if(mw)mw.classList.toggle('hidden',!drivers);if(ww)ww.classList.toggle('hidden',drivers);document.getElementById('legend').classList.toggle('off',!drivers);}
});
scrim.addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

load();
</script>
</body>
</html>
