<!DOCTYPE html>
<!-- INFRASTRUCTURE: slim loader shell. SEGMENTED app: styling in source/standings/*.css, logic in source/standings/*.js. Every file under the 12KB soft cap. Never inline this back into one file. -->
<!-- DATA: modules fetch the canonical per-round store at ./f1-results/2026/ (index_rounds.json + round files). No data duplicated here. -->
<!-- v6.1: nav model — Weekend is a per-round drill-through, switcher is Matrix / History / Circuits. -->
<!-- v6.3: cohesion pass — standings palette + ease unified to the shared hue-268 system; shared F1 brand lockup added to the nav appbar; suave stage-reveal on view swap. -->
<!-- v6.4: matrix density — row/header/type/team-bar/WCC tightened so more drivers show per screen. ?v bumped across modules. -->
<!-- v6.5: seamless cross-lens nav — cross-document View Transitions (cross-fade instead of hard reload) + persistent F1 brand morph shared with the circuits lens. -->
<!-- v10 (history feed): history.js restyled into a social/activity feed (timeline + post cards, no side-stripe). Module + css ?v bumped 6.5 -> 6.6 so clients refetch; footer stamp -> v6.6. -->
<!-- v6.7: driver popup race-pace strip now reads REAL per-driver fastLap {time,lap} from the store (backfilled r1-9) with the lap number + round-FL purple pip; stale illustrative note refreshed. panel.js ?v 6.6 -> 6.7; footer stamp -> v6.7. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#17171d">
<title>2026 F1 Championship Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;450;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="source/standings/base.css?v=6.6">
<link rel="stylesheet" href="source/standings/panel.css?v=6.6">
<style>
  html{background:oklch(0.16 0.012 268)}
  /* seamless cross-lens navigation: same-origin cross-document view transitions
     so moving to the Circuits lens cross-fades instead of a hard page reload. */
  @view-transition{navigation:auto}
  ::view-transition-old(root),::view-transition-new(root){animation-duration:.32s;animation-timing-function:cubic-bezier(0.16,1,0.3,1)}
  @media (prefers-reduced-motion:reduce){::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important}}
  /* the red F1 lockup persists/morphs across the navigation (shared name with circuits.html). */
  .brand{view-transition-name:f1-brand}
</style>
</head>
<body>
  <header class="mast">
    <div>
      <span class="eyebrow">FIA Formula 1 World Championship</span>
      <h1>2026 Season <b>/</b> Points Matrix</h1>
    </div>
    <div class="leader-strip" id="leaderStrip"></div>
  </header>

  <div class="controls">
    <div class="seg" role="tablist" aria-label="View">
      <button role="tab" aria-selected="true" data-view="drivers">Drivers Matrix</button>
      <button role="tab" aria-selected="false" data-view="constructors">Constructors</button>
    </div>
    <div class="legend" id="legend">
      <span><i class="sw win">1</i> Win</span>
      <span><i class="dot fl"></i> Fastest lap</span>
      <span><i class="sw story"></i> Story</span>
      <span><i class="sw mv"></i> Mover</span>
    </div>
  </div>

  <div id="stage">
    <div class="state"><span class="sp"></span><br>Loading the 2026 season&hellip;</div>
  </div>

  <footer>
    <span>Championship Matrix <span class="num" id="stamp">v6.7</span></span>
    <span>canonical store</span>
  </footer>

  <div class="scrim" id="scrim"></div>
  <aside class="panel" id="panel" role="dialog" aria-modal="false" aria-label="Profile"></aside>

  <script src="source/standings/data.js?v=6.6"></script>
  <script src="source/standings/matrix.js?v=6.6"></script>
  <script src="source/standings/trajectory.js?v=6.6"></script>
  <script src="source/standings/panel.js?v=6.7"></script>
  <script src="source/standings/nav.js?v=6.6"></script>
  <script src="source/standings/history.js?v=6.6"></script>
</body>
</html>
