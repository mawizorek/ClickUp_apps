<body>
  <div class="wrap">
    <div class="topbar">

        <span class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M3 17c4-1 6-9 10-9 3 0 4 3 8 2" stroke="white" stroke-width="2.4" stroke-linecap="round"></path><circle cx="6" cy="16.5" r="1.7" fill="white"></circle></svg></span>
        <span class="t">F1 Racetracks<small>2026 Circuit Breakdowns</small></span>

    </div>

    <footer class="app">
      <span class="meta-txt" id="foot-meta">F1 Racetracks v5 · loading data…</span>
      <div class="toolbar">
        <button class="tool" id="t-copy" title="Copy the full page source to your clipboard">Copy source</button>
        <button class="tool" id="t-prep" title="Build a Save link you click to download the .html">Prepare download</button>
        <button class="tool" id="t-tab" title="Open the raw source in a new tab, then Cmd/Ctrl+S to save">Open in new tab</button>
        <button class="tool" id="t-data" title="Export the current resolved data as JSON">Export data (.json)</button>

      </div>
    </footer>
  </div>
  <script>
    const APP_VERSION="v5";
    const APP_DATE="2026-07-03";
    const SEASON="2026";
    const CACHE_KEY="f1-racetracks-data-cache-v5";
    const TEAM_COLORS={Mercedes:"#6CD3BF",Ferrari:"#FF5A60",McLaren:"#FF9B3B","Red Bull":"#6EA8FF",RedBull:"#6EA8FF",Williams:"#7DB6FF",Alpine:"#7DE3FF","Racing Bulls":"#C0C8FF",AstonMartin:"#66D1A7",Aston:"#66D1A7"};
    let TRACKS=[];let bySlug={};let reportTracks=[];let raceResults={};let historicWinners={};let appDataMeta={};
    const SECCOL={s1:'var(--s1)',s2:'var(--s2)',s3:'var(--s3)'},SN={s1:'S1',s2:'S2',s3:'S3'};
    const app=document.getElementById('app');const jump=document.getElementById('jump');const NS="http://www.w3.org/2000/svg";
    const E=(t,a={})=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
    const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    const lastName=name=>String(name||'').trim().split(/\s+/).slice(-1)[0]||name||'';
    const teamTone=team=>TEAM_COLORS[team]||'#D7DCE4';
    function footerText(target){const cacheNote=appDataMeta.fromCache?' · cached data':'';return target?`F1 Racetracks ${APP_VERSION} · Round ${target.round} · ${target.title}${cacheNote}`:`F1 Racetracks ${APP_VERSION} · ${reportTracks.length} breakdowns · ${TRACKS.length} rounds${cacheNote}`;}
    function updateFooterMeta(target){document.getElementById('foot-meta').textContent=footerText(target||null);}
    function buildJump(){jump.innerHTML='<option value="">Jump to circuit…</option>'+TRACKS.map(t=>`<option value="${t.slug}">R${t.round} · ${esc(t.gp)}${t.report?'':' (soon)'}</option>`).join('');}
    function parseSourceArray(source){const match=source.match(/const\s+\w+\s*=\s*(\[[\s\S]*\]);?\s*$/);if(!match) throw new Error('Could not parse track source file');return Function(`"use strict"; return (${match[1]})`)();}
    async function loadResolvedData(){
      try{
        const res=await fetch('./data.json',{cache:'no-store'});if(!res.ok) throw new Error(`data.json ${res.status}`);
        const manifest=await res.json();let tracks=Array.isArray(manifest.tracks)?manifest.tracks:null;
        if(!tracks&&manifest.mode==='manifest'&&Array.isArray(manifest.track_source_files)){
          const chunks=await Promise.all(manifest.track_source_files.map(async path=>parseSourceArray(await (await fetch(path,{cache:'no-store'})).text())));
          tracks=chunks.flat();
        }
        if(!Array.isArray(tracks)||!tracks.length) throw new Error('Track data unavailable');
        const resolved={version:manifest.version||APP_DATE,season:manifest.season||Number(SEASON),tracks,raceResults:manifest.raceResults||{},historicWinners:manifest.historicWinners||{},sourceMode:manifest.mode||'inline'};
        localStorage.setItem(CACHE_KEY,JSON.stringify(resolved));
        return resolved;
      }catch(err){
        const cached=localStorage.getItem(CACHE_KEY);if(cached){const parsed=JSON.parse(cached);parsed.fromCache=true;return parsed;}throw err;
      }
    }
    function applyData(data){TRACKS=data.tracks||[];raceResults=data.raceResults||{};historicWinners=data.historicWinners||{};appDataMeta=data;bySlug=Object.fromEntries(TRACKS.map(t=>[t.slug,t]));reportTracks=TRACKS.filter(t=>t.report);buildJump();router();}
    function renderDataUnavailable(error){app.innerHTML=`<div class="view"><div class="home-h"><p class="eyebrow">Circuit Breakdowns // ${SEASON} FIA Formula 1 World Championship</p><h1>F1 Racetracks</h1><p class="sub">The engine loaded, but the external data file did not.</p></div><div class="card empty-card"><div class="panel-b" style="padding:22px 4px"><p class="note">Couldn’t load <code>data.json</code>. Keep the HTML beside <code>data.json</code> on the same origin, or open the hosted GitHub Pages version once to seed the offline cache.</p></div></div></div>`;document.getElementById('foot-meta').textContent='F1 Racetracks v5 · data unavailable';console.error(error);}
    function router(){const slug=(location.hash.replace(/^#\/?/,'')||'').trim();if(slug&&bySlug[slug]) renderTrack(bySlug[slug]);else renderHome();jump.value=bySlug[slug]?slug:'';window.scrollTo(0,0);if(window.lucide) lucide.createIcons();updateFooterMeta(slug&&bySlug[slug]?bySlug[slug]:null);}window.addEventListener('hashchange',router);
    function renderHome(){const built=reportTracks.length;app.innerHTML=`<div class="view"><div class="home-h"><p class="eyebrow">Circuit Breakdowns // ${SEASON} FIA Formula 1 World Championship</p><h1>F1 Racetracks</h1><p class="sub">Home base for every round’s technical track report. Click a circuit to open its full breakdown: official map, lap profile with elevation, DRS and sectors, tyre strategy, overtaking, live weather, and the new completed-race podium / pole / winners panels.</p></div><div class="legend"><span class="lg"><span class="d" style="background:var(--done)"></span>Completed race</span><span class="lg"><span class="d" style="background:var(--active)"></span>Race weekend live</span><span class="lg"><span class="d" style="background:var(--line)"></span>Upcoming</span><span class="lg"><span class="badge b-report" style="padding:2px 6px"><span class="d" style="background:var(--done)"></span>Breakdown ready</span></span></div><div class="grid" id="grid"></div></div>`;const grid=document.getElementById('grid');TRACKS.forEach(t=>{const b=document.createElement('button');b.className='race';if(!t.report)b.disabled=true;else b.onclick=()=>location.hash='#/'+t.slug;const ss=t.status==='done'?'ss-done':t.status==='active'?'ss-active':'ss-pending';b.innerHTML=`<span class="status-stripe ${ss}"></span><div class="rd"><span>Round ${String(t.round).padStart(2,'0')}</span><span class="flag">${t.flag}</span></div><div class="gp">${esc(t.gp)}</div><div class="circ">${esc(t.title)}</div><div class="foot"><span class="date">${t.date} ${SEASON}</span>${t.report?'<span class="badge b-report"><span class="d" style="background:var(--done)"></span>Breakdown</span>':'<span class="badge b-soon">Soon</span>'}</div>`;grid.appendChild(b);});}
    function renderPodium(result){if(!result||!result.winner||!result.p2||!result.p3) return '';const steps=[{label:'P2',cls:'p2',driver:result.p2,team:result.p2Team},{label:'P1',cls:'p1',driver:result.winner,team:result.team},{label:'P3',cls:'p3',driver:result.p3,team:result.p3Team}];return `<article class="card podium-card"><div class="podium-top"><div><div class="tag">Race podium</div><h2>Completed-race finish</h2></div><div class="tag">${esc(result.team||'')}</div></div><div class="podium-steps">${steps.map(step=>`<div class="podium-step ${step.cls}"><span class="step-badge">${step.label}</span><div class="step-driver">${esc(lastName(step.driver))}</div><div class="step-team" style="color:${teamTone(step.team)}">${esc(step.team)}</div><span class="step-pos">${esc(step.driver)}</span></div>`).join('')}</div>${result.summary?`<p class="race-summary">${esc(result.summary)}</p>`:''}${result.fastestLap?`<p class="fastest-lap">Fastest lap · <b>${esc(result.fastestLap.driver)}</b> · ${esc(result.fastestLap.time)}${result.fastestLap.lap?` · Lap ${result.fastestLap.lap}`:''}</p>`:''}</article>`;}
    function renderPole(result){const pole=result&&result.pole;if(!pole) return '';return `<article class="pole-panel"><div class="pole-kicker"><div><div class="tag">Pole position</div><h3>Qualifying snapshot</h3></div><div class="tag">Saturday pace</div></div><div class="pole-big">${esc(lastName(pole.driver))}<small>${esc(pole.team||'')}</small></div><div class="pole-meta"><div class="pole-chip"><span class="k">Pole time</span><span class="v">${esc(pole.time||'TBC')}</span></div><div class="pole-chip"><span class="k">Gap to P2</span><span class="v">${esc(pole.gapToP2||'TBC')}</span></div></div>${Array.isArray(pole.top5)&&pole.top5.length?`<table class="quali-mini"><thead><tr><th>Driver</th><th>Time</th></tr></thead><tbody>${pole.top5.map(row=>`<tr><td>${esc(lastName(row.driver))}<div style="font-size:.72rem;color:${teamTone(row.team)};margin-top:2px">${esc(row.team)}</div></td><td>${esc(row.time)}</td></tr>`).join('')}</tbody></table>`:''}</article>`;}
    function renderHistory(slug){const rows=historicWinners[slug]||[];return `<section class="block"><div class="history-board"><div class="history-head"><div><div class="tag">Race history</div><h2>Winners</h2></div><div class="tag">Most recent first</div></div><div class="history-list">${rows.length?rows.map(row=>`<div class="history-row"><div class="year">${row.year}</div><div class="driver">${esc(row.driver)}</div><div class="team">${esc(row.team)}</div></div>`).join(''):'<div class="history-empty">Historic winners seed is ready in <code>data.json</code> — add more rows here without touching the UI.</div>'}</div></div></section>`;}
    function renderTrack(t){if(!t.report){renderSoon(t);return;}const idx=reportTracks.findIndex(x=>x.slug===t.slug);const prev=reportTracks[idx-1],next=reportTracks[idx+1];const vals=t.profile.map(p=>p[1]);const aslLow=Math.round(t.asl0+Math.min(...vals)),aslHigh=Math.round(t.asl0+Math.max(...vals)),aslSF=Math.round(t.asl0+t.profile[0][1]);const result=raceResults[t.slug]||null;const featureMarkup=(result&& (renderPodium(result)||renderPole(result)))?`<section class="feature-grid">${renderPodium(result)}${renderPole(result)}</section>`:'';app.innerHTML=`<div class="view"><div class="crumb"><a href="#/">F1 Racetracks</a><span class="sep">/</span>Round ${t.round} · ${esc(t.gp)}</div><p class="eyebrow">Circuit Breakdown <span>// Round ${String(t.round).padStart(2,'0')} · ${esc(t.gp)}${t.status==='active'?' · live':''}</span></p><h1 class="track">${esc(t.title)}</h1><p class="sub">${esc(t.sub)}</p><dl class="meta"><div><dt>Location</dt><dd>${esc(t.loc)} <small>${t.cc}</small></dd></div><div><dt>Length</dt><dd>${t.length} <small>km</small></dd></div><div><dt>Turns</dt><dd>${t.turns}</dd></div><div><dt>Race</dt><dd>${t.laps} <small>laps</small></dd></div><div><dt>DRS zones</dt><dd>${t.drsZones}</dd></div><div><dt>Elevation</dt><dd>${aslLow}–${aslHigh} <small>m ASL</small></dd></div><div><dt>Top speed</dt><dd>${esc(t.topSpeed)} <small>km/h</small></dd></div><div><dt>Lap record</dt><dd>${esc(t.record)}</dd></div></dl>${featureMarkup}<div class="card"><div class="card-h"><span class="tag">${esc(t.mapTag)}</span></div><div class="plate"><img loading="lazy" src="https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(t.mapFile)}" alt="Official ${esc(t.title)} outline map" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div class=&quot;ph&quot;>Map image unavailable yet. File: ${esc(t.mapFile)}</div>')"></div><div class="map-cap"><span>Official outline + turn numbers</span><span>Map: ${esc(t.mapCredit)}</span></div></div><div class="card"><div class="card-h"><span class="tag">Lap profile · elevation · DRS · sectors</span><span class="lap">Pole ref <b>${esc(t.poleRef)}</b></span></div><svg class="profile" id="profile" viewBox="0 0 1000 330" role="img" aria-label="${esc(t.title)} lap profile"></svg><div class="legend-row"><span class="lr"><span class="ln"></span>Elevation, m ASL (${aslLow}–${aslHigh} m)</span><span class="lr"><span class="sf"></span>S/F line ${aslSF} m</span><span class="lr"><span class="dia"></span>DRS detection → activation</span><span class="lr"><span class="sw" style="background:var(--s1)"></span>S1</span><span class="lr"><span class="sw" style="background:var(--s2)"></span>S2</span><span class="lr"><span class="sw" style="background:var(--s3)"></span>S3</span></div><div class="sb-cols" id="sb-cols"></div></div><div class="info2"><div class="panel"><div class="panel-h"><i data-lucide="circle-gauge"></i><h3>Pit lane & stops</h3></div><div class="panel-b">${t.pit.map(p=>`<div class="kv"><span class="k">${esc(p[0])}</span><span class="v">${esc(p[1])}${p[2]?`<small>${esc(p[2])}</small>`:''}</span></div>`).join('')}</div></div><div class="panel"><div class="panel-h"><i data-lucide="disc"></i><h3>Tyre strategy</h3></div><div class="panel-b"><div class="tyres">${t.tyres.map((y,j)=>`<div class="tyre" style="--c:${['oklch(85% 0.005 264)','oklch(80% 0.16 95)','var(--red)'][j]}"?><span class="ring">${y[0]}</span><span><b>${y[1]}</b></span></div>`).join('')}</div><div class="kv"><span class="k">Allocation</span><span class="v">${esc(t.tyreAlloc.split(' · ')[0])}<small>${esc(t.tyreAlloc.split(' · ')[1]||'')}</small></span></div><div class="strat">${t.strat.map(s=>`<div class="row"><span class="tg ${s[0]}">${esc(s[1])}</span><span class="seq">${esc(s[2])}</span></div>`).join('')}</div><p class="note">${esc(t.stratNote)}</p></div></div><div class="panel"><div class="panel-h"><i data-lucide="swords"></i><h3>Overtaking</h3></div><div class="panel-b"><div class="rate"><div class="score">${typeof t.otScore==='number'?t.otScore.toFixed(1):t.otScore}<small> / 5</small></div><div class="meter"><i style="width:${t.otPct}%"></i></div><div class="word">${esc(t.otWord)}</div></div><div class="spots">${t.spots.map(s=>`<div class="s"><b>${esc(s[0])}</b><span>${esc(s[1])}</span></div>`).join('')}</div><p class="note">${esc(t.otNote)}</p></div></div></div><div class="wx"><div class="wx-head"><h2><i data-lucide="cloud-sun"></i>Race-weekend forecast</h2><span class="wx-stamp" id="wx-stamp">Loading…</span></div><div id="wx-body"><div class="wx-loading">Fetching the latest ${esc(t.loc)} forecast…</div></div></div><section class="block"><div class="h2"><h2>Corner-by-corner</h2><span class="count">${t.turns} turns</span></div><table class="tbl"><thead><tr><th>#</th><th>Name</th><th>Sector</th><th>Type</th><th>Notes</th></tr></thead><tbody id="tbody"></tbody></table></section><section class="block"><div class="h2"><h2>Track character & geography</h2></div><div class="geo">${t.geo.map(g=>`<article><h3><i data-lucide="${g[0]}"></i>${esc(g[1])}</h3><p>${esc(g[2])}</p></article>`).join('')}</div></section>${renderHistory(t.slug)}<div class="prevnext"><button class="pn" ${prev?'':'disabled'} ${prev?`onclick="location.hash='#/${prev.slug}'"`:''}><div class="lbl">← Previous</div><div class="nm">${prev?esc(prev.gp):'—'}</div></button><button class="pn next" ${next?'':'disabled'} ${next?`onclick="location.hash='#/${next.slug}'"`:''}><div class="lbl">Next →</div><div class="nm">${next?esc(next.gp):'—'}</div></button></div></div>`;buildProfile(t);const cols=document.getElementById('sb-cols');t.sectors.forEach(s=>{const c=document.createElement('div');c.className='sb-col';c.innerHTML=`<div class="top"><span class="pill" style="background:${SECCOL[s.k]}"></span><span class="name">${s.name}</span></div><div class="corners">${esc(s.corners)}</div><div class="time">${s.time}<small> s · approx</small></div><div class="char">${esc(s.char)}</div>`;cols.appendChild(c);});const tb=document.getElementById('tbody');t.corners.forEach(c=>{const tr=document.createElement('tr');tr.innerHTML=`<td class="tnum">T${c[0]}</td><td class="tname">${esc(c[1])}</td><td><span class="secdot"><span class="dot" style="background:${SECCOL[c[2]]}"></span>${SN[c[2]]}</span></td><td class="ttype">${esc(c[3])}</td><td class="tnote">${esc(c[4])}</td>`;tb.appendChild(tr);});loadWeather(t);}
    function renderSoon(t){app.innerHTML=`<div class="view"><div class="crumb"><a href="#/">F1 Racetracks</a><span class="sep">/</span>Round ${t.round} · ${esc(t.gp)}</div><p class="eyebrow">Circuit Breakdown <span>// Round ${String(t.round).padStart(2,'0')} · ${esc(t.gp)}</span></p><h1 class="track">${esc(t.title)}</h1><p class="sub">${esc(t.loc)}, ${t.cc} · ${t.date} ${SEASON}. Full breakdown not built yet. It’ll be generated ahead of the race weekend using the Circuit Breakdown generator.</p><div class="card loading-card"><div class="panel-b" style="padding:30px 4px"><p class="note">Coming soon. <a href="#/" style="color:var(--drs)">← Back to all circuits</a></p></div></div>${renderHistory(t.slug)}</div>`;}
    function buildProfile(t){const svg=document.getElementById('profile');const W=1000,PAD=58,EB=210,ET=52,BARY=250,BARH=26;const elevMin=0,elevMax=t.elevMax;const X=d=>PAD+d*(W-PAD*2),Y=m=>EB-((m-elevMin)/(elevMax-elevMin))*(EB-ET);const asl=v=>Math.round(t.asl0+v);t.drs.forEach(z=>{svg.appendChild(E('rect',{x:X(z.from),y:ET-6,width:X(z.to)-X(z.from),height:(BARY+BARH)-(ET-6),fill:'oklch(64% 0.2 145/.13)',stroke:'oklch(64% 0.2 145/.4)','stroke-width':1,rx:3}));const fl=E('text',{x:X(z.from)+4,y:ET+6,fill:'var(--drs)','font-size':(t.drs.length>3?9.5:11),'font-weight':600,'font-family':'IBM Plex Mono, monospace'});fl.textContent=z.label+(t.drs.length>3?'':' ▸');svg.appendChild(fl);});const defs=E('defs');const grad=E('linearGradient',{id:'eg',x1:0,y1:0,x2:0,y2:1});grad.appendChild(E('stop',{offset:'0%','stop-color':'var(--elev)','stop-opacity':.32}));grad.appendChild(E('stop',{offset:'100%','stop-color':'var(--elev)','stop-opacity':.02}));defs.appendChild(grad);svg.appendChild(defs);const area=d3.area().x(p=>X(p[0])).y0(EB).y1(p=>Y(p[1])).curve(d3.curveCatmullRom.alpha(0.6));const line=d3.line().x(p=>X(p[0])).y(p=>Y(p[1])).curve(d3.curveCatmullRom.alpha(0.6));svg.appendChild(E('path',{d:area(t.profile),fill:'url(#eg)'}));svg.appendChild(E('path',{d:line(t.profile),fill:'none',stroke:'var(--elev)','stroke-width':2.5,'stroke-linejoin':'round'}));const vals=t.profile.map(p=>p[1]);const minP=Math.min(...vals),maxP=Math.max(...vals),sfVal=t.profile[0][1];const er=E('text',{x:8,y:ET-14,fill:'var(--muted)','font-size':10,'font-weight':600,'font-family':'IBM Plex Mono, monospace'});er.textContent='ELEVATION · m ASL';svg.appendChild(er);const yHi=Y(maxP);svg.appendChild(E('line',{x1:PAD-6,y1:yHi,x2:W-PAD,y2:yHi,stroke:'var(--line)','stroke-width':1,'stroke-dasharray':'2 6',opacity:.45}));svg.appendChild(E('text',{x:8,y:yHi+3,fill:'var(--faint)','font-size':10,'font-family':'IBM Plex Mono, monospace'})).textContent=asl(maxP)+' m';const yLo=Y(minP);svg.appendChild(E('line',{x1:PAD-6,y1:yLo,x2:W-PAD,y2:yLo,stroke:'var(--line)','stroke-width':1,'stroke-dasharray':'2 6',opacity:.45}));svg.appendChild(E('text',{x:8,y:yLo+3,fill:'var(--faint)','font-size':10,'font-family':'IBM Plex Mono, monospace'})).textContent=asl(minP)+' m';const ySF=Y(sfVal);if(Math.abs(ySF-yLo)>10&&Math.abs(ySF-yHi)>10){svg.appendChild(E('line',{x1:PAD,y1:ySF,x2:W-PAD,y2:ySF,stroke:'var(--faint)','stroke-width':1.2,'stroke-dasharray':'5 4',opacity:.7}));const sl=E('text',{x:W-PAD,y:ySF-5,fill:'var(--muted)','font-size':9.5,'text-anchor':'end','font-weight':600,'font-family':'IBM Plex Mono, monospace'});sl.textContent='S/F '+asl(sfVal)+' m';svg.appendChild(sl);}t.drs.forEach(z=>{const dx=X(z.det),ay=EB+20;svg.appendChild(E('line',{x1:dx,y1:ay,x2:X(z.from),y2:ay,stroke:'var(--drs)','stroke-width':1.4,'stroke-dasharray':'3 3'}));svg.appendChild(E('path',{d:`M${X(z.from)-5},${ay-3} L${X(z.from)},${ay} L${X(z.from)-5},${ay+3} Z`,fill:'var(--drs)'}));svg.appendChild(E('rect',{x:dx-5,y:ay-5,width:10,height:10,fill:'var(--drs)',transform:`rotate(45 ${dx} ${ay})`}));svg.appendChild(E('text',{x:dx,y:ay-9,fill:'var(--drs)','font-size':9.5,'font-weight':600,'text-anchor':'middle','font-family':'IBM Plex Mono, monospace'})).textContent='DET';});t.sectorsBar.forEach(s=>{svg.appendChild(E('rect',{x:X(s.from),y:BARY,width:X(s.to)-X(s.from)-2,height:BARH,fill:SECraw(s.k),rx:3}));svg.appendChild(E('text',{x:(X(s.from)+X(s.to))/2,y:BARY+BARH/2+4,fill:'oklch(18% 0.02 264)','font-size':12,'font-weight':700,'text-anchor':'middle'})).textContent=SN[s.k];});svg.appendChild(E('text',{x:PAD,y:BARY+BARH+15,fill:'var(--faint)','font-size':10,'font-family':'IBM Plex Mono, monospace'})).textContent='LAP START';svg.appendChild(E('text',{x:W-PAD,y:BARY+BARH+15,fill:'var(--faint)','font-size':10,'text-anchor':'end','font-family':'IBM Plex Mono, monospace'})).textContent='S/F';const valAt=d=>{const arr=t.profile;for(let i=1;i<arr.length;i++){if(arr[i][0]>=d){const a=arr[i-1],b=arr[i];const tt=(d-a[0])/(b[0]-a[0]||1);return a[1]+(b[1]-a[1])*tt;}}return arr[arr.length-1][1];};t.marks.forEach(m=>{const x=X(m[0]);svg.appendChild(E('line',{x1:x,y1:Y(valAt(m[0])),x2:x,y2:BARY,stroke:'var(--line)','stroke-width':1,'stroke-dasharray':'2 4'}));svg.appendChild(E('circle',{cx:x,cy:Y(valAt(m[0])),r:3,fill:'var(--elev)',stroke:'var(--bg)','stroke-width':1.5}));svg.appendChild(E('text',{x:x,y:Y(valAt(m[0]))-9,fill:'var(--muted)','font-size':10,'text-anchor':'middle','font-family':'Space Grotesk, sans-serif'})).textContent=m[1];});}
    function SECraw(k){return getComputedStyle(document.documentElement).getPropertyValue('--'+k).trim();}
    async function loadWeather(t){const body=document.getElementById('wx-body'),stamp=document.getElementById('wx-stamp');if(!body) return;const WMO={0:['Clear sky','sun'],1:['Mainly clear','sun'],2:['Partly cloudy','cloud-sun'],3:['Overcast','cloud'],45:['Fog','cloud-fog'],48:['Rime fog','cloud-fog'],51:['Light drizzle','cloud-drizzle'],53:['Drizzle','cloud-drizzle'],55:['Heavy drizzle','cloud-drizzle'],61:['Light rain','cloud-rain'],63:['Rain','cloud-rain'],65:['Heavy rain','cloud-rain-wind'],71:['Light snow','cloud-snow'],73:['Snow','cloud-snow'],75:['Heavy snow','cloud-snow'],80:['Light showers','cloud-rain'],81:['Showers','cloud-rain'],82:['Heavy showers','cloud-rain-wind'],95:['Thunderstorm','cloud-lightning'],96:['Storm + hail','cloud-lightning'],99:['Severe storm','cloud-lightning']};const COMPASS=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];const dir=d=>COMPASS[Math.round(d/22.5)%16];const url=`https://api.open-meteo.com/v1/forecast?latitude=${t.lat}&longitude=${t.lng}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,wind_direction_10m_dominant&timezone=${encodeURIComponent(t.tz)}&forecast_days=16`;try{const r=await fetch(url);if(!r.ok) throw new Error(r.status);const j=await r.json(),d=j.daily,idx={};d.time.forEach((tm,i)=>idx[tm]=i);let html='<div class="wx-grid">';t.sessions.forEach(s=>{const i=idx[s.date],dl=`${s.date.slice(8,10)}/${s.date.slice(5,7)}`;if(i===undefined){html+=`<div class="wx-day"><div class="d">${dl}</div><div class="sess">${s.sess}</div><div class="desc" style="margin-top:14px">Outside the 16-day forecast window. Check back closer to the weekend.</div></div>`;return;}const code=d.weather_code[i],[desc,icon]=WMO[code]||['—','cloud'];const hi=Math.round(d.temperature_2m_max[i]),lo=Math.round(d.temperature_2m_min[i]);const pop=d.precipitation_probability_max[i],ws=Math.round(d.wind_speed_10m_max[i]),wd=d.wind_direction_10m_dominant[i];html+=`<div class="wx-day"><div class="d">${dl}</div><div class="sess">${s.sess}</div><div class="cond"><i data-lucide="${icon}"></i><div class="temp">${hi}°<small> / ${lo}°C</small></div></div><div class="desc">${desc}</div><div class="wx-row"><span><i data-lucide="droplets"></i>${pop==null?'–':pop+'%'} rain</span><span><i data-lucide="wind"></i>${ws} km/h <span style="display:inline-block;transform:rotate(${(wd+180)%360}deg)">↑</span> ${dir(wd)}</span></div></div>`;});html+='</div>';body.innerHTML=html;stamp.textContent='Live · updated '+new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});if(window.lucide) lucide.createIcons();}catch(e){body.innerHTML='<div class="wx-error">Couldn’t load live conditions right now. The forecast refreshes automatically next time this opens.</div>';stamp.textContent='Live feed unavailable';}}
    function currentDataExport(){return {version:appDataMeta.version||APP_DATE,season:appDataMeta.season||Number(SEASON),tracks:TRACKS,raceResults,historicWinners};}
    function flash(btn,txt){const o=btn.innerHTML;btn.classList.add('ok');btn.innerHTML=`<i data-lucide="check"></i>${txt}`;if(window.lucide)lucide.createIcons();setTimeout(()=>{btn.classList.remove('ok');btn.innerHTML=o;if(window.lucide)lucide.createIcons();},1600);}
    function buildSource(){const clone=document.documentElement.cloneNode(true);const slot=clone.querySelector('#save-slot');if(slot) slot.innerHTML='';return '<!DOCTYPE html>\n'+clone.outerHTML;}
    let _srcURL=null;function freshSourceURL(mime){if(_srcURL){URL.revokeObjectURL(_srcURL);_srcURL=null;}const blob=new Blob([buildSource()],{type:mime});_srcURL=URL.createObjectURL(blob);setTimeout(()=>{if(_srcURL){URL.revokeObjectURL(_srcURL);_srcURL=null;}},90000);return _srcURL;}
    document.getElementById('t-copy').addEventListener('click',async e=>{const src=buildSource();try{await navigator.clipboard.writeText(src);flash(e.currentTarget,'Source copied');}catch(_){const ta=document.createElement('textarea');ta.value=src;ta.style.position='fixed';ta.style.top='-9999px';document.body.appendChild(ta);ta.focus();ta.select();let ok=false;try{ok=document.execCommand('copy');}catch(__){}ta.remove();flash(e.currentTarget,ok?'Source copied':'Copy failed');}});
    document.getElementById('t-prep').addEventListener('click',e=>{const slot=document.getElementById('save-slot');slot.innerHTML='';const a=document.createElement('a');a.href=freshSourceURL('text/html');a.download='f1-racetracks-app.html';a.className='save-link';a.textContent='⤓ Save f1-racetracks-app.html';slot.appendChild(a);flash(e.currentTarget,'Ready → click Save');});
    document.getElementById('t-tab').addEventListener('click',e=>{const w=window.open(freshSourceURL('text/plain'),'_blank');flash(e.currentTarget,w?'Opened':'Popup blocked');});
    document.getElementById('t-data').addEventListener('click',e=>{const slot=document.getElementById('save-slot');slot.innerHTML='';const blob=new Blob([JSON.stringify(currentDataExport(),null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='f1-racetracks-data.json';a.className='save-link';a.textContent='⤓ Save f1-racetracks-data.json';slot.appendChild(a);flash(e.currentTarget,'Ready → click Save');setTimeout(()=>URL.revokeObjectURL(u),90000);});
    jump.addEventListener('change',()=>{if(jump.value) location.hash='#/'+jump.value;});
    (async function boot(){try{updateFooterMeta(null);const data=await loadResolvedData();applyData(data);if(window.lucide) lucide.createIcons();}catch(err){renderDataUnavailable(err);if(window.lucide) lucide.createIcons();}})();
