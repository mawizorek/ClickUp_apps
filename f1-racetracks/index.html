<!DOCTYPE html>
<!--
  F1 Racetracks \u2014 slim entry router (index = index, never a stored app).
  Lands on the Championship Matrix (drivers/constructors standings) by default.
  Forwards legacy circuit deep links (#/<slug>) to the circuit guide.
  LANDING is a one-line constant below; repoint the default lens without a rebuild.
  The two lenses are not yet fully integrated \u2014 this router is the seam.
-->
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>F1 Racetracks</title>
  <style>html{background:#13161d;color:#e7e9ee;font-family:system-ui,sans-serif}body{margin:0;display:grid;place-items:center;height:100dvh}a{color:#e7e9ee}</style>
  <script>
    (function(){
      var LANDING = 'standings.html';   // default lens: Championship Matrix
      var CIRCUITS = 'circuits.html';   // circuit guide lens
      var hash = location.hash || '';
      var slug = hash.replace(/^#\/?/, '').trim();
      if (slug) { location.replace(CIRCUITS + hash); }
      else { location.replace(LANDING); }
    })();
  </script>
</head>
<body>
  <noscript>
    <p>F1 Racetracks needs JavaScript. Open the <a href="standings.html">Championship Matrix</a> or the <a href="circuits.html">circuit guide</a>.</p>
  </noscript>
  <p style="opacity:.6;font-size:.8rem">Loading the Championship Matrix\u2026 <a href="standings.html">continue</a></p>
</body>
</html>
