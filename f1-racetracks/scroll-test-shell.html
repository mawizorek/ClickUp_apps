<!DOCTYPE html>
<!-- scroll-test-shell.html — THROWAWAY. Reproduces the shell iframe freeze.
     Embeds scroll-test.html the way index.html embeds standings.html
     (position:absolute;inset:0 iframe in a flex-column overflow:hidden body).
     Button toggles between the CURRENT layout and a CANDIDATE FIX so we test the
     repair on this harness before touching the live app. -->
<html lang="en-US">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Scroll Test · Shell</title>
<style>
  :root{--bg:oklch(0.15 0.012 268);--bar:oklch(0.185 0.013 268);--line:oklch(0.31 0.014 268);--txt:oklch(0.96 0.006 268);--red:oklch(0.64 0.21 26)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  html{background:var(--bg)}
  body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden}
  .app-bar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 16px;background:var(--bar);border-bottom:1px solid var(--line)}
  .app-bar b{font-size:0.95rem}
  .app-bar button{font:inherit;font-size:0.8rem;color:var(--txt);background:var(--red);border:0;border-radius:8px;padding:8px 12px;cursor:pointer}
  .mode{font-size:0.72rem;color:oklch(0.74 0.011 268);font-family:monospace}

  /* MODE A (default) = the live shell layout: absolute, edge-pinned iframe */
  .stage{flex:1;position:relative;min-height:0;background:var(--bg)}
  .stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}

  /* MODE B = candidate fix: stage is the scroll container, iframe sized by JS to
     its content height so it flows inside a real -webkit-overflow-scrolling box. */
  body.fix .stage{position:relative;overflow-y:auto;-webkit-overflow-scrolling:touch}
  body.fix .stage iframe{position:static;height:auto;min-height:100%}
</style>
</head>
<body>
  <header class="app-bar">
    <b>Shell repro</b>
    <span class="mode" id="mode">MODE A · live layout</span>
    <button id="toggle">Try fix →</button>
  </header>
  <main class="stage">
    <iframe id="f" title="test" src="scroll-test.html"></iframe>
  </main>
  <script>
    var b=document.body,m=document.getElementById('mode'),f=document.getElementById('f');
    function sizeToContent(){
      if(!b.classList.contains('fix'))return;
      try{var d=f.contentDocument;if(d)f.style.height=d.body.scrollHeight+'px';}catch(e){}
    }
    document.getElementById('toggle').onclick=function(){
      var fix=b.classList.toggle('fix');
      m.textContent=fix?'MODE B · candidate fix':'MODE A · live layout';
      this.textContent=fix?'← Back to live':'Try fix →';
      if(fix){sizeToContent();setTimeout(sizeToContent,300);}else{f.style.height='';}
    };
    f.addEventListener('load',function(){setTimeout(sizeToContent,200);});
    window.addEventListener('resize',sizeToContent);
  </script>
</body>
</html>
