<!--
  F1 Racetracks (circuit guide lens)
  Version: v6.2 (shell) · cross-lens switcher + sequential style band
  Live: https://mawizorek.github.io/ClickUp_apps/f1-racetracks/circuits.html
  Source: https://github.com/mawizorek/ClickUp_apps/tree/main/f1-racetracks
  INFRASTRUCTURE: slim runtime entrypoint + direct source modules in /source.
  RESULTS: podium/pole/fastest-lap derive live from the canonical store
  (f1-results/2026/) via source/12_results_store.js.
  CIRCUIT DATA (v6.1): PER-CIRCUIT files in circuits/<slug>.json hold TIMELESS
  identity + layout only. PER-YEAR fields (round/date/status/sessions) live in
  circuits/index_circuits.json keyed by slug; source/09 fetches the index + each
  circuit file at boot and merges the per-year fields on.
  STYLE BAND: 02..07 fetched in order below.
  DESIGN SYSTEM (v6.2): Chakra Petch / JetBrains Mono / Inter + shared oklch (hue 268).
  SEAMLESS NAV (v6.5): cross-document View Transitions + chrome paints on first byte.
  v7: runs under the unified shell (index.html); the brand + lens switcher here are
  hidden when embedded (shell owns them).
  v8: source/09 replaced the Jump-to-circuit <select> with a styled side drawer and
  reworked the home cards to a database feel.
  v9: source/09 culls the marketing hero and adds a top-level filter bar (Continent /
  Era / Status / Breakdown). Footer culled here to version meta + a single Live tracker
  link (the dev/export tools were sloppy under the unified shell). Bytes -> 20260713e.
  CACHE-BUST: bump BUILD_STAMP below AND the ?v= token on the module <script> tags on every source/style deploy.
  Footer version label lives in source/09 (APP_VERSION). Keep it in sync with this header.
-->
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>F1 Racetracks</title>
  <link rel="icon" type="image/png" href="https://app-cdn.clickup.com/assets/favicons/favicon-16x16.png" sizes="16x16">
  <link rel="icon" type="image/png" href="https://app-cdn.clickup.com/assets/favicons/favicon-32x32.png" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;450;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
  <style>
    html{background:oklch(0.16 0.012 268)}
    @view-transition{navigation:auto}
    ::view-transition-old(root),::view-transition-new(root){animation-duration:.32s;animation-timing-function:cubic-bezier(0.16,1,0.3,1)}
    @media (prefers-reduced-motion:reduce){::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important}}
    #app,footer.app{opacity:0}
    body.runtime-ready #app,body.runtime-ready footer.app{opacity:1;transition:opacity .22s cubic-bezier(0.16,1,0.3,1)}
    :root{
      --bg:oklch(0.16 0.012 268);--bg2:oklch(0.195 0.014 268);
      --surface:oklch(0.225 0.015 268);--surface2:oklch(0.265 0.016 268);
      --line:oklch(0.30 0.014 268);--text:oklch(0.95 0.006 268);
      --muted:oklch(0.74 0.011 268);--faint:oklch(0.56 0.013 268);
      --red:oklch(0.64 0.21 26);--ease:cubic-bezier(0.16,1,0.3,1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;font-weight:450;background:var(--bg);color:var(--text);line-height:1.55;letter-spacing:0.006em;font-optical-sizing:auto;-webkit-font-smoothing:antialiased;padding:clamp(16px,3vw,40px) clamp(16px,3.5vw,52px) 0;min-height:100vh}
    .wrap{max-width:1200px;margin:0 auto}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:26px}
    .brand{display:flex;align-items:center;gap:11px;cursor:pointer;background:none;border:none;color:inherit;font:inherit;padding:0;view-transition-name:f1-brand}
    .brand .mark{width:30px;height:30px;border-radius:8px;background:var(--red);display:grid;place-items:center;flex:none;box-shadow:0 6px 18px -6px oklch(0.64 0.21 26/.7)}
    .brand .mark svg{width:18px;height:18px;display:block}
    .brand .t{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-0.01em}
    .brand .t small{display:block;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:500;margin-top:2px}
    .topbar-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .nav-jump{display:flex;align-items:center;gap:8px}
    .nav-jump select{font-family:'JetBrains Mono',monospace;font-size:.74rem;background:var(--surface);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px 11px;cursor:pointer;max-width:60vw}
    .lens{display:inline-flex;border:1px solid var(--line);background:var(--surface)}
    .lens>*{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:transparent;border:0;cursor:pointer;padding:8px 15px;text-decoration:none;display:inline-flex;align-items:center;transition:color .15s var(--ease),background .15s var(--ease)}
    .lens>*+*{border-left:1px solid var(--line)}
    .lens .on{background:var(--surface2);color:var(--text);cursor:default}
    .lens a:hover:not(.on){color:var(--text);background:var(--bg2)}
    @media (max-width:560px){.lens>*{padding:8px 12px;font-size:.62rem;letter-spacing:.06em}}
  </style>
  <script>
    // Bump this one token on every source/style deploy to guarantee fresh bytes.
    const BUILD_STAMP = '20260713e';
    const RUNTIME_STYLE_SOURCES = [
      './source/02_styles_foundation_and_layout.css.txt',
      './source/03_styles_panels_tables_footer.css.txt',
      './source/04_styles_results_and_mobile.css.txt',
      './source/05_styles_live_session_panel.css.txt',
      './source/06_styles_technical_index.css.txt',
      './source/07_styles_lens_switcher.css.txt'
    ];

    window.runtimeStylesReady = Promise.all(
      RUNTIME_STYLE_SOURCES.map(async (path) => {
        const res = await fetch(path + '?v=' + BUILD_STAMP, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load ${path}`);
        const style = document.createElement('style');
        style.dataset.source = path;
        style.textContent = await res.text();
        document.head.appendChild(style);
      })
    ).catch((err) => {
      console.error('Runtime style load failed', err);
    }).finally(() => {
      document.body.classList.add('runtime-ready');
    });
  </script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="brand" onclick="location.hash='#/'">
        <span class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M3 17c4-1 6-9 10-9 3 0 4 3 8 2" stroke="white" stroke-width="2.4" stroke-linecap="round"></path><circle cx="6" cy="16.5" r="1.7" fill="white"></circle></svg></span>
        <span class="t">F1 Racetracks<small>2026 Circuit Guide</small></span>
      </button>
      <div class="topbar-r">
        <nav class="lens" aria-label="Lens switcher">
          <a href="./standings.html">Matrix</a>
          <a href="./standings.html#history">History</a>
          <span class="on" aria-current="page">Circuits</span>
        </nav>
        <div class="nav-jump">
          <select id="jump" aria-label="Jump to circuit"><option value="">Jump to circuit…</option></select>
        </div>
      </div>
    </div>

    <div id="app"></div>

    <footer class="app">
      <span class="meta-txt" id="foot-meta">F1 Racetracks v6.2 · loading data…</span>
      <div class="toolbar">
        <a class="tool" href="./live-tracker.html">Live tracker</a>
      </div>
    </footer>
  </div>

  <script src="./source/12_results_store.js?v=20260713e"></script>
  <script src="./source/09_app_bootstrap_and_home.js?v=20260713e"></script>
  <script src="./source/10_track_views_and_profile.js?v=20260713e"></script>
  <script src="./source/13_live_session_panel.js?v=20260713e"></script>
  <script src="./source/11_weather_and_footer_exports.js?v=20260713e"></script>
  <script src="./source/14_weekend_state_and_data.js?v=20260713e"></script>
  <script src="./source/15_weekend_surface_render.js?v=20260713e"></script>
  <script src="./source/16_weekend_live_mode.js?v=20260713e"></script>
  <script src="./source/17_weekend_mount.js?v=20260713e"></script>
  <script src="./source/18_home_and_mobile_polish.js?v=20260713e"></script>
</body>
</html>
