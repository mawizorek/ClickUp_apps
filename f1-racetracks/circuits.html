<!--
  F1 Racetracks (circuit guide lens)
  Version: v6.2 (shell) · cross-lens switcher + sequential style band
  Live: https://mawizorek.github.io/ClickUp_apps/f1-racetracks/circuits.html
  Source: https://github.com/mawizorek/ClickUp_apps/tree/main/f1-racetracks
  INFRASTRUCTURE: slim runtime entrypoint + direct source modules in /source.
  RESULTS: podium/pole/fastest-lap derive live from the canonical store
  (f1-results/2026/) via source/12_results_store.js.
  CIRCUIT DATA (v6.1): PER-CIRCUIT files in circuits/<slug>.json hold TIMELESS
  identity + layout only. PER-YEAR fields (round/date/status/sessions) live in
  circuits/index_circuits.json keyed by slug; source/09 fetches the index + each
  circuit file at boot and merges the per-year fields on (mirrors the f1-results
  per-round store). No more inline TRACK_DATA modules.
  STYLE BAND: 02..07 (foundation, panels/tables/footer, results+mobile,
  live-session, technical-index, lens-switcher) fetched in order below.
  DESIGN SYSTEM (v6.2): reskinned to match the standings + race-weekend lenses —
  Chakra Petch (display) / JetBrains Mono (timing) / Inter (body) + shared oklch
  (hue 268) palette. One app across all three surfaces.
  CROSS-LENS NAV (v6.2): topbar carries a 3-way switcher (Matrix / History / Circuits)
  matching the standings switcher; Matrix -> standings.html, History ->
  standings.html#history. Weekend is NOT a peer tab — it is the per-round
  DRILL-THROUGH reached from a circuit card (circuits link to weekend.html#/<slug>).
  CACHE-BUST: bump BUILD_STAMP below AND the ?v= token on the module <script> tags on every source/style deploy.
  Footer version label lives in source/09 (APP_VERSION). Keep it in sync with this header.
-->
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>F1 Racetracks</title>
  <link rel="icon" type="image/png" href="https://app-cdn.clickup.com/assets/favicons/favicon-16x16.png" sizes="16x16">
  <link rel="icon" type="image/png" href="https://app-cdn.clickup.com/assets/favicons/favicon-32x32.png" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;450;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
  <style>
    html{background:#17171d}
    body{opacity:0;transition:opacity .12s ease}
    body.runtime-ready{opacity:1}
  </style>
  <script>
    // Bump this one token on every source/style deploy to guarantee fresh bytes.
    const BUILD_STAMP = '20260713b';
    const RUNTIME_STYLE_SOURCES = [
      './source/02_styles_foundation_and_layout.css.txt',
      './source/03_styles_panels_tables_footer.css.txt',
      './source/04_styles_results_and_mobile.css.txt',
      './source/05_styles_live_session_panel.css.txt',
      './source/06_styles_technical_index.css.txt',
      './source/07_styles_lens_switcher.css.txt'
    ];

    window.runtimeStylesReady = Promise.all(
      RUNTIME_STYLE_SOURCES.map(async (path) => {
        const res = await fetch(path + '?v=' + BUILD_STAMP, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load ${path}`);
        const style = document.createElement('style');
        style.dataset.source = path;
        style.textContent = await res.text();
        document.head.appendChild(style);
      })
    ).catch((err) => {
      console.error('Runtime style load failed', err);
    }).finally(() => {
      document.body.classList.add('runtime-ready');
    });
  </script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="brand" onclick="location.hash='#/'">
        <span class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M3 17c4-1 6-9 10-9 3 0 4 3 8 2" stroke="white" stroke-width="2.4" stroke-linecap="round"></path><circle cx="6" cy="16.5" r="1.7" fill="white"></circle></svg></span>
        <span class="t">F1 Racetracks<small>2026 Circuit Guide</small></span>
      </button>
      <div class="topbar-r">
        <nav class="lens" aria-label="Lens switcher">
          <a href="./standings.html">Matrix</a>
          <a href="./standings.html#history">History</a>
          <span class="on" aria-current="page">Circuits</span>
        </nav>
        <div class="nav-jump">
          <select id="jump" aria-label="Jump to circuit"><option value="">Jump to circuit…</option></select>
        </div>
      </div>
    </div>

    <div id="app"></div>

    <footer class="app">
      <span class="meta-txt" id="foot-meta">F1 Racetracks v6.2 · loading data…</span>
      <div class="toolbar">

        <button class="tool" id="t-data" title="Export the current resolved data as JSON">Export data (.json)</button>
        <span class="save-wrap" id="save-slot"></span>
        <span class="tool" style="cursor:default"><span class="hint">or Right-click → Save As</span></span>
      </div>
    </footer>
  </div>

  <script src="./source/12_results_store.js?v=20260713b"></script>
  <script src="./source/09_app_bootstrap_and_home.js?v=20260713b"></script>

</body>
</html>
