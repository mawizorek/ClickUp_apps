<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Name — template</title>
  <!--
    GOLD-STANDARD SELF-CONTAINED APP SKELETON.
    Rules (authoritative copy: Brain Reference -> Apps / HTML Artifacts):
      - Single self-contained index.html. All CSS + JS inline. Offline-first.
      - Only external deps allowed: pinned CDN libs (PDF.js, pdf-lib, JSZip, etc.).
      - This file IS the app AND the folder's GitHub Pages entry point. Never chunk it.
      - Downloads: real same-origin blob <a download>. No synthetic .click() in sandbox,
        no data: URIs, no cross-origin file links. iOS: long-press -> Download Linked File.
      - Keep the in-app version badge current; it is authoritative over commit messages.
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      /* Tint neutrals toward the app's accent hue; never pure #000/#fff. */
      --bg: oklch(0.16 0.012 275);
      --text: oklch(0.95 0.008 275);
      --accent: oklch(0.72 0.15 195);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text); background: var(--bg);
    }
    body { min-height: 100vh; display: grid; place-items: center; padding: 2rem; text-align: center; }
    h1 { font-size: 1.4rem; font-weight: 650; }
    p { color: oklch(0.7 0.012 275); margin-top: 0.5rem; font-size: 0.9rem; }
    .ver { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <main>
    <h1>App Name <span class="ver">v1</span></h1>
    <p>Replace this skeleton with the app. All logic inline below.</p>
  </main>
  <script>
    // App logic goes here. Keep everything inline and offline-first.
  </script>
</body>
</html>
