<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<title>ClickUp Apps</title>
<style>
:root {
  --bg: #0b0b0d; --surface: #161619; --surface-hi: #1e1e23;
  --text: #f5f5f7; --muted: #8f8f99; --papaya: #ff8000; --papaya-hi: #ffa23c;
  --blue: #4cc9f0; --border: #2b2b32; --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background:
    radial-gradient(120% 60% at 100% 0%, rgba(255,128,0,.16), transparent 60%),
    var(--bg);
  background-attachment: fixed;
  color: var(--text); min-height: 100vh;
  padding: max(1.5rem, env(safe-area-inset-top)) 1.15rem calc(2rem + env(safe-area-inset-bottom));
}
.wrap { max-width: 640px; margin: 0 auto; }
.bar { height: 4px; border-radius: 4px; margin-bottom: 1.4rem;
  background: linear-gradient(90deg, var(--papaya), var(--papaya-hi) 45%, transparent 45%),
              linear-gradient(90deg, var(--border), var(--border)); }
h1 { font-size: clamp(1.5rem, 6vw, 1.9rem); font-weight: 800; letter-spacing: -.02em;
  line-height: 1.1; margin-bottom: .35rem; }
h1 .mk { color: var(--papaya); }
.sub { color: var(--muted); font-size: .85rem; line-height: 1.4; margin-bottom: 1.6rem; }
.sub a { color: var(--papaya-hi); text-decoration: none; }
.grid { display: flex; flex-direction: column; gap: .7rem; }
.card {
  position: relative; display: flex; align-items: center; gap: .9rem;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1rem 1.15rem; min-height: 62px;
  transition: border-color .18s, background .18s, transform .12s;
}
.card::before { content: ""; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px;
  border-radius: 3px; background: var(--papaya); }
.card:active { transform: scale(.985); background: var(--surface-hi); }
@media (hover: hover) {
  .card:hover { border-color: var(--papaya); background: var(--surface-hi); }
}
/* stretched link: whole card is tappable, no nested anchors */
.card .go { position: absolute; inset: 0; z-index: 1; border-radius: var(--radius); }
.info { flex: 1; min-width: 0; padding-left: .3rem; }
.name { font-weight: 700; font-size: 1rem; letter-spacing: -.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meta { font-size: .76rem; color: var(--muted); margin-top: 2px; }
.repo { position: relative; z-index: 2; color: var(--blue); text-decoration: none;
  font-size: .76rem; padding: .35rem .6rem; border: 1px solid var(--border);
  border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
.repo:active { background: var(--surface-hi); }
.arrow { position: relative; z-index: 0; color: var(--papaya); font-size: 1.3rem;
  font-weight: 800; flex-shrink: 0; }
.state { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: .9rem; }
.state.err { color: #ff6b6b; }
footer { margin-top: 2rem; font-size: .72rem; color: var(--muted); text-align: center; }
footer a { color: var(--papaya-hi); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"></div>
  <h1><span class="mk">&gt;&gt;</span> ClickUp Apps</h1>
  <p class="sub">Live index of <a href="https://github.com/mawizorek/ClickUp_apps">mawizorek/ClickUp_apps</a></p>
  <div class="grid" id="grid"><div class="state">Loading apps…</div></div>
  <footer>Auto-generated from the GitHub API · <a href="https://github.com/mawizorek/ClickUp_apps">repo</a></footer>
</div>
<script>
const OWNER = 'mawizorek';
const REPO = 'ClickUp_apps';
const PAGES = `https://${OWNER}.github.io/${REPO}`;
// Hidden from the index: scaffold + retired/legacy folders.
const SKIP = new Set(['template-app', '.github', 'budget-code-authority-builder-v5_2026-07-01-1110']);

function esc(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function load() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents?ref=main`);
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const items = await res.json();
    const apps = items.filter(i => i.type === 'dir' && !SKIP.has(i.name)).sort((a, b) => a.name.localeCompare(b.name));
    if (!apps.length) { grid.innerHTML = '<div class="state">No app folders found.</div>'; return; }
    grid.innerHTML = apps.map(app => {
      const slug = esc(app.name);
      const name = esc(app.name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()));
      const pagesUrl = `${PAGES}/${slug}/`;
      const repoUrl = `https://github.com/${OWNER}/${REPO}/tree/main/${slug}`;
      return `<div class="card">
        <a class="go" href="${pagesUrl}" aria-label="Open ${name}"></a>
        <span class="info">
          <span class="name">${name}</span>
          <span class="meta">${slug}/</span>
        </span>
        <a class="repo" href="${repoUrl}">repo</a>
        <span class="arrow">→</span>
      </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = `<div class="state err">Failed to load: ${esc(e.message)}</div>`;
  }
}
load();
</script>
</body>
</html>
