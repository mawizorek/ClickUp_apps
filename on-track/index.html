<!DOCTYPE html>
<!-- INFRASTRUCTURE: multi-file (Pages-hosted). Thin shell + source/styles.css + source/render.js + source/app.js + data.json. -->
<!-- Engine edits: edit source/*.js + source/styles.css (each reads whole under the 30KB cap, no chunk set needed) + version bump. -->
<!-- Data edits: commit data.json only. -->
<!-- Self-contained export: footer Copy/Download/Open re-inline all source at runtime, so exported files still work standalone offline. -->
<!-- BRAND ASSETS (TEMP NAMES): icon = IMG_4698.png, banner = IMG_4689.png. TODO: rename to icon.png / og.png + downsize (see next-build-spec.md). -->
<html lang="en" data-theme="rb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#141d3b">
<meta name="robots" content="noindex, nofollow">
<title>On Track — What Motorsport Is On Right Now</title>
<meta name="description" content="A live, at-a-glance motorsport TV schedule. See what's racing right now, what's next, and where to watch it across every series and platform.">
<meta property="og:title" content="On Track — What Motorsport Is On Right Now">
<meta property="og:description" content="Live motorsport TV schedule. What's racing now, what's next, and where to watch it.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mawizorek.github.io/ClickUp_apps/on-track/">
<meta property="og:image" content="https://mawizorek.github.io/ClickUp_apps/on-track/IMG_4689.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="On Track — What Motorsport Is On Right Now">
<meta name="twitter:description" content="Live motorsport TV schedule. What's racing now, what's next, and where to watch.">
<meta name="twitter:image" content="https://mawizorek.github.io/ClickUp_apps/on-track/IMG_4689.png">
<link rel="icon" type="image/png" href="IMG_4698.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>">
<link rel="apple-touch-icon" href="IMG_4698.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="On Track">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./source/styles.css">
</head>
<body>
<noscript>On Track needs JavaScript to compute what's live right now. Please enable it.</noscript>
<div class="wrap">
  <header class="masthead">
    <div class="brand">
      <span class="flag">🏁</span>
      <div>
        <h1>On Track</h1>
        <div class="sub">What's racing, right now</div>
      </div>
    </div>
    <div class="mast-tools">
      <div class="clock" id="clock" aria-live="off"><span id="clockTime">--:--</span><span class="z" id="clockZone">—</span></div>
      <button class="themebtn" id="themeBtn" title="Switch theme" aria-label="Switch theme">◑</button>
    </div>
  </header>
  <section class="hero" id="hero" aria-live="polite"></section>
  <div class="controls">
    <div class="search-row">
      <label class="search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="search" placeholder="Search series, track, or session…" autocomplete="off" aria-label="Search the schedule">
      </label>
      <div class="jump">
        <span class="cal">📅</span>
        <select id="jumpDate" aria-label="Jump to date"></select>
        <span class="chev">▾</span>
      </div>
      <div class="tz-toggle" role="group" aria-label="Timezone">
        <button id="tzET" aria-pressed="false">ET</button>
        <button id="tzLocal" aria-pressed="true">My time</button>
      </div>
    </div>
    <section class="fsection" id="secSeries" data-open="false">
      <button class="fhead" id="headSeries" aria-expanded="false" aria-controls="bodySeries">
        <span class="lb">Series</span>
        <span class="count zero" id="countSeries">0</span>
        <span class="chev">▾</span>
      </button>
      <div class="fbody" id="bodySeries" role="region" aria-labelledby="headSeries"><div class="fbody-inner"><div class="pad">
        <div class="filter-label"><span class="clr" id="clrSeries" hidden>clear</span></div>
        <div class="chips" id="seriesChips"></div>
      </div></div></div>
    </section>
    <section class="fsection" id="secWatch" data-open="false">
      <button class="fhead" id="headWatch" aria-expanded="false" aria-controls="bodyWatch">
        <span class="lb">Where to watch</span>
        <span class="count zero" id="countWatch">0</span>
        <span class="chev">▾</span>
      </button>
      <div class="fbody" id="bodyWatch" role="region" aria-labelledby="headWatch"><div class="fbody-inner"><div class="pad">
        <div class="filter-label"><span class="clr" id="clrPlat" hidden>clear</span></div>
        <div class="chips" id="platChips"></div>
      </div></div></div>
    </section>
  </div>
  <div class="result-row">
    <div class="result-note" id="resultNote"></div>
    <button class="pasttoggle" id="pastToggle" aria-expanded="false" hidden></button>
  </div>
  <main id="schedule"></main>
  <footer>
    <div class="foot-top">
      <div>
        <strong id="verLine" style="color:var(--text-2)"></strong>
        <span id="dataStamp"></span>
      </div>
      <div class="foot-src">
        <button id="copySrc">⧉ Copy source</button>
        <button id="prepDl">⤳ Prepare download</button>
        <a id="saveLink" data-save download="on-track.html">↓ Save file</a>
        <button id="openTab">↗ Open in new tab</button>
      </div>
    </div>
    <div class="foot-note">
      Times auto-update live. All broadcast times sourced and verified per weekend; listings can change last-minute.
      Curated feed, your own served + skinnable version. <span id="feedBy"></span>
    </div>
  </footer>
</div>
<script src="./source/render.js" defer></script>
<script src="./source/app.js" defer></script>
</body>
</html>
