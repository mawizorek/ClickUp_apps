# Cloudflare Worker config for the Inciardi Market backend.
#
# Workers Builds (dashboard "Connect to Git") builds + deploys worker.js on every
# push to main. Also works for a manual `wrangler deploy` from this folder.
#
# SECRETS ARE NOT HERE ON PURPOSE. EBAY_CLIENT_ID, EBAY_CLIENT_SECRET, and
# WRITE_KEY live in the Cloudflare dashboard (Worker > Settings > Variables and
# Secrets). Never commit them.
#
# Deploy note: 2026-07-13 ships worker v1.0 (relational API over D1 + R2).

name = "inciardi-market"
main = "worker.js"
compatibility_date = "2024-11-01"

# eBay pull cadence: every 6 hours. scheduled() in worker.js runs runCron(),
# which banks a market snapshot + per-print points + gone events into D1.
[triggers]
crons = ["0 */6 * * *"]

# Live eBay snapshot cache (rebuilt each run) + OAuth token cache.
[[kv_namespaces]]
binding = "SNAPSHOTS"
id = "9780d26434c74f5a81c8df3d8bf67dd6"

# Relational store: catalog + aliases + images metadata + inventory + history.
[[d1_databases]]
binding = "DB"
database_name = "inciardi-market"
database_id = "18f3459f-8273-44d6-8380-6971d6173b3e"

# Image bytes: uploaded + scrubbed print images. Served back through GET /img.
# NOTE: create the bucket once in the Cloudflare dashboard (R2 > Create bucket,
# name "inciardi-images") then this binding resolves it. Bucket name is editable;
# the binding name IMAGES is what worker.js references.
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "inciardi-images"
