<!-- report.html - PURE RENDERER. Renders 100% from ./data/inbox-state.json.
     ================================================================
     NOTHING in this file is hardcoded email data. Do NOT add email rows, threads,
     senders, buckets, or a slop query here. There is exactly one place inbox data
     lives: inbox-digest-report/data/inbox-state.json (field spec: data/README.md).
     To refresh the dashboard, edit ONLY that JSON. If you are about to paste email
     content into this file, STOP - it belongs in the JSON. This file is the VIEW;
     the JSON is the DATA; they never mix.
     The router (index.html) re-executes this <script> after injecting the fragment.
     v5 skin: mobile-primary VIEWER. Each email renders as a stacked row (status pill,
     sender/subject, plan) on phone; the same DOM reflows into aligned columns on wide
     screens (>=720px). No <table>, so long senders/addresses never shred. Styling lives
     in the REPORT ADDITIONS block of styles.css; every color is a theme token. -->
<section class="page report">
  <h1>Gmail &rarr; ClickUp Pipeline</h1>
  <p class="lead">What to merge, reply, forward, archive, and delete to hit inbox zero. Every state change is your tap; nothing here has touched Gmail yet.</p>
  <div id="rpt-root"><p class="bucket-empty">Loading the latest sweep&hellip;</p></div>
  <script>
  (function () {
    var root = document.getElementById("rpt-root");
    if (!root) return;
    fetch("./data/inbox-state.json", { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(render)
      .catch(function () {
        root.innerHTML = '<div class="rpt-note"><b>No sweep data.</b> This report renders entirely from <code>data/inbox-state.json</code>. Confirm the file exists and is valid JSON.</div>';
      });

    function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

    var STATE = {
      merge_pending:   ["warn","merge"],
      reply_pending:   ["warn","reply"],
      forward_pending: ["warn","forward"],
      archive_ready:   ["info","archive"],
      delete_ready:    ["bad","delete"],
      merged:          ["good","merged"],
      archived:        ["good","archived"],
      deleted:         ["good","deleted"]
    };
    var BUCKETS = [
      { key:"TO_MERGE",        cls:"good" },
      { key:"NEEDS_REPLY",     cls:"info" },
      { key:"HAS_ATTACHMENTS", cls:"warn" },
      { key:"ALREADY_HANDLED", cls:"good" },
      { key:"SLOP",            cls:"bad"  }
    ];

    function pill(state){ var m=STATE[state]||["info",esc(state)]; return '<span class="badge '+m[0]+'">'+m[1]+'</span>'; }

    function statusCell(e){ return '<div class="cell-status">'+pill(e.state)+'</div>'; }
    function emailCell(e){
      return '<div class="cell-email">'+
        '<span class="em-from">'+esc(e.sender)+'</span>'+
        '<span class="em-subj">'+esc(e.subject)+'</span>'+
        (e.gmail_url?'<a class="em-link" href="'+esc(e.gmail_url)+'" target="_blank" rel="noopener">open in Gmail \u2197</a>':'')+
      '</div>';
    }
    function planCell(e){
      var h='<div class="cell-plan">'+esc(e.plan||"");
      if(e.dest_task_url && e.dest_task_title){ h+=' <a class="dest" href="'+esc(e.dest_task_url)+'" target="_blank" rel="noopener">'+esc(e.dest_task_title)+' \u2197</a>'; }
      else if(e.dest_task_title){ h+=' <span class="tag plan-tag">new task: '+esc(e.dest_task_title)+'</span>'; }
      if(e.plan_note){ h+='<span class="plan-note">'+esc(e.plan_note)+'</span>'; }
      return h+'</div>';
    }
    function rowHtml(e){ return '<div class="row" data-state="'+esc(e.state)+'">'+statusCell(e)+emailCell(e)+planCell(e)+'</div>'; }

    function countBadge(b,n){
      var label=(b.key==="TO_MERGE" && n>0)?(n+' keeper'+(n>1?'s':'')):String(n);
      return '<span class="badge '+b.cls+' bucket-count">'+label+'</span>';
    }
    function slopSub(rows){
      var g={},order=[];
      rows.forEach(function(e){ var k=e.sender||"?"; if(!g[k]){g[k]={t:e.slop_group||"slop",n:0};order.push(k);} g[k].n++; });
      var chips=order.map(function(k){ return '<span class="chip off"><span class="dot"></span>'+esc(g[k].t)+' <b>'+esc(k)+' ('+g[k].n+')</b></span>'; }).join("");
      return '<div class="bucket-sub">'+chips+'</div>';
    }
    function block(b,emails){
      var rows=emails.filter(function(e){return e.bucket===b.key;});
      var head='<header class="bucket-head"><span class="bucket-name">'+b.key+'</span>'+countBadge(b,rows.length)+'</header>';
      if(!rows.length) return '<section class="bucket is-empty" data-bucket="'+b.key+'">'+head+'<div class="bucket-empty">none</div></section>';
      var sub=(b.key==="SLOP")?slopSub(rows):"";
      return '<section class="bucket" data-bucket="'+b.key+'">'+head+sub+'<div class="rows">'+rows.map(rowHtml).join("")+'</div></section>';
    }

    function fmtSwept(iso){
      if(!iso) return "\u2014";
      var d=new Date(iso); if(isNaN(d.getTime())) return esc(iso);
      var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
      var h=d.getHours(),m=d.getMinutes(),ap=h<12?"AM":"PM"; h=h%12||12; m=(m<10?"0":"")+m;
      return mo+" "+d.getDate()+" \u00b7 "+h+":"+m+" "+ap;
    }

    function render(d){
      d=d||{}; var s=d.sweep||{}, emails=Array.isArray(d.emails)?d.emails:[];
      var isPlan=!s.status || /PLAN/i.test(s.status);
      var before=(s.inbox_before!=null)?s.inbox_before:emails.length;
      var after=(s.inbox_projected_after!=null)?s.inbox_projected_after:0;

      var meta='<div class="rpt-meta">'+
        '<span>swept <b>'+fmtSwept(s.swept_at)+'</b></span>'+
        '<span>threads <b>'+(s.threads_reviewed!=null?s.threads_reviewed:emails.length)+'</b></span>'+
        '<span>inbox <b>'+before+' \u2192 '+after+'</b></span>'+
        '<span>phase <b>'+(isPlan?"PLAN":"EXECUTED")+'</b></span>'+
      '</div>';

      var note=isPlan
        ? '<div class="rpt-note"><b>PLAN \u2014 nothing has changed in Gmail yet.</b> On &ldquo;go,&rdquo; Brain merges keeper content into the destination task and parks any drafts. You forward attachments, archive, and clear slop.</div>'
        : '<div class="rpt-note"><b>EXECUTED audit.</b> The merges + drafts ran; the pills below record what landed.</div>';

      var legend='<div class="rpt-legend">'+
        '<span class="chip k-pending"><span class="dot"></span>pending</span>'+
        '<span class="chip k-merged"><span class="dot"></span>merged</span>'+
        '<span class="chip k-archived"><span class="dot"></span>archive</span>'+
        '<span class="chip k-delete"><span class="dot"></span>delete</span>'+
      '</div>';

      var blocks=BUCKETS.map(function(b){return block(b,emails);}).join("");

      var slop='';
      if(d.slop_delete_query){
        slop='<div class="rpt-note"><b>One-tap slop clear.</b> Tap to select, paste into Gmail search, select all, delete. Scoped to <code>in:inbox</code> so it never touches archived mail or account records from the same senders.'+
          '<code class="rpt-q">'+esc(d.slop_delete_query)+'</code></div>';
      }

      function c(k){return emails.filter(function(e){return e.bucket===k;}).length;}
      var parts=[];
      if(c("TO_MERGE"))parts.push(c("TO_MERGE")+" merge");
      if(c("NEEDS_REPLY"))parts.push(c("NEEDS_REPLY")+" reply");
      if(c("HAS_ATTACHMENTS"))parts.push(c("HAS_ATTACHMENTS")+" forward");
      if(c("ALREADY_HANDLED"))parts.push(c("ALREADY_HANDLED")+" archive");
      if(c("SLOP"))parts.push(c("SLOP")+" delete");
      var score='<div class="rpt-score">'+
        '<span class="score-big">'+before+' \u2192 '+after+'</span>'+
        '<span class="score-lab">inbox'+(isPlan?", projected on greenlight":"")+'</span>'+
        (parts.length?'<span class="score-parts">'+parts.join(" \u00b7 ")+'</span>':'')+
      '</div>';

      var foot='<p class="foot-hint">Rendered from <code>data/inbox-state.json</code> \u00b7 swept '+fmtSwept(s.swept_at)+' by '+esc(s.swept_by||"Brain")+'.</p>';

      root.innerHTML=meta+note+legend+blocks+slop+score+foot;
    }
  })();
  </script>
</section>
