<!doctype html>
<!-- inbox-digest-report - copied from the gold-standard template-app.
     Shell + chrome.js + styles.css + pages/ partials, all painted by the shared theme spine.
     Swap the APP_* constants; add pages under pages/ and register in NAV. -->
<html lang="en" data-theme="maw-dark-utility" data-mode="mid">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="robots" content="noindex, nofollow">
<script>try{var t=localStorage.getItem("app_theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
<title>Inbox Digest</title>
<meta name="description" content="Data-coverage surface for the Gmail inbox sweep: every field captured per thread.">
<meta property="og:title" content="Inbox Digest">
<meta property="og:description" content="Data-coverage surface for the Gmail inbox sweep.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mawizorek.github.io/ClickUp_apps/inbox-digest-report/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#128229;</text></svg>">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="stylesheet" href="../shared/themes/themes.css">
<link rel="stylesheet" href="./styles.css?v=2">
</head>
<body>
<div id="access-gate" hidden>
  <div class="gate-card">
    <h1 id="gate-title">Under maintenance</h1>
    <p id="gate-msg">This app is being updated. Check back soon.</p>
    <form id="gate-form">
      <input id="gate-code" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autocorrect="off" autofocus aria-label="Access code" placeholder="0426">
      <button type="submit">Enter</button>
    </form>
  </div>
</div>

<a class="skip-link" href="#view">Skip to content</a>
<header id="appHeader"></header>
<main id="view" tabindex="-1"></main>
<footer id="appFooter"></footer>

<noscript>This app needs JavaScript enabled to run.</noscript>

<script src="../shared/themes/resolve.js"></script>
<script src="./chrome.js?v=2"></script>
<script>
(function () {
  /* ==== APP CONSTANTS ==== */
  var APP_NAME    = "Inbox Digest";
  var APP_VERSION = "v3.1";
  var APP_PR      = 318;
  var DEFAULT_THEME = "maw-dark-utility";
  var DEFAULT_PAGE  = "report";        // report is the acting landing surface; matrix is page 2
  var NAV = [
    { route: "report",    label: "Report" },
    { route: "matrix",    label: "Field Matrix" },
    { route: "about",     label: "About" }
  ];
  /* ======================= */

  var savedTheme = null;
  try { savedTheme = localStorage.getItem("app_theme"); } catch (e) {}
  var bootTheme = savedTheme || DEFAULT_THEME;
  if (window.THEMES) { THEMES.apply(bootTheme, { root: document.documentElement }); }
  else { document.documentElement.setAttribute("data-theme", bootTheme); }

  /* ---- ACCESS GATE ---- */
  (function gate() {
    var FALLBACK = { access: "open" };
    var SS = "gate_ok";
    function focusCode() { var c = document.getElementById("gate-code"); if (c) { try { c.focus(); c.select(); } catch (e) {} } }
    function apply(cfg) {
      var g = document.getElementById("access-gate");
      if (cfg.access === "open" || sessionStorage.getItem(SS) === "1") { g.remove(); return; }
      g.hidden = false;
      var form = document.getElementById("gate-form");
      if (cfg.access === "down") {
        document.getElementById("gate-title").textContent = cfg.downTitle || "Temporarily offline";
        document.getElementById("gate-msg").textContent  = cfg.downMessage || "This app is currently unavailable.";
        form.style.display = "none"; return;
      }
      document.getElementById("gate-title").textContent = cfg.coverTitle || "Under maintenance";
      document.getElementById("gate-msg").textContent  = cfg.coverMessage || "This app is being updated. Check back soon.";
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (document.getElementById("gate-code").value.trim() === String(cfg.code)) {
          sessionStorage.setItem(SS, "1"); g.remove();
        } else { var c = document.getElementById("gate-code"); c.value = ""; c.focus(); }
      });
      focusCode(); setTimeout(focusCode, 80);
    }
    fetch("./config.json", { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(function (cfg) { try { localStorage.setItem("app_config", JSON.stringify(cfg)); } catch (e) {} apply(cfg); })
      .catch(function () { var c = null; try { c = JSON.parse(localStorage.getItem("app_config")); } catch (e) {} apply(c || FALLBACK); });
  })();

  /* ---- CHROME ---- */
  Chrome.init({
    appName: APP_NAME, version: APP_VERSION, pr: APP_PR,
    nav: NAV, defaultTheme: DEFAULT_THEME, logo: "\uD83D\uDCE5",
    sources: [ { label: "Source \u2197", href: "https://github.com/mawizorek/ClickUp_apps/tree/main/inbox-digest-report" } ]
  });

  /* ---- ROUTER ---- */
  var view = document.getElementById("view");
  var routes = NAV.map(function (n) { return n.route; });
  function render(route) {
    if (routes.indexOf(route) === -1) route = DEFAULT_PAGE;
    fetch("./pages/" + route + ".html", { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw 0; return r.text(); })
      .then(function (html) { view.innerHTML = html; Chrome.setActive(route); view.focus(); window.scrollTo(0, 0); })
      .catch(function () {
        view.innerHTML = '<section class="page"><h1>Page not found</h1>' +
          '<p class="muted">No page matches <code>#' + route + '</code>.</p></section>';
      });
  }
  function current() { return (location.hash || "").replace(/^#/, "") || DEFAULT_PAGE; }
  window.addEventListener("hashchange", function () { render(current()); });
  render(current());
})();
</script>
</body>
</html>
