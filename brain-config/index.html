<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<meta name="robots" content="noindex, nofollow">
<title>Tools · BrainConfig</title>
<meta name="description" content="Brain Config tool index: the authored AI toolkit and the native platform tool surface.">
<!-- INDEX = POINTER: this file is a thin toggle shell only. It stores no tool content.
     A = ./custom-tools.html (live auto-discovering registry) | B = ./tool-index.html (platform surface). -->
<style>
:root{--canvas:#0b0b0d;--panel:#17181a;--divider:#26272a;--ink:#e8e8ea;--ink-soft:#9a9ba0;--purple:#8b6df0;--blue:#5b9ae8;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--canvas);color:var(--ink);display:flex;flex-direction:column;}
.toggle-bar{flex-shrink:0;display:flex;justify-content:center;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--divider);background:var(--canvas);}
.toggle{display:inline-flex;background:var(--panel);border:1px solid var(--divider);border-radius:11px;padding:4px;gap:2px;}
.toggle button{font:inherit;font-size:.875rem;font-weight:600;color:var(--ink-soft);background:transparent;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;transition:all .14s cubic-bezier(.22,1,.36,1);white-space:nowrap;}
.toggle button:hover{color:var(--ink);}
.toggle button.active{color:#fff;background:var(--purple);}
.toggle button[data-v="b"].active{background:var(--blue);}
.frame-wrap{flex:1;min-height:0;}
iframe{width:100%;height:100%;border:none;display:block;}
</style>
</head>
<body>
<div class="toggle-bar">
<div class="toggle" role="tablist" aria-label="Tool index view">
<button data-v="a" class="active" role="tab" aria-selected="true">Our AI Index</button>
<button data-v="b" role="tab" aria-selected="false">Platform Tools</button>
</div>
</div>
<div class="frame-wrap">
<iframe id="view" src="./custom-tools.html" title="Tool index" loading="eager"></iframe>
</div>
<script>
const view=document.getElementById('view');
const SRC={a:'./custom-tools.html',b:'./tool-index.html'};
document.querySelectorAll('.toggle button').forEach(b=>b.addEventListener('click',()=>{
 document.querySelectorAll('.toggle button').forEach(x=>{x.classList.remove('active');x.setAttribute('aria-selected','false');});
 b.classList.add('active');b.setAttribute('aria-selected','true');
 view.src=SRC[b.dataset.v];
}));
</script>
</body>
</html>
