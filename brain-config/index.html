<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Brain Config</title>
<style>
  :root {

  .allbtn:hover { color: var(--text); border-color: var(--ac); } .allbtn i { width: 14px; height: 14px; }

const BADGES={ 'secrets-pii-guard':'halt','source-size-budget-enforcer':'halt','skill-ban-guard':'halt','commit-pre-flight':'halt','memory-edit-guard':'halt','task-dedup-gate':'halt','post-build-verify':'warn','artifact-ship-paperwork':'warn','memory-write-relay':'warn','stale-context-reload':'silent','link-provenance':'silent','multi-edit-batch-gate':'silent' };
const NICKNAMES={ 'recon-renata':'Repo Renata, Review Renata' };
const AGENT_AC={ 'recon-renata':'oklch(0.74 0.14 195)','red-team-reviewer':'oklch(0.72 0.15 300)','research-runner':'oklch(0.80 0.14 85)' };
let allTools=[], usageData={}, currentSort='shelf';
let VIEW={screen:'registry'};
function slugToName(s){ return s.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}); }
function initials(name){ return name.split(/\s+/).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase(); }
function extractPurpose(c){ const m=c.match(/\*\*Purpose:\*\*\s*(.+?)(?:\n|$)/); return m?m[1].trim():''; }
function extractCreated(c){ const m=c.match(/^- (\d{4}-\d{2}-\d{2}):/m); return m?m[1]:null; }
async function fetchJSON(u){ const r=await fetch(u,{cache:'no-store'}); if(!r.ok) throw new Error(r.status); return r.json(); }
async function fetchText(u){ const r=await fetch(u,{cache:'no-store'}); if(!r.ok) return ''; return r.text(); }
function rel(iso){ const d=new Date(iso),m=Math.round((Date.now()-d)/60000); if(m<1)return 'just now'; if(m<60)return m+'m ago'; const h=Math.round(m/60); if(h<24)return h+'h ago'; return Math.round(h/24)+'d ago'; }
function fmt(iso){ const d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
async function loadUsage(){ const t=await fetchText(RAW+'/brain-config/usage-log.json'); if(!t) return; try{ usageData=(JSON.parse(t).tools)||{}; }catch(e){} }
async function loadShelf(shelf){
  let listing; try{ listing=await fetchJSON(BASE+'/contents/'+shelf.folder+'?ref=main'); }catch(e){ return []; }
  if(!Array.isArray(listing)) return [];
  const mds=listing.filter(function(f){return f.name.endsWith('.md') && f.name!=='README.md';});
  const out=[];
  for(const f of mds){
    const slug=f.name.replace('.md','');
    const content=await fetchText(RAW+'/'+shelf.folder+'/'+f.name);
    const tool={ slug:slug, name:slugToName(slug), purpose:extractPurpose(content), shelf:shelf.key,
      url:BLOB+'/'+shelf.folder+'/'+f.name, created:extractCreated(content), uses:usageData[slug]||0,
      badge:BADGES[slug]||null, nicknames:NICKNAMES[slug]||null };
    if(shelf.key==='agents'){
      tool.ac=AGENT_AC[slug]||'oklch(0.70 0.12 20)';
      tool.initials=initials(tool.name);
      tool.reports=[];
      try{ const idx=await fetchJSON(RAW+'/brain-config/agents/'+slug+'/reports/index.json'); tool.reports=idx.reports||[]; }catch(e){}
    }
    out.push(tool);
  }
  return out;
}
function toolRow(t){
  if(t.shelf==='agents'){
    const n=t.reports.length, latest=t.reports[0];
    const chip=n?'<span class="rep-chip">'+n+' report'+(n>1?'s':'')+'</span>':'<span class="rep-chip empty">no reports</span>';
    const sd=(t.name+' '+t.purpose+' '+(t.nicknames||'')).toLowerCase();
    return '<div class="tool agent-row" data-shelf="agents" data-search="'+sd+'" onclick="openAgent(\''+t.slug+'\')">'+
      '<div class="tool-name">'+t.name+(t.nicknames?'<span class="nicknames">'+t.nicknames+'</span>':'')+'</div>'+
      '<div class="tool-purpose">'+t.purpose+'</div>'+
      '<div class="tool-meta">'+chip+'<span class="go-reports">'+(latest?'latest '+rel(latest.ts):'awaiting')+' <i data-lucide="chevron-right"></i></span></div>'+
    '</div>';
  }
  const badge=t.badge?'<span class="badge badge-'+t.badge+'">'+t.badge+'</span>':'';
  const nameHtml=t.url?'<a href="'+t.url+'" target="_blank" rel="noopener">'+t.name+'</a>'+badge:'<span class="np">'+t.name+'</span>'+badge;
  const uses=t.uses>0?'<span class="uses">'+t.uses+' uses</span>':'';
  const date=t.created?'<span>'+t.created+'</span>':'';
  const sd=(t.name+' '+t.purpose+' '+(t.nicknames||'')).toLowerCase();
  return '<div class="tool" data-shelf="'+t.shelf+'" data-search="'+sd+'">'+
    '<div class="tool-name">'+nameHtml+'</div><div class="tool-purpose">'+t.purpose+'</div>'+
    '<div class="tool-meta">'+uses+date+'</div></div>';
}
function sectionHtml(label,css,shelf,tools){ if(!tools.length) return '';
  return '<section class="'+css+'" data-shelf="'+shelf+'"><h2>'+label+'</h2><div class="tool-list">'+tools.map(toolRow).join('')+'</div></section>'; }
function Registry(){
  const hooks=allTools.filter(function(t){return t.shelf==='hooks';}).length, gates=allTools.filter(function(t){return t.shelf==='gates';}).length, agents=allTools.filter(function(t){return t.shelf==='agents';}).length;
  let body='';
  if(currentSort!=='shelf'){
    let sorted=allTools.slice();
    if(currentSort==='created') sorted.sort(function(a,b){return (b.created||'').localeCompare(a.created||'');});
    if(currentSort==='usage') sorted.sort(function(a,b){return b.uses-a.uses;});
    body='<section data-shelf="all"><h2>All tools ('+(currentSort==='created'?'newest first':'most used first')+')</h2><div class="tool-list">'+sorted.map(toolRow).join('')+'</div></section>';
  } else {
    for(const s of SHELVES) body+=sectionHtml(s.label,s.css,s.key,allTools.filter(function(t){return t.shelf===s.key;}));
    body+=sectionHtml('Hooks (prose-only, no repo profile)','shelf-hooks','prose',PROSE_HOOKS.map(function(t){return Object.assign({},t,{shelf:'prose',url:null,uses:0,created:null,badge:null,nicknames:null});}));
    body+=sectionHtml('Triggers (contextual, fire when signal matches)','shelf-triggers','triggers',TRIGGERS.map(function(t){return Object.assign({},t,{shelf:'triggers',url:null,uses:0,created:null,badge:null,nicknames:null});}));
  }
  return '<header><h1>Brain Config</h1><p>Tool registry for the AI Toolkit. Live from '+OWNER+'/'+REPO+'/brain-config/. Agents open their reports; everything else opens its repo profile.</p>'+
    '<div class="search-wrap"><i data-lucide="search" class="si"></i><input id="search" placeholder="Search tools, agents, purposes..."></div>'+
    '<div class="controls">'+
      '<span class="pill" data-f="gates">Gates <strong>'+gates+'</strong></span>'+
      '<span class="pill" data-f="hooks">Hooks <strong>'+hooks+'</strong></span>'+
      '<span class="pill" data-f="prose">Prose <strong>'+PROSE_HOOKS.length+'</strong></span>'+
      '<span class="pill" data-f="triggers">Triggers <strong>'+TRIGGERS.length+'</strong></span>'+
      '<span class="pill" data-f="agents">Agents <strong>'+agents+'</strong></span>'+
      '<span class="sort-group"><button class="sort-btn '+(currentSort==='shelf'?'active':'')+'" data-sort="shelf">shelf</button><button class="sort-btn '+(currentSort==='created'?'active':'')+'" data-sort="created">created</button><button class="sort-btn '+(currentSort==='usage'?'active':'')+'" data-sort="usage">usage</button></span>'+
    '</div></header>'+
    '<div id="content">'+body+'</div>'+
    '<div class="no-results" id="noResults">No tools match that search.</div>'+
    '<footer>Pulls live from GitHub. Agents route to their report history under <code>brain-config/agents/&lt;agent&gt;/reports/</code>. Canonical firing source: AI Toolkit index (ClickUp).</footer>';
}
function bindRegistry(){
  const s=document.getElementById('search'); if(s) s.addEventListener('input',applyFilters);
  document.querySelectorAll('.pill').forEach(function(p){ p.addEventListener('click',function(){ p.classList.toggle('active'); applyFilters(); }); });
  document.querySelectorAll('.sort-btn').forEach(function(b){ b.addEventListener('click',function(){ currentSort=b.dataset.sort; render(); }); });
}
function activeFilters(){ return [].slice.call(document.querySelectorAll('.pill.active')).map(function(p){return p.dataset.f;}); }
function applyFilters(){
  const active=activeFilters(); const si=document.getElementById('search'); const q=(si?si.value:'').toLowerCase().trim();
  const sections=document.querySelectorAll('#content section'); let vis=0;
  sections.forEach(function(sec){
    const tools=sec.querySelectorAll('.tool'); let any=false;
    tools.forEach(function(t){
      const sd=t.dataset.search||'', sh=t.dataset.shelf;
      const shelfOk=active.length===0||active.indexOf(sh)!==-1;
      const textOk=!q||sd.indexOf(q)!==-1;
      const show=shelfOk&&textOk; t.classList.toggle('hidden',!show); if(show){any=true;vis++;}
    });
    sec.classList.toggle('hidden',!any);
  });
  const nr=document.getElementById('noResults'); if(nr) nr.classList.toggle('visible',vis===0);
}
function byId(id){ return allTools.find(function(t){return t.slug===id&&t.shelf==='agents';}); }
async function ensureReport(a,ri){ const e=a.reports[ri]; if(!e||e._loaded||e._loading)return; e._loading=true;
  try{ const full=await fetchJSON(RAW+'/brain-config/agents/'+a.slug+'/reports/'+e.file); Object.assign(e,full); e._loaded=true; }catch(err){ e._error=true; } e._loading=false;
  if(VIEW.screen==='agent'&&VIEW.agent===a.slug) render(); }
function openAgent(slug){ VIEW={screen:'agent',agent:slug,ri:0}; render(); window.scrollTo(0,0); }
function goRegistry(){ VIEW={screen:'registry'}; render(); window.scrollTo(0,0); }
function setRi(ri){ VIEW.ri=ri; render(); window.scrollTo(0,0); }
function AgentScreen(a){
  const head='<div class="rb-top"><button class="back" onclick="goRegistry()"><i data-lucide="chevron-left"></i>Brain Config</button></div>'+
    '<div class="adetail-head"><div class="adisc" style="--ac:'+a.ac+'">'+a.initials+'</div><div><h1>'+a.name+'</h1><div class="rl">'+a.purpose+'</div></div></div>';
  if(!a.reports.length) return head+'<div class="state"><i data-lucide="file-clock"></i><div class="t">No reports filed yet</div><div class="s">'+a.name+' has not filed a report since reporting went live. History will populate here on first run. Profile: <a href="'+a.url+'" target="_blank" rel="noopener" style="color:var(--accent)">view in repo</a>.</div></div>';
  const ri=Math.min(VIEW.ri==null?0:VIEW.ri,a.reports.length-1),r=a.reports[ri],n=a.reports.length,newer=ri>0,older=ri<n-1;
  let pager; if(n===1){ pager='<div class="pager"><div class="solo-label">Only report on file · '+fmt(r.ts)+'</div></div>'; }
  else { pager='<div class="pager"><div class="pager-inner">'+
      '<button class="pg-arrow" '+(older?'':'disabled')+' onclick="setRi('+(ri+1)+')" aria-label="Older"><i data-lucide="chevron-left"></i></button>'+
      '<div class="pg-center"><div class="pt">'+(ri===0?'Latest report':'Report '+(ri+1)+' of '+n)+'</div><div class="pw">'+fmt(r.ts)+'</div></div>'+
      '<button class="pg-arrow" '+(newer?'':'disabled')+' onclick="setRi('+(ri-1)+')" aria-label="Newer"><i data-lucide="chevron-right"></i></button></div>'+
      '<div class="dots">'+a.reports.map(function(rr,i){return '<span class="d '+(i===ri?'on':(i<ri?'':'done'))+'"></span>';}).join('')+'</div>'+
      '<button class="allbtn" onclick="openHist(\''+a.slug+'\','+ri+')"><i data-lucide="list"></i>View all '+n+' reports</button></div>'; }
  let doc; if(r._loaded) doc=ReportDoc(a,r); else if(r._error) doc='<div class="state"><i data-lucide="file-x"></i><div class="t">Could not load this report</div></div>'; else { ensureReport(a,ri); doc=LoadingDoc(a,r); }
  return head+pager+'<div style="--ac:'+a.ac+'">'+doc+'</div>';
}
function LoadingDoc(a,r){ return '<div class="report-sheet" style="--ac:'+a.ac+'"><div class="doc-mast"><div class="doc-tag">Report</div><div class="doc-title">'+r.reportType+'</div><div class="doc-byline">'+a.name+'</div></div>'+
  '<div class="skel" style="width:100%;height:3.2rem;margin:14px 0"></div><div class="skel" style="width:80%;margin:8px 0"></div><div class="skel" style="width:90%;margin:8px 0"></div></div>'; }
function openHist(slug,cur){ const a=byId(slug),s=document.getElementById('histSheet');
  s.innerHTML='<div class="sheet-head"><h3>'+a.name+' · report history</h3><button class="x" onclick="document.getElementById(\'histSheet\').close()"><i data-lucide="x"></i></button></div>'+
    '<div class="sheet-body">'+a.reports.map(function(r,i){return '<button class="idxrow '+(i===cur?'current':(i===0?'':'past'))+'" style="--ac:'+a.ac+'" onclick="document.getElementById(\'histSheet\').close(); setRi('+i+')">'+
      '<span class="marker"></span><div class="im"><div class="it">'+r.reportType+' '+(i===0?'<span class="latest-tag">Latest</span>':'')+'</div><div class="iw">'+fmt(r.ts)+' · '+r.verdictWord+'</div></div>'+
      '<div class="idelta">'+(r.delta||'')+'</div></button>';}).join('')+'</div>';
  s.showModal(); if(window.lucide) lucide.createIcons(); }
function ReportDoc(a,r){ const mast='<div class="doc-mast"><div class="doc-tag">Report</div><div class="doc-title">'+r.reportType+'</div>'+
    '<div class="doc-byline">'+a.name+'</div>'+
    '<div class="doc-metaline"><span><span class="mk">Subject</span> '+r.target+'</span><span><span class="mk">Filed</span> '+fmt(r.ts)+'</span></div></div>';
  const verdict='<div class="doc-verdict"><div class="g"><b>'+r.verdictWord+'</b><span class="chip '+(r.verdictPill==='solid'?'done':'med')+'"><b>'+r.pillText+'</b></span></div>'+
    '<p>'+r.summary+'</p><div class="tally">'+r.tally.map(function(t){return '<span class="chip '+t.c+'"><b>'+t.n+'</b> '+t.l+'</span>';}).join('')+'</div></div>';
  const body=r.type==='audit'?AuditDoc(r):r.type==='review'?ReviewDoc(r):'';
  const foot='<div class="doc-foot"><span>Filed by '+a.name+'</span><span>report '+r.id+'</span></div>';
  return '<div class="report-sheet" style="--ac:'+a.ac+'">'+mast+verdict+body+foot+'</div>'; }
function AuditDoc(r){ return '<div class="doc-h">Findings <span class="cnt">'+r.findings.length+'</span></div>'+
    r.findings.map(function(f){return '<div class="df"><div class="df-top"><span class="df-num">'+f.num+'</span><span class="sev '+f.sev+'">'+(f.sev==='resolved'?'Fixed':f.sev==='med'?'Medium':'Low')+'</span>'+
      '<span class="df-cat">'+f.cat+'</span>'+(f.fixed?'<span class="df-cat fixed"><i data-lucide="check-circle-2"></i>committed</span>':'')+'</div>'+
      '<div class="df-body">'+f.body+'</div><div class="df-fix '+(f.fixed?'done':'')+'"><span class="k">'+(f.fixed?'Done':'Fix')+'</span><span>'+f.fix+'</span></div></div>';}).join('')+
    '<div class="doc-h">Size &amp; Rendition <span class="cnt">'+r.apps.length+' apps</span></div>'+
    r.apps.map(function(p){return '<div class="dt-row '+(p.flag?'flag':'')+'"><span class="nm">'+p.name+'</span><span class="sz">'+p.size+'</span><span class="rd"><span class="dot '+p.dot+'"></span>'+p.rd+'</span></div>';}).join('')+
    '<div class="doc-h">Passed Clean <span class="cnt">'+r.clean.length+'</span></div>'+
    '<div class="dclean">'+r.clean.map(function(c){return '<div class="r"><i data-lucide="check"></i><span>'+c+'</span></div>';}).join('')+'</div>'; }
function ReviewDoc(r){ return '<div class="doc-h">Seven Lenses <span class="cnt">'+r.lenses.filter(function(l){return l.status==='flag';}).length+' flagged</span></div>'+
    r.lenses.map(function(l){return '<div class="dl"><div class="dl-top"><span class="dl-name">'+l.name+'</span><span class="dl-stat '+l.status+'">'+(l.status==='ok'?'Clean':'Flag')+'</span></div>'+
      (l.status!=='ok'?'<div class="dl-body">'+l.body+'</div>':'')+'</div>';}).join('')+
    '<div class="doc-callout"><div class="ct">Highest-value change before building</div><div class="cb">'+r.call+'</div></div>'; }
function render(){
  const v=document.getElementById('view');
  if(VIEW.screen==='registry'){ v.innerHTML=Registry(); bindRegistry(); applyFilters(); }
  else if(VIEW.screen==='agent'){ v.innerHTML=AgentScreen(byId(VIEW.agent)); }
  if(window.lucide) lucide.createIcons();
}
async function init(){
  document.getElementById('view').innerHTML='<div class="loading">Loading tools from GitHub...</div>';
  await loadUsage();
  for(const s of SHELVES){ const t=await loadShelf(s); for(const x of t) allTools.push(x); }
  render();
}
init();
</script>
</body>
</html>
