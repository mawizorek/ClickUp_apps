<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<meta name="robots" content="noindex, nofollow">
<title>Super-Agent Fleet · Golden-Standard Compliance</title>
<!-- VIEW = RENDERER: this file holds NO fleet data. It fetches ./superagents.json and renders it.
     Edit the DATA in superagents.json; this file only formats it. -->
<style>
:root{--canvas:#0b0b0d;--panel:#17181a;--divider:#26272a;--ink:#e8e8ea;--soft:#9a9ba0;--green:#3fb950;--yellow:#d29922;--red:#f85149;--blue:#5b9ae8;--grey:#6e7681;--purple:#8b6df0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--canvas);color:var(--ink);padding:calc(20px + env(safe-area-inset-top)) 16px 40px;line-height:1.45;}
.wrap{max-width:1000px;margin:0 auto;}
h1{font-size:1.35rem;font-weight:700;margin-bottom:4px;}
.sub{color:var(--soft);font-size:.85rem;margin-bottom:18px;}
.std{background:var(--panel);border:1px solid var(--divider);border-radius:12px;padding:14px 16px;margin-bottom:20px;font-size:.85rem;}
.std b{color:var(--purple);}
.std .reqs{color:var(--soft);margin-top:6px;}
table{width:100%;border-collapse:collapse;font-size:.85rem;}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--divider);vertical-align:top;}
th{color:var(--soft);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;}
td.agent{font-weight:600;}
td .slug{display:block;color:var(--soft);font-weight:400;font-size:.75rem;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:600;white-space:nowrap;}
.b-green{background:rgba(63,185,80,.16);color:var(--green);}
.b-yellow{background:rgba(210,153,34,.16);color:var(--yellow);}
.b-red{background:rgba(248,81,73,.16);color:var(--red);}
.b-blue{background:rgba(91,154,232,.16);color:var(--blue);}
.b-grey{background:rgba(110,118,129,.18);color:var(--grey);}
.foot{color:var(--soft);font-size:.78rem;margin-top:20px;}
.err{color:var(--red);background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:10px;padding:14px;}
code{background:var(--panel);padding:1px 6px;border-radius:5px;font-size:.8em;}
</style>
</head>
<body>
<div class="wrap">
<h1>Super-Agent Fleet — Golden-Standard Compliance</h1>
<div class="sub">Canonical view. Data source: <code>superagents.json</code> (edit there, not here).</div>
<div id="std"></div>
<div id="content"><p class="sub">Loading <code>superagents.json</code>…</p></div>
<div class="foot" id="foot"></div>
</div>
<script>
const TRACK={"full-standard":"Full-Standard","task-specific":"Task-Specific / Exempt"};
const BADGE={"up-to-date":["b-green","✅ Up to date"],"needs-declaration":["b-blue","🆕 Needs declaration"],"needs-re-audit":["b-yellow","⚠️ Needs re-audit"],"behind":["b-red","🔴 Behind"],"inventory-only":["b-grey","— Inventory only"]};
function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
fetch('./superagents.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(d=>{
  const gs=d.golden_standard||{};
  document.getElementById('std').innerHTML=
    '<div class="std"><b>Golden standard v'+esc(gs.version)+'</b> · set '+esc(gs.set)+
    '<div class="reqs">Requirements: '+ (gs.requirements||[]).map(esc).join(' · ') +'</div></div>';
  const rows=(d.agents||[]).map(a=>{
    const b=BADGE[a.status]||["b-grey",esc(a.status)];
    return '<tr><td class="agent">'+esc(a.display_name)+'<span class="slug">'+esc(a.slug)+'</span></td>'+
      '<td>'+esc(TRACK[a.track]||a.track)+'</td>'+
      '<td><span class="badge '+b[0]+'">'+b[1]+'</span></td>'+
      '<td>'+esc(a.golden_standard_version||'—')+'</td>'+
      '<td>'+esc(a.last_audit||'—')+'</td>'+
      '<td>'+esc(a.notes||'')+'</td></tr>';
  }).join('');
  document.getElementById('content').innerHTML=
    '<table><thead><tr><th>Agent</th><th>Track</th><th>Status</th><th>Std</th><th>Last audit</th><th>Notes</th></tr></thead><tbody>'+rows+'</tbody></table>';
  document.getElementById('foot').innerHTML='Fleet updated '+esc(d.updated)+'. Distinct from <code>brain-config/agents/</code> (Brain-session council). New agent = add an object to <code>superagents.json</code> + a <code>&lt;slug&gt;/</code> declaration folder.';
}).catch(e=>{document.getElementById('content').innerHTML='<div class="err">Could not load superagents.json: '+esc(e.message)+'. Read the data directly in that file.</div>';});
</script>
</body>
</html>
