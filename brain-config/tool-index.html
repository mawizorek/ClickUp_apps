<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<meta name="robots" content="noindex, nofollow">
<title>Platform Tools · BrainConfig</title>
<meta name="description" content="The native tool surface Brain can call across ClickUp and GitHub, and the safety nets that cover each.">
<style>
:root{--canvas:#0b0b0d;--panel:#17181a;--row:#161719;--row-hi:#1f2023;--divider:#26272a;--ink:#e8e8ea;--ink-soft:#9a9ba0;--ink-faint:#6b6c72;--green:#5aa46a;--blue:#5b9ae8;font-synthesis:none;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;padding:32px 20px 72px;}
.wrap{max-width:840px;margin:0 auto;}
h1{font-size:1.4rem;font-weight:650;letter-spacing:-.02em;margin-bottom:4px;}
.sub{color:var(--ink-soft);font-size:.9375rem;margin-bottom:20px;text-wrap:pretty;}
.search{position:relative;margin-bottom:14px;}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-faint);}
.search input{width:100%;font:inherit;font-size:.9375rem;color:var(--ink);background:var(--panel);border:1px solid var(--divider);border-radius:10px;padding:12px 14px 12px 40px;outline:none;transition:border-color .12s ease;}
.search input:focus{border-color:var(--blue);}
.search input::placeholder{color:var(--ink-faint);}
.bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:14px;}
.bar .filters{display:flex;flex-wrap:wrap;gap:8px;}
.bar button{font:inherit;font-size:.8125rem;font-weight:550;color:var(--ink-soft);background:var(--panel);border:1px solid var(--divider);border-radius:999px;padding:5px 13px;cursor:pointer;transition:all .12s ease;}
.bar button:hover{color:var(--ink);border-color:#3a3b3f;}
.bar button.active{color:#fff;background:var(--blue);border-color:var(--blue);}
.bar .count{margin-left:auto;font-size:.75rem;color:var(--ink-faint);font-variant-numeric:tabular-nums;}
.group{margin-top:22px;}
.group h2{font-size:.6875rem;font-weight:650;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;padding-left:2px;}
.list{display:flex;flex-direction:column;border-top:1px solid var(--divider);}
.tool{background:var(--row);border-bottom:1px solid var(--divider);}
.tool summary{display:flex;align-items:center;gap:13px;padding:12px 14px;cursor:pointer;list-style:none;transition:background .1s ease;}
.tool summary::-webkit-details-marker{display:none;}
.tool summary:hover{background:var(--row-hi);}
.tool .nm{font-size:.9375rem;font-weight:550;font-family:ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:-.01em;}
.tool .badge{display:inline-flex;align-items:center;gap:5px;font-size:.6875rem;font-weight:650;padding:2px 8px;border-radius:999px;flex-shrink:0;}
.badge.has{background:color-mix(in srgb,var(--green) 20%,transparent);color:#7fc48c;}
.badge.none{background:#232326;color:var(--ink-faint);}
.tool .calls{margin-left:auto;font-size:.75rem;color:var(--ink-faint);font-variant-numeric:tabular-nums;flex-shrink:0;}
.tool .chev{color:var(--ink-faint);transition:transform .15s ease;flex-shrink:0;}
.tool[open] .chev{transform:rotate(90deg);}
.detail{padding:2px 16px 16px 44px;color:var(--ink-soft);font-size:.875rem;}
.detail .note{margin-bottom:10px;text-wrap:pretty;}
.detail .guard{display:flex;gap:10px;padding:9px 12px;background:#131416;border:1px solid var(--divider);border-radius:8px;margin-top:8px;}
.detail .guard .g-ico{color:var(--blue);flex-shrink:0;margin-top:1px;}
.detail .guard .g-nm{font-weight:600;color:var(--ink);font-size:.8125rem;}
.detail .guard .g-desc{font-size:.8125rem;color:var(--ink-soft);margin-top:2px;}
.detail .guard a{color:var(--blue);text-decoration:none;}
.detail .guard a:hover{text-decoration:underline;}
.detail .nocover{font-size:.8125rem;color:var(--ink-faint);font-style:italic;}
.empty{display:none;padding:44px 14px;text-align:center;color:var(--ink-faint);font-size:.9375rem;}
@media(max-width:560px){body{padding:24px 12px 56px;}.tool .calls{display:none;}}
</style>
</head>
<body>
<div class="wrap">
<h1>Platform Tools</h1>
<p class="sub">The native tool surface Brain can call across ClickUp and GitHub. A fixed capability set, distinct from the authored AI toolkit. Expand a tool to see which safety nets cover it.</p>
<div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><input id="q" type="text" placeholder="Search platform tools…" autocomplete="off"></div>
<div class="bar"><div class="filters" id="filters"><button class="active" data-f="all">All</button><button data-f="guarded">Has safety net</button><button data-f="unguarded">No coverage</button></div><span class="count" id="count"></span></div>
<div id="groups"></div>
<div class="empty" id="empty">No tools match.</div>
</div>
<script>
const GUARDS={
 'custom-field-gate':{nm:'Custom Field Gate',desc:'Write-once dropdown/label fields require an approved, visible option-list preview before creation.',href:'./hooks/custom-field-gate.md'},
 'task-dedup-gate':{nm:'Task Dedup Gate',desc:'3-step search before creating a task; HALT on exact match, WARN on near match.',href:'./hooks/task-dedup-gate.md'},
 'commit-pre-flight':{nm:'Commit Pre-Flight',desc:'SHA, PR collision, .nojekyll, message, branch, size checks before any commit.',href:'./hooks/commit-pre-flight.md'},
 'secrets-pii-guard':{nm:'Secrets / PII Guard',desc:'Scans outgoing content for keys, tokens, passwords, personal data; HALT on hit.',href:'./hooks/secrets-pii-guard.md'},
 'source-size-budget':{nm:'Source-Size Budget Enforcer',desc:'Keeps source under budget; auto-splits by concern past 12KB.',href:'./hooks/source-size-budget-enforcer.md'},
 'skill-ban-guard':{nm:'Skill-Ban Guard',desc:'Byte-level scan for the active skill hard bans; HALT on hit.',href:'./hooks/skill-ban-guard.md'},
 'post-build-verify':{nm:'Post-Build Verify',desc:'Fetches the live URL after a Pages commit; blocks the shipped claim until verified.',href:'./hooks/post-build-verify.md'},
 'stale-context-reload':{nm:'Stale Context Reload',desc:'Re-fetches a file before editing if it was read too long ago.',href:'./hooks/stale-context-reload.md'},
 'multi-edit-batch':{nm:'Multi-Edit Batch Gate',desc:'Plans + orders 3+ edits to the same file to prevent cascading failures.',href:'./hooks/multi-edit-batch-gate.md'},
 'link-provenance':{nm:'Link Provenance',desc:'Verifies a ClickUp URL came from a live source before emitting it.',href:'./hooks/link-provenance.md'},
 'memory-edit-guard':{nm:'Memory Edit Guard',desc:'Validates token budget, protected content, pointer integrity before a memory write.',href:'./hooks/memory-edit-guard.md'},
 'artifact-ship':{nm:'Artifact Ship Paperwork',desc:'Updates APPS task, version comment, index after an app commit.',href:'./hooks/artifact-ship-paperwork.md'},
 'size-sally':{nm:'Size Sally',desc:'Projects structural-file growth before build/edit/expand; proposes splits in advance.',href:'./agents/size-sally.md'},
 'agent-name-collision-gate':{nm:'Agent Name-Collision Gate',desc:'Scans live Super Agents + repo registry/sidecars for name/nickname collisions before creating or renaming an agent; HALT on exact, WARN on near.',href:'./gates/agent-name-collision-gate.md'},
 'task-move-impact-gate':{nm:'Task Move Impact Gate',desc:'Diffs source vs target list statuses + custom fields before a move; WARNs on anything that will not survive.',href:'./gates/task-move-impact-gate.md'},
 'doc-dedup-placement-gate':{nm:'Doc Dedup & Placement Gate',desc:'Searches for an existing doc/page before creating one; HALT on overlap, WARN on near, verifies hierarchy placement.',href:'./gates/doc-dedup-placement-gate.md'},
 'view-sprawl-gate':{nm:'View Sprawl Gate',desc:'Lists existing views on the location before creating one; WARNs on a near-identical view and offers reuse.',href:'./gates/view-sprawl-gate.md'},
 'list-creation-gate':{nm:'List Creation Gate',desc:'Checks siblings before creating a list; WARNs on overlap and proposes a view/filter when lighter.',href:'./gates/list-creation-gate.md'},
 'multi-home-gate':{nm:'Multi-Home Gate',desc:'Confirms true membership before adding a task to another list; WARNs on over-homing and prefers a view for pure visibility.',href:'./gates/multi-home-gate.md'},
 'time-entry-gate':{nm:'Time Entry Gate',desc:'Checks target task, overlapping range, plausible duration, and attribution before logging time.',href:'./gates/time-entry-gate.md'}
};
const PLATFORM=[
 {n:'create_custom_field',c:'ClickUp',g:['custom-field-gate'],calls:0,note:'Create a custom field. Dropdown/label options are write-once.'},
 {n:'create_task',c:'ClickUp',g:['task-dedup-gate'],calls:0,note:'Create a task.'},
 {n:'update_task',c:'ClickUp',g:['stale-context-reload'],calls:0,note:'Update an existing task.'},
 {n:'move_task_to_list',c:'ClickUp',g:['task-move-impact-gate'],calls:0,note:'Move a task to another list.'},
 {n:'add_task_to_list',c:'ClickUp',g:['multi-home-gate'],calls:0,note:'Add a task to an additional list.'},
 {n:'create_list',c:'ClickUp',g:['list-creation-gate'],calls:0,note:'Create a list.'},
 {n:'create_view',c:'ClickUp',g:['view-sprawl-gate'],calls:0,note:'Create a view.'},
 {n:'create_document',c:'ClickUp',g:['doc-dedup-placement-gate'],calls:0,note:'Create a doc.'},
 {n:'create_document_page',c:'ClickUp',g:['doc-dedup-placement-gate'],calls:0,note:'Add a page to a doc.'},
 {n:'update_document',c:'ClickUp',g:['stale-context-reload'],calls:0,note:'Update a doc page.'},
 {n:'post_comment',c:'ClickUp',g:['link-provenance'],calls:0,note:'Post a comment.'},
 {n:'summarize_task',c:'ClickUp',g:[],calls:0,note:'Summarize a task.'},
 {n:'create_reminder',c:'ClickUp',g:[],calls:0,note:'Create a reminder.'},
 {n:'track_time',c:'ClickUp',g:['time-entry-gate'],calls:0,note:'Log time on a task.'},
 {n:'load_custom_fields',c:'ClickUp',g:[],calls:0,note:'Load custom field definitions.'},
 {n:'retrieve_activity',c:'ClickUp',g:[],calls:0,note:'Retrieve activity history.'},
 {n:'retrieve_chat_messages',c:'ClickUp',g:[],calls:0,note:'Retrieve chat messages.'},
 {n:'generate_project_update',c:'ClickUp',g:[],calls:0,note:'Generate a project update.'},
 {n:'generate_stand_up',c:'ClickUp',g:[],calls:0,note:'Generate a stand-up.'},
 {n:'create_new_agent',c:'ClickUp',g:['agent-name-collision-gate'],calls:0,note:'Create a Super Agent.'},
 {n:'update_existing_agent',c:'ClickUp',g:['agent-name-collision-gate'],calls:0,note:'Update a Super Agent.'},
 {n:'get_agent',c:'ClickUp',g:[],calls:0,note:'Read a Super Agent config.'},
 {n:'search_agents',c:'ClickUp',g:[],calls:0,note:'Search Super Agents.'},
 {n:'manage_personal_priorities',c:'ClickUp',g:[],calls:0,note:'Add/move/remove tasks in a lineup.'},
 {n:'retrieve_personal_priorities',c:'ClickUp',g:[],calls:0,note:'Read a user lineup.'},
 {n:'retrieve_tasks',c:'ClickUp',g:[],calls:0,note:'Structured task retrieval.'},
 {n:'search_workspace',c:'ClickUp',g:[],calls:0,note:'Semantic/keyword workspace search.'},
 {n:'load_assets',c:'ClickUp',g:[],calls:0,note:'Load full asset/attachment detail.'},
 {n:'read_memory',c:'ClickUp',g:[],calls:0,note:'Read from memory.'},
 {n:'save_memory',c:'ClickUp',g:['memory-edit-guard'],calls:0,note:'Write to /PREFERENCES.md.'},
 {n:'create_artifact',c:'ClickUp',g:['skill-ban-guard','source-size-budget'],calls:0,note:'Create an HTML/SVG artifact via a loaded skill.'},
 {n:'githubmcp_push_files',c:'GitHub',g:['commit-pre-flight','secrets-pii-guard','source-size-budget','skill-ban-guard','size-sally'],calls:0,note:'Multi-file commit. Most heavily guarded write path.'},
 {n:'githubmcp_create_or_update_file',c:'GitHub',g:['commit-pre-flight','secrets-pii-guard','source-size-budget','skill-ban-guard'],calls:0,note:'Single-file commit (needs blob SHA to update).'},
 {n:'githubmcp_get_file_contents',c:'GitHub',g:[],calls:0,note:'Read a file or directory.'},
 {n:'githubmcp_create_pull_request',c:'GitHub',g:['commit-pre-flight'],calls:0,note:'Open a PR.'},
 {n:'githubmcp_merge_pull_request',c:'GitHub',g:['post-build-verify'],calls:0,note:'Merge a PR.'},
 {n:'githubmcp_delete_file',c:'GitHub',g:['commit-pre-flight'],calls:0,note:'Delete a file.'},
 {n:'githubmcp_create_branch',c:'GitHub',g:[],calls:0,note:'Create a branch.'},
 {n:'githubmcp_list_branches',c:'GitHub',g:[],calls:0,note:'List branches.'},
 {n:'githubmcp_list_commits',c:'GitHub',g:[],calls:0,note:'List commits.'},
 {n:'githubmcp_get_commit',c:'GitHub',g:[],calls:0,note:'Read a commit.'},
 {n:'githubmcp_list_pull_requests',c:'GitHub',g:[],calls:0,note:'List PRs.'},
 {n:'githubmcp_pull_request_read',c:'GitHub',g:[],calls:0,note:'Read PR detail.'},
 {n:'githubmcp_search_code',c:'GitHub',g:[],calls:0,note:'Search code.'},
 {n:'githubmcp_search_repositories',c:'GitHub',g:[],calls:0,note:'Search repositories.'},
 {n:'githubmcp_issue_write',c:'GitHub',g:[],calls:0,note:'Create or edit an issue.'},
 {n:'githubmcp_list_issues',c:'GitHub',g:[],calls:0,note:'List issues.'}
];
const groups=document.getElementById('groups'),empty=document.getElementById('empty'),countEl=document.getElementById('count'),q=document.getElementById('q');
let qv='',fv='all';
const CATS=['ClickUp','GitHub'];
const SH='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>';
const CH='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){
 groups.innerHTML='';let shown=0;
 CATS.forEach(cat=>{
  const items=PLATFORM.filter(t=>t.c===cat).filter(t=>{
   const guarded=t.g.length>0;
   if(fv==='guarded'&&!guarded)return false;
   if(fv==='unguarded'&&guarded)return false;
   if(qv){const hay=(t.n+' '+t.note+' '+t.g.map(g=>GUARDS[g]?GUARDS[g].nm+' '+GUARDS[g].desc:'').join(' ')).toLowerCase();if(!hay.includes(qv))return false;}
   return true;
  });
  if(!items.length)return;shown+=items.length;
  const sec=document.createElement('div');sec.className='group';sec.innerHTML='<h2>'+cat+'</h2>';
  const list=document.createElement('div');list.className='list';
  items.forEach(t=>{
   const guarded=t.g.length>0;
   const d=document.createElement('details');d.className='tool';
   let s='<summary><span class="nm">'+esc(t.n)+'</span><span class="badge '+(guarded?'has':'none')+'">'+(guarded?SH+t.g.length:'no net')+'</span><span class="calls">'+t.calls+' calls</span><span class="chev">'+CH+'</span></summary>';
   let dt='<div class="detail"><div class="note">'+esc(t.note)+'</div>';
   if(guarded){t.g.forEach(g=>{const G=GUARDS[g];if(!G)return;dt+='<div class="guard"><span class="g-ico">'+SH+'</span><div><div class="g-nm">'+esc(G.nm)+'</div><div class="g-desc">'+esc(G.desc)+' <a href="'+G.href+'">profile →</a></div></div></div>';});}
   else{dt+='<div class="nocover">No safety net covers this tool yet.</div>';}
   dt+='</div>';
   d.innerHTML=s+dt;
   list.appendChild(d);
  });
  sec.appendChild(list);groups.appendChild(sec);
 });
 countEl.textContent=shown+' of '+PLATFORM.length;
 empty.style.display=shown?'none':'block';
}
document.querySelectorAll('#filters button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');fv=b.dataset.f;render();}));
q.addEventListener('input',()=>{qv=q.value.toLowerCase().trim();render();});
render();
</script>
</body>
</html>
