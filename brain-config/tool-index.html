<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  ============================================================================
  BRAINCONFIG · TOOL INDEX
  ============================================================================
  The navigable index of every tool Brain can call, and the safety nets that
  fire before each one. This is the viewer layer (a projection); canonical
  hook/gate definitions live in brain-config/hooks/ and brain-config/gates/.

  Each tool: name, category, the hooks/gates that guard it (with count), a
  short note, and cumulative call count (fed by Closing Clio -> usage-log.json;
  0 until the tally lands). Add tools to the TOOLS array; add guard detail to
  the GUARDS map. Search + coverage filter are client-side.
  ============================================================================
-->
<title>Tool Index · BrainConfig</title>
<style>
  :root{--canvas:#0b0b0d;--panel:#17181a;--row:#161719;--row-hi:#1f2023;--divider:#26272a;--ink:#e8e8ea;--ink-soft:#9a9ba0;--ink-faint:#6b6c72;--purple:#8b6df0;--green:#5aa46a;--amber:#c9a83f;font-synthesis:none;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;padding:44px 20px 72px;}
  .wrap{max-width:840px;margin:0 auto;}
  h1{font-size:1.5rem;font-weight:650;letter-spacing:-.02em;margin-bottom:4px;}
  .sub{color:var(--ink-soft);font-size:.9375rem;margin-bottom:22px;}
  .search{position:relative;margin-bottom:14px;}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-faint);}
  .search input{width:100%;font:inherit;font-size:.9375rem;color:var(--ink);background:var(--panel);border:1px solid var(--divider);border-radius:10px;padding:12px 14px 12px 40px;outline:none;transition:border-color .12s ease;}
  .search input:focus{border-color:var(--purple);}
  .search input::placeholder{color:var(--ink-faint);}
  .bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:18px;}
  .bar .filters{display:flex;flex-wrap:wrap;gap:8px;}
  .bar button{font:inherit;font-size:.8125rem;font-weight:550;color:var(--ink-soft);background:var(--panel);border:1px solid var(--divider);border-radius:999px;padding:5px 13px;cursor:pointer;transition:all .12s ease;}
  .bar button:hover{color:var(--ink);border-color:#3a3b3f;}
  .bar button.active{color:#fff;background:var(--purple);border-color:var(--purple);}
  .bar .count{margin-left:auto;font-size:.75rem;color:var(--ink-faint);font-variant-numeric:tabular-nums;}
  .group{margin-top:22px;}
  .group h2{font-size:.6875rem;font-weight:650;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;padding-left:2px;}
  .list{display:flex;flex-direction:column;border-top:1px solid var(--divider);}
  .tool{background:var(--row);border-bottom:1px solid var(--divider);}
  .tool summary{display:flex;align-items:center;gap:13px;padding:12px 14px;cursor:pointer;list-style:none;transition:background .1s ease;}
  .tool summary::-webkit-details-marker{display:none;}
  .tool summary:hover{background:var(--row-hi);}
  .tool .nm{font-size:.9375rem;font-weight:550;font-family:ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:-.01em;}
  .tool .nets{display:inline-flex;align-items:center;gap:5px;font-size:.6875rem;font-weight:650;padding:2px 8px;border-radius:999px;flex-shrink:0;}
  .nets.has{background:color-mix(in srgb,var(--green) 20%,transparent);color:#7fc48c;}
  .nets.none{background:#232326;color:var(--ink-faint);}
  .tool .calls{margin-left:auto;font-size:.75rem;color:var(--ink-faint);font-variant-numeric:tabular-nums;flex-shrink:0;}
  .tool .chev{color:var(--ink-faint);transition:transform .15s ease;flex-shrink:0;}
  .tool[open] .chev{transform:rotate(90deg);}
  .detail{padding:2px 16px 16px 44px;color:var(--ink-soft);font-size:.875rem;}
  .detail .note{margin-bottom:12px;text-wrap:pretty;}
  .detail .guard{display:flex;gap:10px;padding:9px 12px;background:#131416;border:1px solid var(--divider);border-radius:8px;margin-top:8px;}
  .detail .guard .g-ico{color:var(--purple);flex-shrink:0;margin-top:1px;}
  .detail .guard .g-nm{font-weight:600;color:var(--ink);font-size:.8125rem;}
  .detail .guard .g-desc{font-size:.8125rem;color:var(--ink-soft);margin-top:2px;}
  .detail .guard a{color:var(--purple);text-decoration:none;}
  .detail .guard a:hover{text-decoration:underline;}
  .detail .nocover{font-size:.8125rem;color:var(--ink-faint);font-style:italic;}
  .empty{display:none;padding:48px 14px;text-align:center;color:var(--ink-faint);font-size:.9375rem;}
  @media(max-width:560px){body{padding:28px 12px 56px;}.tool .calls{display:none;}}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Tool Index</h1>
    <p class="sub">Every tool Brain can call, and the safety nets that fire before each one. Expand a tool to read its guards and notes.</p>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="q" type="text" placeholder="Search tools… (try: custom field)" autocomplete="off">
    </div>
    <div class="bar">
      <div class="filters">
        <button data-f="all" class="active">All</button>
        <button data-f="guarded">Has safety net</button>
        <button data-f="unguarded">No coverage</button>
      </div>
      <span class="count" id="count"></span>
    </div>
    <div id="groups"></div>
    <div class="empty" id="empty">No tools match.</div>
  </div>
  <script>
    // guard definitions (canonical content lives in brain-config/hooks|gates/)
    const GUARDS={
      'custom-field-gate':{nm:'Custom Field Gate',desc:'Write-once dropdown/label fields require an approved, visible option-list preview before creation.',href:'./hooks/custom-field-gate.md'},
      'task-dedup-gate':{nm:'Task Dedup Gate',desc:'3-step search before creating a task; HALT on exact match, WARN on near match.',href:'./hooks/task-dedup-gate.md'},
      'commit-pre-flight':{nm:'Commit Pre-Flight',desc:'Blob SHA, PR collision, .nojekyll, message format, branch, size checks before any commit.',href:'./hooks/commit-pre-flight.md'},
      'secrets-pii-guard':{nm:'Secrets / PII Guard',desc:'Scans outgoing content for keys, tokens, passwords, personal data; HALT on hit.',href:'./hooks/secrets-pii-guard.md'},
      'source-size-budget':{nm:'Source-Size Budget Enforcer',desc:'Keeps source under budget; auto-splits by concern past 12KB.',href:'./hooks/source-size-budget-enforcer.md'},
      'skill-ban-guard':{nm:'Skill-Ban Guard',desc:'Byte-level scan for the active skill\u2019s hard bans; HALT on hit.',href:'./hooks/skill-ban-guard.md'},
      'post-build-verify':{nm:'Post-Build Verify',desc:'Fetches the live URL after a Pages commit; blocks the \u201cshipped\u201d claim until verified.',href:'./hooks/post-build-verify.md'},
      'stale-context-reload':{nm:'Stale Context Reload',desc:'Re-fetches a file before editing if it was read too long ago.',href:'./hooks/stale-context-reload.md'},
      'multi-edit-batch':{nm:'Multi-Edit Batch Gate',desc:'Plans + orders 3+ edits to the same file to prevent cascading failures.',href:'./hooks/multi-edit-batch-gate.md'},
      'link-provenance':{nm:'Link Provenance',desc:'Verifies a ClickUp URL came from a live source before emitting it.',href:'./hooks/link-provenance.md'},
      'memory-edit-guard':{nm:'Memory Edit Guard',desc:'Validates token budget, protected content, pointer integrity before a memory write.',href:'./hooks/memory-edit-guard.md'},
      'artifact-ship':{nm:'Artifact Ship Paperwork',desc:'Updates APPS task, version comment, index after an app commit.',href:'./hooks/artifact-ship-paperwork.md'},
      'size-sally':{nm:'Size Sally (forecaster)',desc:'Projects structural-file growth before build/edit/expand; proposes splits in advance.',href:'./agents/size-sally.md'}
    };
    // tool roster. calls = cumulative (0 until Clio tally lands).
    const TOOLS=[
      {n:'create_custom_field',c:'ClickUp',g:['custom-field-gate'],calls:0,note:'Creates a custom field. Dropdown/label option lists are write-once, hence the gate.'},
      {n:'create_task',c:'ClickUp',g:['task-dedup-gate'],calls:0,note:'Creates a task. Dedup search runs first.'},
      {n:'update_task',c:'ClickUp',g:['stale-context-reload'],calls:0,note:'Updates an existing task.'},
      {n:'move_task_to_list',c:'ClickUp',g:[],calls:0,note:'Moves a task to another list.'},
      {n:'add_task_to_list',c:'ClickUp',g:[],calls:0,note:'Adds a task to an additional list.'},
      {n:'create_list',c:'ClickUp',g:[],calls:0,note:'Creates a list.'},
      {n:'create_view',c:'ClickUp',g:[],calls:0,note:'Creates a view.'},
      {n:'create_document',c:'ClickUp',g:[],calls:0,note:'Creates a doc.'},
      {n:'update_document',c:'ClickUp',g:['stale-context-reload'],calls:0,note:'Updates a doc page.'},
      {n:'create_document_page',c:'ClickUp',g:[],calls:0,note:'Adds a page to a doc.'},
      {n:'post_comment',c:'ClickUp',g:['link-provenance'],calls:0,note:'Posts a comment. Confirm before sending.'},
      {n:'create_reminder',c:'ClickUp',g:[],calls:0,note:'Creates a reminder.'},
      {n:'track_time',c:'ClickUp',g:[],calls:0,note:'Logs time on a task.'},
      {n:'create_new_agent',c:'ClickUp',g:[],calls:0,note:'Creates a Super Agent.'},
      {n:'update_existing_agent',c:'ClickUp',g:[],calls:0,note:'Updates a Super Agent.'},
      {n:'manage_personal_priorities',c:'ClickUp',g:[],calls:0,note:'Adds/moves/removes tasks in a lineup.'},
      {n:'githubmcp_push_files',c:'GitHub',g:['commit-pre-flight','secrets-pii-guard','source-size-budget','skill-ban-guard','size-sally'],calls:0,note:'Multi-file commit. The most heavily guarded write path.'},
      {n:'githubmcp_create_or_update_file',c:'GitHub',g:['commit-pre-flight','secrets-pii-guard','source-size-budget','skill-ban-guard'],calls:0,note:'Single-file commit (needs blob SHA to update).'},
      {n:'githubmcp_create_pull_request',c:'GitHub',g:['commit-pre-flight'],calls:0,note:'Opens a PR.'},
      {n:'githubmcp_merge_pull_request',c:'GitHub',g:['post-build-verify'],calls:0,note:'Merges a PR.'},
      {n:'githubmcp_delete_file',c:'GitHub',g:['commit-pre-flight'],calls:0,note:'Deletes a file.'},
      {n:'create_artifact',c:'Artifacts',g:['skill-ban-guard','source-size-budget'],calls:0,note:'Creates an HTML/SVG/etc artifact via a loaded skill.'},
      {n:'read_memory',c:'Memory',g:[],calls:0,note:'Reads from the memory directory.'},
      {n:'save_memory',c:'Memory',g:['memory-edit-guard'],calls:0,note:'Writes to /PREFERENCES.md. Guarded pre-write.'},
      {n:'gmail_send_email',c:'Google',g:['secrets-pii-guard'],calls:0,note:'Sends an email. Confirm before sending.'},
      {n:'gmail_create_draft',c:'Google',g:[],calls:0,note:'Creates an email draft.'},
      {n:'create_google_calendar_event',c:'Google',g:[],calls:0,note:'Creates a calendar event.'},
      {n:'search_workspace',c:'Retrieval',g:[],calls:0,note:'Semantic/keyword workspace search.'},
      {n:'retrieve_tasks',c:'Retrieval',g:[],calls:0,note:'Structured task retrieval.'},
      {n:'search_web',c:'Retrieval',g:[],calls:0,note:'Public web search.'}
    ];
    const CATS=['ClickUp','GitHub','Artifacts','Memory','Google','Retrieval'];
    const groups=document.getElementById('groups'),empty=document.getElementById('empty'),countEl=document.getElementById('count');
    let qv='',fv='all';
    function chev(){return '<span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>';}
    function render(){
      groups.innerHTML='';let total=0;
      CATS.forEach(cat=>{
        const items=TOOLS.filter(t=>t.c===cat).filter(t=>{
          const hay=(t.n+' '+t.note+' '+t.g.map(g=>GUARDS[g]?GUARDS[g].nm:'').join(' ')).toLowerCase();
          if(qv&&!hay.includes(qv))return false;
          if(fv==='guarded'&&t.g.length===0)return false;
          if(fv==='unguarded'&&t.g.length>0)return false;
          return true;
        });
        if(!items.length)return;total+=items.length;
        const sec=document.createElement('div');sec.className='group';
        sec.innerHTML='<h2>'+cat+'</h2>';
        const list=document.createElement('div');list.className='list';
        items.forEach(t=>{
          const has=t.g.length>0;
          const d=document.createElement('details');d.className='tool';
          let guards=has?t.g.map(id=>{const g=GUARDS[id];if(!g)return '';return '<div class="guard"><span class="g-ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span><div><div class="g-nm">'+g.nm+'</div><div class="g-desc">'+g.desc+' <a href="'+g.href+'">profile</a></div></div></div>';}).join(''):'<div class="nocover">No safety net yet. This tool runs unguarded.</div>';
          d.innerHTML='<summary><span class="nm">'+t.n+'</span><span class="nets '+(has?'has':'none')+'">'+(has?t.g.length+' net'+(t.g.length>1?'s':''):'0 nets')+'</span><span class="calls">'+t.calls+' calls</span>'+chev()+'</summary><div class="detail"><div class="note">'+t.note+'</div>'+guards+'</div>';
          list.appendChild(d);
        });
        sec.appendChild(list);groups.appendChild(sec);
      });
      empty.style.display=total?'none':'block';
      countEl.textContent=total+' of '+TOOLS.length+' tools';
    }
    document.getElementById('q').addEventListener('input',e=>{qv=e.target.value.trim().toLowerCase();render();});
    document.querySelectorAll('.bar button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.bar button').forEach(x=>x.classList.remove('active'));b.classList.add('active');fv=b.dataset.f;render();}));
    render();
  </script>
</body>
</html>
