<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileMaker Doc Viewer</title>
<style>
  :root {
    --bg-0: oklch(16% 0.012 285); --bg-1: oklch(19% 0.014 285); --bg-2: oklch(23% 0.016 285); --bg-3: oklch(27% 0.018 285);
    --line: oklch(32% 0.02 285); --line-soft: oklch(27% 0.016 285);
    --text-0: oklch(94% 0.008 285); --text-1: oklch(78% 0.012 285); --text-2: oklch(63% 0.014 285); --text-3: oklch(52% 0.014 285);
    --accent: oklch(72% 0.14 285);
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; --mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --ease: cubic-bezier(0.22,1,0.36,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg-0); color: var(--text-1); font-weight: 350; line-height: 1.55; letter-spacing: 0.01em; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 64px 24px; }
  .kicker { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); font-weight: 600; }
  h1 { font-size: 1.875rem; font-weight: 600; color: var(--text-0); margin-top: 8px; letter-spacing: 0; }
  .sub { color: var(--text-3); font-size: 0.875rem; margin-top: 6px; }
  .apps { margin-top: 40px; display: flex; flex-direction: column; gap: 12px; }
  .app { border: 1px solid var(--line-soft); border-radius: 12px; padding: 20px 22px; background: var(--bg-1); transition: border-color 0.15s var(--ease); }
  .app:hover { border-color: var(--line); }
  .app h2 { font-family: var(--mono); font-size: 1.125rem; font-weight: 600; color: var(--text-0); letter-spacing: 0; }
  .app p { color: var(--text-2); font-size: 0.8125rem; margin-top: 4px; max-width: 60ch; text-wrap: pretty; }
  .lenses { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .lens { text-decoration: none; font-size: 0.8125rem; font-weight: 500; padding: 8px 16px; border-radius: 8px; transition: all 0.12s var(--ease); }
  .lens.primary { background: var(--accent); color: var(--bg-0); }
  .lens.primary:hover { filter: brightness(1.08); }
  .lens.ghost { background: var(--bg-2); color: var(--text-1); border: 1px solid var(--line); }
  .lens.ghost:hover { background: var(--bg-3); color: var(--text-0); }
  .empty, .loading { color: var(--text-3); font-size: 0.875rem; margin-top: 40px; font-family: var(--mono); }
  footer { margin-top: 56px; padding-top: 16px; border-top: 1px solid var(--line-soft); font-size: 0.75rem; color: var(--text-3); }
  footer code { font-family: var(--mono); background: var(--bg-2); padding: 1px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Repo-native docs</div>
  <h1>FileMaker Doc Viewer</h1>
  <div class="sub">Renders any app under <code style="font-family:var(--mono)">filemaker/&lt;slug&gt;/</code> from its schema, calcs, scripts + relationships.</div>
  <div class="apps" id="apps"><div class="loading">loading registry…</div></div>
  <footer>Add an app to <code>apps.json</code> to register it. Deep link: <code>?app=&lt;slug&gt;</code> forwards to the schema view.</footer>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const forward = params.get('app');
  if (forward){ location.replace('schema.html?app=' + encodeURIComponent(forward)); }

  fetch('apps.json', { cache: 'no-store' }).then(r => r.json()).then(data => {
    const el = document.getElementById('apps');
    if (!data.apps || !data.apps.length){ el.innerHTML = '<div class="empty">No apps registered yet.</div>'; return; }
    el.innerHTML = data.apps.map(a => {
      const slug = encodeURIComponent(a.slug);
      return `
      <div class="app">
        <h2>${a.name || a.slug}</h2>
        <p>${a.desc || ''}</p>
        <div class="lenses">
          <a class="lens primary" href="schema.html?app=${slug}">Schema + calcs</a>
          <a class="lens ghost" href="relationships.html?app=${slug}">Relationships</a>
          <a class="lens ghost" href="scripts.html?app=${slug}">Scripts</a>
          <a class="lens ghost" href="linter.html?app=${slug}">Calc linter</a>
        </div>
      </div>`; }).join('');
  }).catch(() => {
    document.getElementById('apps').innerHTML = '<div class="empty">Could not load apps.json.</div>';
  });
</script>
</body>
</html>
