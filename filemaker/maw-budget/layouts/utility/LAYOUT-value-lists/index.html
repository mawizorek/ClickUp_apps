<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VALUE_Lists — Inspector</title>
<style>
  :root{--bg:oklch(0.19 0.012 260);--panel:oklch(0.24 0.014 260);--line:oklch(0.4 0.02 260/.4);--txt:oklch(0.92 0.008 260);--mut:oklch(0.66 0.012 260);--acc:oklch(0.72 0.11 205);--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);padding:28px;line-height:1.5}
  h1{font-size:20px;margin:0 0 2px}.sub{color:var(--mut);font-size:12.5px;margin-bottom:22px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:15px 17px}
  .card h2{font-size:14px;margin:0 0 3px;color:var(--acc)}
  .tag{display:inline-block;font-family:var(--mono);font-size:10.5px;color:var(--mut);border:1px solid var(--line);border-radius:100px;padding:2px 9px;margin:0 5px 5px 0}
  .tag.stat{color:var(--acc);border-color:var(--acc)}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12.5px}
  th,td{text-align:left;padding:5px 8px;border-bottom:1px solid var(--line)}
  th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
  td.mono{font-family:var(--mono);font-size:11.5px}
  .vals{font-family:var(--mono);font-size:11.5px;color:var(--txt);margin-top:8px;white-space:pre-line}
  .note{color:var(--mut);font-size:11.5px;margin-top:9px;font-style:italic}
</style>
</head>
<body>
<h1>VALUE_Lists — Object / Data Inspector</h1>
<div class="sub">SYS | Value Lists [DSK] · occurrence <b>ValueLists</b> · data mirror of value-lists/_index.json · bindings proposed</div>
<div class="grid" id="grid"></div>
<script src="./preview.html" onerror=""></script>
<script>
// pull the same manifest the preview embeds (kept in sync in one PR)
fetch('./preview.html').then(function(r){return r.text();}).then(function(html){
  var m=html.match(/<script type="application\/json" id="vl-manifest">([\s\S]*?)<\/script>/);
  var M=JSON.parse(m[1]);
  document.getElementById('grid').innerHTML=M.valueLists.map(function(v){
    var flags=[v.flags.isActive?'active':'inactive'];if(v.flags.isStatusList)flags.push('statusList');if(v.flags.enforce1to1)flags.push('1-to-1');
    var tags='<span class="tag">'+v.derivation+'</span>'+flags.map(function(f){return '<span class="tag'+(f==='statusList'?' stat':'')+'">'+f+'</span>';}).join('');
    var body='';
    if(v.items){body='<table><tr><th>Sort</th><th>Value</th><th>Status</th></tr>'+v.items.map(function(i){return '<tr><td class="mono">'+i.sort+'</td><td>'+i.value+'</td><td class="mono">'+(i.statusCategory||'')+'</td></tr>';}).join('')+'</table>';}
    else if(v.values){body='<div class="vals">'+v.values.join('\n')+'</div>';}
    else if(v.source){body='<div class="note">from '+v.source.occurrenceId+'::'+v.source.displayField+' (derived, not stored)</div>';}
    return '<div class="card"><h2>'+v.name+'</h2><div class="mono" style="font-size:11px;color:var(--mut);margin-bottom:8px">'+v.valueListId+'</div>'+tags+body+'</div>';
  }).join('');
});
</script>
</body>
</html>
