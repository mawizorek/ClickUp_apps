<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Value Lists</title>
<style>
  /* =========================================================
     THE PAGE IS THE LAYOUT. Full-bleed, scrolls, live controls.
     Not a picture of a FileMaker window on gray - the actual
     runnable screen, recreated from Michael's URITP Budget
     Value Lists layout. Generic + data-driven (embedded
     manifest mirrors value-lists/_index.json), so the same
     shell renders any app's value lists. Theme is PROVISIONAL;
     a themes-standard session skins it later.
     ========================================================= */
  :root{
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --bg:oklch(0.16 0.005 260);
    --bar:oklch(0.205 0.008 260);
    --rail:oklch(0.185 0.007 260);
    --rail-line:oklch(0.30 0.009 260/.6);
    --panel:oklch(0.175 0.006 260);
    --field:oklch(0.225 0.008 260);
    --field-border:oklch(0.36 0.012 260);
    --field-text:oklch(0.93 0.006 260);
    --muted:oklch(0.64 0.01 260);
    --line:oklch(0.30 0.009 260/.55);
    --orange:oklch(0.72 0.15 55);
    --orange-press:oklch(0.66 0.16 52);
    --teal:oklch(0.80 0.10 195);
    --green:oklch(0.80 0.14 150);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--field-text);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-optical-sizing:auto;font-variant-numeric:tabular-nums}
  #app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:var(--bar);flex-shrink:0;display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--line)}
  .brand{display:flex;flex-direction:column;line-height:1.12;margin-right:6px}
  .brand .a{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--orange)}
  .brand .b{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--teal)}
  .spacer{flex:1}
  .btn{font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;padding:8px 15px;border-radius:7px;border:1px solid transparent;white-space:nowrap;transition:background .13s cubic-bezier(.25,1,.5,1),border-color .13s,transform .05s}
  .btn:active{transform:translateY(1px)}
  .btn.action{background:var(--orange);color:oklch(0.2 0.03 60);border-color:var(--orange)}
  .btn.action:hover{background:var(--orange-press)}
  .btn.ghost{background:var(--field);color:var(--muted);border-color:var(--field-border)}
  .btn.ghost:hover{border-color:var(--teal);color:var(--field-text)}
  .btn.on{background:var(--teal);color:oklch(0.18 0.03 200);border-color:var(--teal)}
  .stage{flex:1;min-height:0;display:flex}
  .rail{width:246px;flex-shrink:0;background:var(--rail);border-right:1px solid var(--line);overflow-y:auto;padding:6px 0}
  .ri{padding:13px 18px;font-size:14.5px;cursor:pointer;color:var(--field-text);border-bottom:1px solid var(--rail-line);transition:background .12s cubic-bezier(.25,1,.5,1)}
  .ri:hover{background:oklch(0.23 0.009 260)}
  .ri.on{background:var(--orange);color:oklch(0.19 0.03 55);font-weight:600}
  .ri .sub{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:2px}
  .ri.on .sub{color:oklch(0.32 0.05 55)}
  .detail{flex:1;min-width:0;overflow-y:auto;padding:18px 22px 30px}
  .dhead{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .notesbtn{font-size:10px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;color:var(--muted);border:1px solid var(--field-border);border-radius:6px;padding:7px 11px;background:var(--field);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .notesbtn:hover{border-color:var(--teal);color:var(--field-text)}
  .dtitle{font-size:20px;font-weight:700;color:var(--teal);letter-spacing:-.01em}
  .dmeta{font-size:11.5px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
  .flags{margin-left:auto;display:flex;flex-direction:column;gap:7px;align-items:flex-start}
  .chk{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:11px;letter-spacing:.05em;font-weight:700;color:var(--muted)}
  .chk .box{width:16px;height:16px;border:1.5px solid var(--field-border);border-radius:4px;background:var(--field);display:inline-flex;align-items:center;justify-content:center;color:oklch(0.18 0.02 150);transition:background .12s,border-color .12s}
  .chk.on .box{background:var(--green);border-color:var(--green)}
  .chk .box svg{opacity:0;transition:opacity .1s}.chk.on .box svg{opacity:1}
  .chk.on{color:var(--teal)}
  .derive{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 13px;font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:14px}
  .derive b{color:var(--field-text);font-weight:600}
  .derive .m{font-family:var(--mono);font-size:11.5px;color:var(--teal)}
  .cols{display:grid;gap:10px;padding:0 2px 9px;font-size:10px;letter-spacing:.11em;text-transform:uppercase;font-weight:700;color:var(--muted)}
  .cols.stat{grid-template-columns:56px 1fr 30px 190px}
  .cols.plain{grid-template-columns:56px 1fr 30px}
  .cols .cnt{color:var(--orange)}
  .row{display:grid;gap:10px;align-items:center;margin-bottom:9px}
  .row.stat{grid-template-columns:56px 1fr 30px 190px}
  .row.plain{grid-template-columns:56px 1fr 30px}
  .sortbox{height:34px;background:var(--field);border:1px solid var(--field-border);border-radius:6px;color:var(--field-text);text-align:center;font-size:13.5px;outline:none;transition:border-color .12s,box-shadow .12s}
  .inp{width:100%;height:34px;background:var(--field);color:var(--field-text);border:1px solid var(--field-border);border-radius:6px;padding:0 11px;font-family:var(--sans);font-size:13.5px;outline:none;transition:border-color .12s cubic-bezier(.25,1,.5,1),box-shadow .12s}
  .sortbox:focus,.inp:focus{border-color:var(--teal);box-shadow:0 0 0 3px oklch(0.80 0.10 195/.24)}
  select.inp{-webkit-appearance:none;appearance:none;cursor:pointer;padding-right:28px;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 15px) 15px,calc(100% - 10px) 15px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  .info{width:24px;height:24px;border-radius:50%;border:1px solid var(--field-border);background:var(--field);color:var(--muted);font-size:12px;font-style:italic;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;justify-self:center}
  .info:hover{border-color:var(--teal);color:var(--teal)}
  .addrow .inp{color:var(--muted);font-style:italic}
  .statusbar{background:var(--bar);flex-shrink:0;display:flex;align-items:center;gap:11px;padding:8px 16px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted)}
  .pk{font-family:var(--mono);font-size:11.5px;color:var(--field-text);background:var(--field);border:1px solid var(--field-border);border-radius:5px;padding:4px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:min(46vw,380px)}
  .ver{margin-left:auto;color:var(--green);font-weight:700}
  .save{color:var(--muted)}
  #globals{position:fixed;top:58px;right:14px;width:min(580px,92vw);max-height:76vh;overflow-y:auto;background:var(--bar);border:1px solid var(--orange);border-radius:11px;box-shadow:0 26px 64px -22px oklch(0 0 0/.75);padding:16px 18px 18px;display:none;z-index:40}
  #globals.show{display:block}
  #globals .gt{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--muted);text-align:center;margin-bottom:13px}
  .ggrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
  .gcell .glab{font-family:var(--mono);font-size:11px;color:var(--orange);margin-bottom:5px}
  #flash{position:fixed;left:50%;bottom:54px;transform:translateX(-50%) translateY(12px);background:var(--bar);color:var(--field-text);border:1px solid var(--field-border);padding:9px 16px;border-radius:9px;font-size:12.5px;opacity:0;pointer-events:none;z-index:50;box-shadow:0 14px 34px -14px oklch(0 0 0/.7);transition:opacity .18s,transform .28s cubic-bezier(.22,1,.36,1)}
  #flash.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:640px){
    .stage{flex-direction:column}
    .rail{width:auto;max-height:34vh;border-right:none;border-bottom:1px solid var(--line);display:flex;overflow-x:auto}
    .ri{border-bottom:none;border-right:1px solid var(--rail-line);white-space:nowrap}
    .flags{margin-left:0;flex-direction:row;flex-wrap:wrap;gap:10px 14px}
    .cols.stat,.row.stat{grid-template-columns:48px 1fr 28px 140px}
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand"><span class="a">maw-budget</span><span class="b">Value Lists</span></div>
    <button class="btn action" data-btn="New Value List">New Value List</button>
    <div class="spacer"></div>
    <button class="btn action" data-btn="Navigation">Navigation placeholder</button>
    <button class="btn ghost" id="gbtn">GLOBALS</button>
  </div>
  <div class="stage">
    <nav class="rail" id="rail"></nav>
    <main class="detail" id="detail"></main>
  </div>
  <div class="statusbar">
    <span>PrimaryKey</span><span class="pk" id="pk">9D347A74-0BD8-49C5-9D75-</span>
    <span class="ver">v0.1.0</span>
    <span class="save">Last save: 7/16/2026 7:51:04 AM</span>
  </div>
</div>
<div id="globals"></div>
<div id="flash"></div>

<script type="application/json" id="vl-manifest">
{
  "pkByList": {
    "VL_StatusCategories": "9D347A74-0BD8-49C5-9D75-4A1187F0C332",
    "VL_ImportRowStatus": "E44D55B3-3800-4603-9EC0-4698235A1D0C"
  },
  "canonicalStatusCategories": ["New","Error","Active","Done","Closed"],
  "globalKeys": [
    { "key": "gLIST_StatusCategories", "assignedTo": "VL_StatusCategories" },
    { "key": "gLIST_ImportSessionStatus", "assignedTo": "VL_ImportSessionStatus" },
    { "key": "gLIST_TransactionStates", "assignedTo": "VL_TransactionStates" },
    { "key": "gLIST_ImportRowStatus", "assignedTo": "VL_ImportRowStatus" },
    { "key": "gLIST_AccountTypes", "assignedTo": "VL_AccountTypes" },
    { "key": "gLIST_Environment", "assignedTo": "VL_Environment" }
  ],
  "valueLists": [
    { "valueListId":"VL_StatusCategories","name":"Status Categories","derivation":"relatedTable","isCanonical":true,"flags":{"isActive":true,"isStatusList":true,"enforce1to1":true},"items":[{"sort":0,"value":"New","statusCategory":"New"},{"sort":1,"value":"Error","statusCategory":"Error"},{"sort":4,"value":"Active","statusCategory":"Active"},{"sort":7,"value":"Done","statusCategory":"Done"},{"sort":9,"value":"Closed","statusCategory":"Closed"}] },
    { "valueListId":"VL_TransactionStates","name":"Transaction States","derivation":"relatedTable","flags":{"isActive":true,"isStatusList":true,"enforce1to1":true},"items":[{"sort":1,"value":"Pending","statusCategory":"Active"},{"sort":2,"value":"Cleared","statusCategory":"Done"}] },
    { "valueListId":"VL_ImportRowStatus","name":"Import Row Statuses","derivation":"relatedTable","flags":{"isActive":true,"isStatusList":true,"enforce1to1":true},"items":[{"sort":1,"value":"new","statusCategory":"New"},{"sort":3,"value":"needs_review","statusCategory":"Error"},{"sort":2,"value":"carry_forward","statusCategory":"Active"},{"sort":4,"value":"ignored_duplicate","statusCategory":"Closed"}] },
    { "valueListId":"VL_ImportSessionStatus","name":"Import Session Statuses","derivation":"relatedTable","flags":{"isActive":true,"isStatusList":true,"enforce1to1":true},"items":[{"sort":1,"value":"queued","statusCategory":"New"},{"sort":2,"value":"importing","statusCategory":"Active"},{"sort":3,"value":"failed","statusCategory":"Error"},{"sort":4,"value":"complete","statusCategory":"Done"}] },
    { "valueListId":"VL_AccountTypes","name":"Account Types","derivation":"globalSeed","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"storage":"Globals::gLIST_AccountTypes","values":["Checking","Savings","Credit Card","Cash","Loan","Receivable","Asset (feed-less)"] },
    { "valueListId":"VL_CategoryType","name":"Category Type","derivation":"custom","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"values":["Income","Expense"] },
    { "valueListId":"VL_BillCadence","name":"Bill Cadence","derivation":"custom","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"values":["Weekly","Biweekly","Monthly","Quarterly","Annual"] },
    { "valueListId":"VL_Environment","name":"Environment","derivation":"globalSeed","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"storage":"Globals::gLIST_Environment","values":["DEV","PROD"] },
    { "valueListId":"VL_ThemeMode","name":"Theme Mode","derivation":"globalSeed","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"storage":"Globals::gLIST_ThemeMode","values":["Dark","Light"] },
    { "valueListId":"VL_Accounts","name":"Accounts","derivation":"fromField","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"source":{"occurrenceId":"Account","displayField":"Name","sort":"Name ASC"},"values":null }
  ]
}
</script>

<script>
(function(){
  var M=JSON.parse(document.getElementById('vl-manifest').textContent);
  var VLS=M.valueLists, CANON=M.canonicalStatusCategories;
  var railEl=document.getElementById('rail'), detEl=document.getElementById('detail'),
      pkEl=document.getElementById('pk'), gEl=document.getElementById('globals');
  var state={active:VLS[0].valueListId};
  var CHECK='<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.2l2.2 2.2 4.8-5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function byId(id){return VLS.filter(function(v){return v.valueListId===id;})[0];}
  function deriveText(v){
    if(v.derivation==='relatedTable') return 'Backed by <b>ValueListItems</b> (portal-edited).'+(v.flags.isStatusList?' Each value maps to a canonical status category.':'');
    if(v.derivation==='globalSeed') return 'Global seed: keys stored in <span class="m">'+esc(v.storage||'')+'</span>, surfaced via a use-values-from-field list.';
    if(v.derivation==='custom') return 'Custom values, hand-typed and stored on the value list.';
    if(v.derivation==='fromField') return 'Dynamic: values from <span class="m">'+esc(v.source.occurrenceId)+'::'+esc(v.source.displayField)+'</span> (sorted '+esc(v.source.sort||'')+'). Derived, never stored.';
    return '';
  }
  function renderRail(){
    railEl.innerHTML=VLS.map(function(v){
      var sub=v.derivation+(v.flags.isStatusList?' \u00b7 status':'');
      return '<div class="ri'+(v.valueListId===state.active?' on':'')+'" data-vl="'+v.valueListId+'">'+esc(v.name)+'<span class="sub">'+esc(sub)+'</span></div>';
    }).join('');
  }
  function statusSelect(sel){
    return '<select class="inp">'+CANON.map(function(c){return '<option'+(c===sel?' selected':'')+'>'+esc(c)+'</option>';}).join('')+'</select>';
  }
  function renderDetail(){
    var v=byId(state.active), stat=v.flags.isStatusList;
    pkEl.textContent=(M.pkByList&&M.pkByList[v.valueListId])||'\u2014 (new record)';
    function fl(label,on){return '<div class="chk'+(on?' on':'')+'" data-flag><span class="box">'+CHECK+'</span>'+label+'</div>';}
    var head='<div class="dhead"><button class="notesbtn" data-btn="Notes">\u24d8 Notes</button>'+
      '<div><div class="dtitle">'+esc(v.name)+'</div><div class="dmeta">'+esc(v.valueListId)+(v.isCanonical?' \u00b7 canonical':'')+'</div></div>'+
      '<div class="flags">'+fl('IS_ACTIVE',v.flags.isActive)+fl('IS_STATUS_LIST',v.flags.isStatusList)+fl('ENFORCE 1-TO-1',v.flags.enforce1to1)+'</div></div>';
    var body;
    if(v.derivation==='fromField'){
      body='<div class="derive">'+deriveText(v)+'</div>';
    } else {
      var members=v.items||(v.values?v.values.map(function(x,i){return {sort:i+1,value:x};}):[]);
      var cls=stat?'stat':'plain';
      var cols='<div class="cols '+cls+'"><span>Sort</span><span class="cnt">('+members.length+') Values</span><span></span>'+(stat?'<span>Status</span>':'')+'</div>';
      var rows=members.map(function(it){
        return '<div class="row '+cls+'"><input class="sortbox" value="'+esc(it.sort)+'"><input class="inp" value="'+esc(it.value)+'"><span class="info" data-info="'+esc(it.value)+'">i</span>'+(stat?statusSelect(it.statusCategory):'')+'</div>';
      }).join('');
      var add='<div class="row '+cls+' addrow"><input class="sortbox" placeholder="\u2013"><input class="inp" placeholder="add value">'+(stat?'<span></span>'+statusSelect(''):'')+'</div>';
      body=(v.derivation!=='relatedTable'?'<div class="derive">'+deriveText(v)+'</div>':'')+cols+rows+add;
    }
    detEl.innerHTML=head+body;
  }
  function renderGlobals(){
    gEl.innerHTML='<div class="gt">gLIST Assignments</div><div class="ggrid">'+M.globalKeys.map(function(g){
      var opts=VLS.map(function(v){return '<option'+(v.valueListId===g.assignedTo?' selected':'')+'>'+esc(v.name)+'</option>';}).join('');
      return '<div class="gcell"><div class="glab">'+esc(g.key)+'</div><select class="inp">'+opts+'</select></div>';
    }).join('')+'</div>';
  }
  function render(){ renderRail(); renderDetail(); renderGlobals(); }
  render();
  document.getElementById('app').addEventListener('click',function(e){
    var ri=e.target.closest('[data-vl]'); if(ri){ state.active=ri.getAttribute('data-vl'); render(); gEl.classList.remove('show'); document.getElementById('gbtn').classList.remove('on'); return; }
    var fl=e.target.closest('[data-flag]'); if(fl){ fl.classList.toggle('on'); return; }
    var inf=e.target.closest('[data-info]'); if(inf){ flash('Notes for \u201c'+inf.getAttribute('data-info')+'\u201d (stub)'); return; }
    var btn=e.target.closest('[data-btn]'); if(btn){ flash(btn.getAttribute('data-btn')+' \u2192 (script stub)'); }
  });
  document.getElementById('gbtn').addEventListener('click',function(){
    var on=gEl.classList.toggle('show'); this.classList.toggle('on',on);
  });
  var ft,flashEl=document.getElementById('flash');
  function flash(m){flashEl.textContent=m;flashEl.classList.add('show');clearTimeout(ft);ft=setTimeout(function(){flashEl.classList.remove('show');},1500);}
})();
</script>
</body>
</html>
