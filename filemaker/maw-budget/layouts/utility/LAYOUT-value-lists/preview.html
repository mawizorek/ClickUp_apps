<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1180">
<title>Value Lists</title>
<style>
  /* =========================================================
     Value Lists layout render. Excel/spreadsheet feel:
     SHARP corners (zero radius), collapsed gridlines, NO gaps
     between cells, tight padding. The render IS the layout,
     behaves like FileMaker Browse mode. Desktop-scaled fixed
     canvas (zoom on small screens). Generic + data-driven from
     the embedded manifest (mirror of value-lists/_index.json).
     Theme provisional pending the themes-standard session.
     See filemaker/LAYOUT-RENDER-STANDARD.md for the rules.
     ========================================================= */
  :root{
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --bg:oklch(0.145 0.004 265);
    --header:oklch(0.185 0.006 265);
    --rail:oklch(0.165 0.005 265);
    --sel:oklch(0.70 0.15 52);
    --grid:oklch(0.32 0.008 265);
    --grid-soft:oklch(0.26 0.007 265);
    --cell:oklch(0.19 0.006 265);
    --cell-alt:oklch(0.175 0.005 265);
    --cell-focus:oklch(0.24 0.03 202);
    --hcell:oklch(0.225 0.007 265);
    --text:oklch(0.94 0.005 265);
    --muted:oklch(0.62 0.009 265);
    --dim:oklch(0.50 0.008 265);
    --orange:oklch(0.70 0.15 52);
    --orange-hi:oklch(0.75 0.15 55);
    --teal:oklch(0.82 0.11 202);
    --green:oklch(0.80 0.16 148);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg)}
  body{font-family:var(--sans);color:var(--text);-webkit-font-smoothing:antialiased;font-optical-sizing:auto;font-variant-numeric:tabular-nums}
  #win{width:1180px;height:100dvh;min-height:720px;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
  .topstrip{flex-shrink:0;display:flex;align-items:stretch;gap:0;background:var(--header);border-bottom:2px solid var(--orange)}
  .area{display:flex;flex-direction:column;justify-content:center;line-height:1.15;padding:9px 18px;border-right:1px solid var(--grid)}
  .area .a{font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--orange)}
  .area .b{font-size:18px;font-weight:700;letter-spacing:-.01em;color:var(--teal)}
  .abtn{font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;padding:0 18px;border:none;border-right:1px solid var(--grid);white-space:nowrap;transition:background .1s;display:flex;align-items:center}
  .abtn.orange{background:var(--orange);color:oklch(0.20 0.03 55)}
  .abtn.orange:hover{background:var(--orange-hi)}
  .abtn.gray{background:oklch(0.28 0.008 265);color:var(--muted)}
  .abtn.gray:hover{color:var(--text)}
  .abtn.gray.on{background:var(--teal);color:oklch(0.18 0.03 202)}
  .grow{flex:1}
  .body{flex:1;min-height:0;display:flex}
  .rail{width:250px;flex-shrink:0;background:var(--rail);border-right:1px solid var(--grid);overflow-y:auto}
  .ri{padding:10px 18px;font-size:15px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--grid-soft);transition:background .1s}
  .ri:hover{background:oklch(0.20 0.006 265)}
  .ri.sel{background:var(--sel);color:oklch(0.19 0.03 52);font-weight:600}
  .detail{flex:1;min-width:0;overflow-y:auto;background:var(--bg)}
  .dinner{padding:0 0 30px}
  .titleband{display:flex;align-items:stretch;border-bottom:1px solid var(--grid)}
  .notes{flex-shrink:0;width:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--cell);border-right:1px solid var(--grid);cursor:pointer;color:var(--muted)}
  .notes:hover{background:var(--hcell);color:var(--text)}
  .notes .ic{width:16px;height:16px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-style:italic;font-weight:700}
  .notes .tx{font-size:9px;font-weight:700;letter-spacing:.08em}
  .titlewrap{padding:12px 16px;flex:1;min-width:0}
  .dtitle{font-size:21px;font-weight:700;color:var(--teal);letter-spacing:-.01em;line-height:1.1}
  .dmeta{font-size:11.5px;color:var(--dim);margin-top:3px;font-family:var(--mono)}
  .flags{display:flex;align-items:stretch;border-left:1px solid var(--grid)}
  .flag{display:flex;align-items:center;gap:8px;padding:0 15px;font-size:11px;letter-spacing:.03em;font-weight:700;color:var(--teal);cursor:pointer;user-select:none;border-left:1px solid var(--grid-soft)}
  .flag:first-child{border-left:none}
  .flag .box{width:16px;height:16px;border:1.5px solid var(--grid);background:var(--cell);display:flex;align-items:center;justify-content:center;color:oklch(0.15 0.02 148);transition:background .1s,border-color .1s}
  .flag.on .box{background:var(--green);border-color:var(--green)}
  .flag .box svg{opacity:0}.flag.on .box svg{opacity:1}
  .flag.off{color:var(--dim)}
  .sheet{display:grid;border-bottom:1px solid var(--grid)}
  .sheet.stat{grid-template-columns:54px 1fr 38px 200px}
  .sheet.plain{grid-template-columns:54px 1fr 38px}
  .hc{background:var(--hcell);border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--dim);padding:8px 10px;display:flex;align-items:center}
  .hc.vals{color:var(--orange)}
  .hc.r{justify-content:flex-start}
  .c{border-right:1px solid var(--grid);border-bottom:1px solid var(--grid-soft);min-height:30px;display:flex;align-items:stretch;position:relative;background:var(--cell)}
  .c.alt{background:var(--cell-alt)}
  .c:focus-within{background:var(--cell-focus);box-shadow:inset 0 0 0 2px var(--teal);z-index:1}
  .cin{width:100%;border:none;background:transparent;color:var(--text);font-family:var(--sans);font-size:14px;padding:0 11px;outline:none;height:30px;line-height:30px}
  .cin.sortc{text-align:center;padding:0 4px;font-variant-numeric:tabular-nums}
  select.cin{-webkit-appearance:none;appearance:none;cursor:pointer;padding-right:26px;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 14px) 13px,calc(100% - 9px) 13px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  .c.info{justify-content:center;align-items:center}
  .infob{width:22px;height:22px;background:oklch(0.40 0.008 265);color:oklch(0.86 0.005 265);font-size:12px;font-style:italic;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--grid)}
  .infob:hover{background:var(--teal);color:oklch(0.18 0.03 202)}
  .c.add .cin{color:var(--dim);font-style:italic}
  .derive{border-bottom:1px solid var(--grid);background:var(--cell);padding:11px 16px;font-size:12.5px;color:var(--muted);line-height:1.6}
  .derive b{color:var(--text);font-weight:600}
  .derive .m{font-family:var(--mono);font-size:12px;color:var(--teal)}
  .foot{flex-shrink:0;display:flex;align-items:stretch;background:var(--header);border-top:1px solid var(--grid);font-size:12px;color:var(--muted)}
  .foot .lbl{padding:8px 12px;border-right:1px solid var(--grid);display:flex;align-items:center;color:var(--dim)}
  .foot .pk{padding:8px 12px;font-family:var(--mono);font-size:12px;color:var(--text);display:flex;align-items:center;border-right:1px solid var(--grid)}
  .footright{margin-left:auto;text-align:right;line-height:1.3;padding:6px 14px;border-left:1px solid var(--grid)}
  .footright .v{color:var(--green);font-weight:700;font-size:11px}
  .footright .s{color:var(--dim);font-size:11px}
  #globals{position:fixed;top:52px;right:0;width:600px;max-height:76vh;overflow-y:auto;background:oklch(0.185 0.008 60);border:1px solid var(--orange);box-shadow:0 24px 60px -24px oklch(0 0 0/.8);display:none;z-index:40}
  #globals.show{display:block}
  #globals .gt{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--muted);text-align:center;padding:11px;border-bottom:1px solid var(--grid);background:var(--hcell)}
  .ggrid{display:grid;grid-template-columns:1fr 1fr;border-left:1px solid var(--grid-soft)}
  .gcell{border-right:1px solid var(--grid-soft);border-bottom:1px solid var(--grid-soft);padding:10px 13px}
  .gcell .glab{font-family:var(--mono);font-size:11px;color:var(--orange);margin-bottom:5px}
  .gcell select{width:100%;height:30px;background:var(--cell);color:var(--text);border:1px solid var(--grid);font-size:13px;padding:0 9px;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 13px) 13px,calc(100% - 8px) 13px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  #flash{position:fixed;left:50%;bottom:48px;transform:translateX(-50%) translateY(12px);background:var(--header);color:var(--text);border:1px solid var(--grid);padding:9px 16px;font-size:12.5px;opacity:0;pointer-events:none;z-index:50;box-shadow:0 14px 34px -14px oklch(0 0 0/.7);transition:opacity .18s,transform .28s cubic-bezier(.22,1,.36,1)}
  #flash.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="win">
  <div class="topstrip">
    <div class="area"><span class="a">maw-budget</span><span class="b">Value Lists</span></div>
    <button class="abtn orange" data-btn="New Value List">New Value List</button>
    <div class="grow"></div>
    <button class="abtn orange" data-btn="Navigation">Navigation placeholder</button>
    <button class="abtn gray" id="gbtn">GLOBALS</button>
  </div>
  <div class="body">
    <nav class="rail" id="rail"></nav>
    <section class="detail"><div class="dinner" id="detail"></div></section>
  </div>
  <div class="foot">
    <span class="lbl">PrimaryKey</span><span class="pk" id="pk">9D347A74-0BD8-49C5-9D75-4A1187F0C332</span>
    <div class="footright"><div class="v">v0.1.0</div><div class="s">Last save: 7/16/2026 7:51:04 AM</div></div>
  </div>
</div>
<div id="globals"></div>
<div id="flash"></div>

<script type="application/json" id="vl-manifest">
{
  "pkByList": {
    "VL_StatusCategories": "9D347A74-0BD8-49C5-9D75-4A1187F0C332",
    "VL_TransactionStates": "7F21C0AA-11E4-42B9-8C33-90AB77D21E45",
    "VL_ImportRowStatus": "E44D55B3-3800-4603-9EC0-4698235A1D0C",
    "VL_ImportSessionStatus": "B92D6F13-55A0-4E71-A1C8-2266F4C9D080",
    "VL_AccountTypes": "3C7E9911-8D42-4A05-B6F9-71E0C3A44521",
    "VL_CategoryType": "A18B44C2-9F30-4D6E-8B21-55C0E9F13A77",
    "VL_BillCadence": "D5602E88-3C11-49AF-90B7-1E2244F6C8B3",
    "VL_Environment": "6631A0D4-7E52-4C88-B3F1-88D0119A2E64",
    "VL_ThemeMode": "F04C7B21-2A99-4610-8D53-C7B2660E1F42",
    "VL_Accounts": "22E9AC50-6B18-4F73-91D0-3A55C1B7E099"
  },
  "canonicalStatusCategories": ["New","Error","Active","Done","Closed"],
  "globalKeys": [
    { "key": "gLIST_StatusCategories", "assignedTo": "VL_StatusCategories" },
    { "key": "gLIST_ImportSessionStatus", "assignedTo": "VL_ImportSessionStatus" },
    { "key": "gLIST_TransactionStates", "assignedTo": "VL_TransactionStates" },
    { "key": "gLIST_ImportRowStatus", "assignedTo": "VL_ImportRowStatus" },
    { "key": "gLIST_AccountTypes", "assignedTo": "VL_AccountTypes" },
    { "key": "gLIST_Environment", "assignedTo": "VL_Environment" }
  ],
  "valueLists": [
    { "valueListId":"VL_StatusCategories","name":"Status Categories","derivation":"relatedTable","isCanonical":true,"flags":{"isActive":true,"isStatusList":true,"enforce1to1":true},"items":[{"sort":0,"value":"New","statusCategory":"New"},{"sort":1,"value":"Error","statusCategory":"Error"},{"sort":4,"value":"Active","statusCategory":"Active"},{"sort":7,"value":"Done","statusCategory":"Done"},{"sort":9,"value":"Closed","statusCategory":"Closed"}] },
    { "valueListId":"VL_TransactionStates","name":"Transaction States","derivation":"relatedTable","flags":{"isActive":true,"isStatusList":true,"enforce1to1":true},"items":[{"sort":1,"value":"Pending","statusCategory":"Active"},{"sort":2,"value":"Cleared","statusCategory":"Done"}] },
    { "valueListId":"VL_ImportRowStatus","name":"Import Row Statuses","derivation":"relatedTable","flags":{"isActive":true,"isStatusList":true,"enforce1to1":true},"items":[{"sort":1,"value":"new","statusCategory":"New"},{"sort":3,"value":"needs_review","statusCategory":"Error"},{"sort":2,"value":"carry_forward","statusCategory":"Active"},{"sort":4,"value":"ignored_duplicate","statusCategory":"Closed"}] },
    { "valueListId":"VL_ImportSessionStatus","name":"Import Session Statuses","derivation":"relatedTable","flags":{"isActive":true,"isStatusList":true,"enforce1to1":true},"items":[{"sort":1,"value":"queued","statusCategory":"New"},{"sort":2,"value":"importing","statusCategory":"Active"},{"sort":3,"value":"failed","statusCategory":"Error"},{"sort":4,"value":"complete","statusCategory":"Done"}] },
    { "valueListId":"VL_AccountTypes","name":"Account Types","derivation":"globalSeed","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"storage":"Globals::gLIST_AccountTypes","values":["Checking","Savings","Credit Card","Cash","Loan","Receivable","Asset (feed-less)"] },
    { "valueListId":"VL_CategoryType","name":"Category Type","derivation":"custom","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"values":["Income","Expense"] },
    { "valueListId":"VL_BillCadence","name":"Bill Cadence","derivation":"custom","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"values":["Weekly","Biweekly","Monthly","Quarterly","Annual"] },
    { "valueListId":"VL_Environment","name":"Environment","derivation":"globalSeed","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"storage":"Globals::gLIST_Environment","values":["DEV","PROD"] },
    { "valueListId":"VL_ThemeMode","name":"Theme Mode","derivation":"globalSeed","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"storage":"Globals::gLIST_ThemeMode","values":["Dark","Light"] },
    { "valueListId":"VL_Accounts","name":"Accounts","derivation":"fromField","flags":{"isActive":true,"isStatusList":false,"enforce1to1":false},"source":{"occurrenceId":"Account","displayField":"Name","sort":"Name ASC"},"values":null }
  ]
}
</script>

<script>
(function(){
  var M=JSON.parse(document.getElementById('vl-manifest').textContent);
  var VLS=M.valueLists, CANON=M.canonicalStatusCategories;
  var railEl=document.getElementById('rail'), detEl=document.getElementById('detail'),
      pkEl=document.getElementById('pk'), gEl=document.getElementById('globals');
  var state={active:VLS[0].valueListId};
  var CHECK='<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2.4 6.3l2.2 2.2 5-5.2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function byId(id){return VLS.filter(function(v){return v.valueListId===id;})[0];}
  function deriveText(v){
    if(v.derivation==='globalSeed') return 'Global seed: keys stored in <span class="m">'+esc(v.storage||'')+'</span>, surfaced via a use-values-from-field list.';
    if(v.derivation==='custom') return 'Custom values, hand-typed and stored on the value list.';
    if(v.derivation==='fromField') return 'Dynamic: values from <span class="m">'+esc(v.source.occurrenceId)+'::'+esc(v.source.displayField)+'</span> (sorted '+esc(v.source.sort||'')+'). Derived at runtime, never stored.';
    return '';
  }
  function renderRail(){
    railEl.innerHTML=VLS.map(function(v){
      return '<div class="ri'+(v.valueListId===state.active?' sel':'')+'" data-vl="'+v.valueListId+'">'+esc(v.name)+'</div>';
    }).join('');
  }
  function statusSelect(sel){
    return '<select class="cin">'+CANON.map(function(c){return '<option'+(c===sel?' selected':'')+'>'+esc(c)+'</option>';}).join('')+'</select>';
  }
  function renderDetail(){
    var v=byId(state.active), stat=v.flags.isStatusList;
    pkEl.textContent=(M.pkByList&&M.pkByList[v.valueListId])||'\u2014 (new record)';
    function fl(label,on){return '<div class="flag'+(on?' on':' off')+'" data-flag><span class="box">'+CHECK+'</span>'+label+'</div>';}
    var band='<div class="titleband">'+
      '<div class="notes" data-btn="Notes"><span class="ic">i</span><span class="tx">NOTES</span></div>'+
      '<div class="titlewrap"><div class="dtitle">'+esc(v.name)+'</div><div class="dmeta">'+esc(v.valueListId)+(v.isCanonical?' \u00b7 canonical':'')+'</div></div>'+
      '<div class="flags">'+fl('IS_ACTIVE',v.flags.isActive)+fl('IS_STATUS_LIST',v.flags.isStatusList)+fl('ENFORCE 1-TO-1',v.flags.enforce1to1)+'</div>'+
    '</div>';
    var body;
    if(v.derivation==='fromField'){
      body='<div class="derive">'+deriveText(v)+'</div>';
    } else {
      var members=v.items||(v.values?v.values.map(function(x,i){return {sort:i+1,value:x};}):[]);
      var cls=stat?'stat':'plain';
      var head='<div class="hc">Sort</div><div class="hc vals">('+members.length+') Values</div><div class="hc"></div>'+(stat?'<div class="hc r">Status</div>':'');
      var cells=members.map(function(it,i){
        var alt=i%2?' alt':'';
        return '<div class="c'+alt+'"><input class="cin sortc" value="'+esc(it.sort)+'"></div>'+
               '<div class="c'+alt+'"><input class="cin" value="'+esc(it.value)+'"></div>'+
               '<div class="c info'+alt+'"><span class="infob" data-info="'+esc(it.value)+'">i</span></div>'+
               (stat?'<div class="c'+alt+'">'+statusSelect(it.statusCategory)+'</div>':'');
      }).join('');
      var add='<div class="c add"><input class="cin sortc" placeholder="\u2013"></div>'+
              '<div class="c add"><input class="cin" placeholder="add value"></div>'+
              '<div class="c info"></div>'+(stat?'<div class="c">'+statusSelect('')+'</div>':'');
      body='<div class="sheet '+cls+'">'+head+cells+add+'</div>'+(v.derivation!=='relatedTable'?'<div class="derive">'+deriveText(v)+'</div>':'');
    }
    detEl.innerHTML=band+body;
  }
  function renderGlobals(){
    gEl.innerHTML='<div class="gt">gLIST Assignments</div><div class="ggrid">'+M.globalKeys.map(function(g){
      var opts=VLS.map(function(v){return '<option'+(v.valueListId===g.assignedTo?' selected':'')+'>'+esc(v.name)+'</option>';}).join('');
      return '<div class="gcell"><div class="glab">'+esc(g.key)+'</div><select>'+opts+'</select></div>';
    }).join('')+'</div>';
  }
  function render(){ renderRail(); renderDetail(); renderGlobals(); }
  render();
  document.getElementById('win').addEventListener('click',function(e){
    var ri=e.target.closest('[data-vl]'); if(ri){ state.active=ri.getAttribute('data-vl'); render(); gEl.classList.remove('show'); document.getElementById('gbtn').classList.remove('on'); return; }
    var fl=e.target.closest('[data-flag]'); if(fl){ fl.classList.toggle('on'); fl.classList.toggle('off'); return; }
    var inf=e.target.closest('[data-info]'); if(inf){ flash('Notes for \u201c'+inf.getAttribute('data-info')+'\u201d (stub)'); return; }
    var btn=e.target.closest('[data-btn]'); if(btn){ flash(btn.getAttribute('data-btn')+' \u2192 (script stub)'); }
  });
  document.getElementById('gbtn').addEventListener('click',function(){
    var on=gEl.classList.toggle('show'); this.classList.toggle('on',on);
  });
  var ft,flashEl=document.getElementById('flash');
  function flash(m){flashEl.textContent=m;flashEl.classList.add('show');clearTimeout(ft);ft=setTimeout(function(){flashEl.classList.remove('show');},1500);}
})();
</script>
</body>
</html>
