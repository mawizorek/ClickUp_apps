<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=315">
<title>Global Settings</title>
<style>
  /* =========================================================
     GLOBAL_Settings render, retrofit to the render standard.
     Skeleton (4 globals): App Name, Current User, Version, Env.
     Mobile / popup-window sized (~315px). Single column, one
     row per field. Same theme tokens as the value-list grid;
     softer rounding here since it is single-field entry, not a
     spreadsheet. Manifest-driven, live controls. Theme
     provisional pending the themes-standard session.
     See filemaker/LAYOUT-RENDER-STANDARD.md.
     ========================================================= */
  :root{
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --bg:oklch(0.145 0.004 265);
    --header:oklch(0.185 0.006 265);
    --field:oklch(0.205 0.006 265);
    --field-border:oklch(0.34 0.010 265);
    --grid:oklch(0.32 0.008 265);
    --text:oklch(0.94 0.005 265);
    --muted:oklch(0.62 0.009 265);
    --dim:oklch(0.50 0.008 265);
    --orange:oklch(0.70 0.15 52);
    --orange-hi:oklch(0.75 0.15 55);
    --teal:oklch(0.82 0.11 202);
    --green:oklch(0.80 0.16 148);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg)}
  body{font-family:var(--sans);color:var(--text);-webkit-font-smoothing:antialiased;font-optical-sizing:auto;font-variant-numeric:tabular-nums}
  #win{width:315px;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg)}
  .top{flex-shrink:0;background:var(--header);border-bottom:2px solid var(--orange);padding:12px 15px}
  .top .a{font-size:10.5px;font-weight:700;letter-spacing:.03em;color:var(--orange)}
  .top .b{font-size:17px;font-weight:700;letter-spacing:-.01em;color:var(--teal);line-height:1.15;margin-top:1px}
  .form{flex:1;padding:15px}
  .fld{margin-bottom:13px}
  .fld:last-child{margin-bottom:0}
  .lab{display:block;font-size:10px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:5px}
  .inp{width:100%;height:38px;background:var(--field);color:var(--text);border:1px solid var(--field-border);border-radius:8px;padding:0 12px;font-family:var(--sans);font-size:15px;outline:none;transition:border-color .12s cubic-bezier(.25,1,.5,1),box-shadow .12s}
  .inp:focus{border-color:var(--teal);box-shadow:0 0 0 3px oklch(0.82 0.11 202/.22)}
  .inp.ro{color:var(--dim);background:oklch(0.175 0.005 265)}
  select.inp{-webkit-appearance:none;appearance:none;cursor:pointer;padding-right:30px;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 15px) 17px,calc(100% - 10px) 17px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  .foot{flex-shrink:0;background:var(--header);border-top:1px solid var(--grid);padding:9px 15px;display:flex;align-items:center;gap:8px}
  .fbtn{font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;padding:8px 13px;border-radius:8px;border:none;transition:background .12s,transform .05s}
  .fbtn:active{transform:translateY(1px)}
  .fbtn.orange{background:var(--orange);color:oklch(0.20 0.03 55)}
  .fbtn.orange:hover{background:var(--orange-hi)}
  .ver{margin-left:auto;font-size:10.5px;color:var(--green);font-weight:700}
  #flash{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(10px);background:var(--header);color:var(--text);border:1px solid var(--field-border);padding:8px 14px;border-radius:8px;font-size:12px;opacity:0;pointer-events:none;z-index:50;box-shadow:0 12px 30px -12px oklch(0 0 0/.7);transition:opacity .18s,transform .28s cubic-bezier(.22,1,.36,1)}
  #flash.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="win">
  <div class="top"><div class="a">maw-budget</div><div class="b">Global Settings</div></div>
  <div class="form" id="form"></div>
  <div class="foot">
    <button class="fbtn orange" data-btn="Save">Save</button>
    <span class="ver" id="ver">v0.1.0</span>
  </div>
</div>
<div id="flash"></div>

<script type="application/json" id="g-manifest">
{
  "layout": { "viewName": "SYS | Global Settings [DSK]", "area": "maw-budget", "title": "Global Settings", "winWidth": 315, "version": "v0.1.0" },
  "objects": [
    { "control": "editBox",     "label": "App Name",     "value": "maw-budget",       "binding": "Globals::g_AppName" },
    { "control": "editBox",     "label": "Current User",  "value": "Michael Wizorek",   "binding": "Globals::g_CurrentUser" },
    { "control": "displayOnly", "label": "App Version",   "value": "0.1.0",             "binding": "Globals::g_AppVersion" },
    { "control": "popupMenu",   "label": "Environment",   "value": "PROD", "options": ["DEV","PROD"], "binding": "Globals::g_Environment" }
  ]
}
</script>

<script>
(function(){
  var M=JSON.parse(document.getElementById('g-manifest').textContent);
  var L=M.layout, formEl=document.getElementById('form');
  document.title=L.viewName; document.getElementById('ver').textContent=L.version;
  document.querySelector('.top .a').textContent=L.area;
  document.querySelector('.top .b').textContent=L.title;
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function control(o){
    switch(o.control){
      case 'displayOnly': return '<input class="inp ro" value="'+esc(o.value)+'" readonly>';
      case 'popupMenu': return '<select class="inp">'+(o.options||[]).map(function(op){return '<option'+(op===o.value?' selected':'')+'>'+esc(op)+'</option>';}).join('')+'</select>';
      default: return '<input class="inp" value="'+esc(o.value||'')+'">';
    }
  }
  formEl.innerHTML=M.objects.map(function(o){
    return '<div class="fld"><span class="lab">'+esc(o.label)+'</span>'+control(o)+'</div>';
  }).join('');
  var ft,flashEl=document.getElementById('flash');
  function flash(m){flashEl.textContent=m;flashEl.classList.add('show');clearTimeout(ft);ft=setTimeout(function(){flashEl.classList.remove('show');},1400);}
  document.getElementById('win').addEventListener('click',function(e){
    var b=e.target.closest('[data-btn]'); if(b){ flash(b.getAttribute('data-btn')+' \u2192 (script stub)'); }
  });
})();
</script>
</body>
</html>
