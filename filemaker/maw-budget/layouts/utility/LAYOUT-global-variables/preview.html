<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>maw-budget · SYS | Global Settings [DSK] — layout render</title>
<style>
  :root{
    /* FileMaker Pro app chrome (light, realistic) */
    --app-bg: oklch(0.93 0.004 255);
    --app-bar: oklch(0.97 0.003 255);
    --app-bar2: oklch(0.9 0.005 255);
    --app-line: oklch(0.82 0.006 255);
    --app-ink: oklch(0.32 0.01 255);
    --app-dim: oklch(0.52 0.008 255);
    --app-faint: oklch(0.66 0.006 255);
    --app-accent: oklch(0.58 0.13 250);
    --ruler: oklch(0.87 0.005 255);
    --ruler-ink: oklch(0.6 0.007 255);
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    /* layout THEME tokens (MAW Dark Utility) — provisional, pending theme-doc migration */
    --t-bg: oklch(0.23 0.013 260);
    --t-header: oklch(0.285 0.02 260);
    --t-body: oklch(0.235 0.012 260);
    --t-footer: oklch(0.27 0.016 260);
    --t-field: oklch(0.31 0.014 260);
    --t-field-border: oklch(0.44 0.02 260);
    --t-field-text: oklch(0.94 0.008 260);
    --t-label: oklch(0.70 0.012 260);
    --t-accent: oklch(0.72 0.11 205);
    --t-title: oklch(0.96 0.02 205);
    --t-section: oklch(0.4 0.012 260);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--app-bg);color:var(--app-ink);font-family:var(--sans);
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;font-optical-sizing:auto;
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
  }
  h1,h2,h3{margin:0;text-wrap:balance}
  /* ---------- FileMaker layout bar ---------- */
  .fmbar{
    flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:9px 16px;
    background:linear-gradient(var(--app-bar),var(--app-bar2));
    border-bottom:1px solid var(--app-line);
  }
  .lname{
    display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;color:var(--app-ink);
    padding:6px 12px;background:oklch(1 0 0);border:1px solid var(--app-line);border-radius:7px;
    box-shadow:0 1px 0 oklch(1 0 0);
  }
  .lname .swatch{width:8px;height:8px;border-radius:2px;background:var(--t-accent)}
  .lname .chev{color:var(--app-faint);font-size:10px}
  .modeseg{display:flex;border:1px solid var(--app-line);border-radius:7px;overflow:hidden;background:oklch(1 0 0)}
  .modeseg span{padding:6px 12px;font-size:12px;color:var(--app-dim);border-right:1px solid var(--app-line)}
  .modeseg span:last-child{border-right:0}
  .modeseg span.on{background:var(--app-accent);color:oklch(0.98 0.01 250);font-weight:600}
  .meta{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--app-dim);flex-wrap:wrap}
  .chip{padding:4px 9px;border:1px solid var(--app-line);border-radius:100px;background:oklch(1 0 0);white-space:nowrap}
  .chip b{color:var(--app-ink);font-weight:600}
  .fmbar .spacer{flex:1 1 auto}
  .zoom{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--app-dim);font-variant-numeric:tabular-nums}
  .zbtn{cursor:pointer;user-select:none;width:24px;height:24px;border:1px solid var(--app-line);background:oklch(1 0 0);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:var(--app-ink);font-size:14px}
  .zbtn:hover{border-color:var(--app-accent);color:var(--app-accent)}
  .zval{min-width:44px;text-align:center;font-weight:600;color:var(--app-ink)}
  .guidetog{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none;font-size:12px;color:var(--app-dim);padding:5px 10px;border:1px solid var(--app-line);border-radius:7px;background:oklch(1 0 0)}
  .guidetog .sw{width:30px;height:17px;border-radius:100px;background:var(--app-line);position:relative;transition:background .18s cubic-bezier(.25,1,.5,1)}
  .guidetog .sw::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:oklch(1 0 0);box-shadow:0 1px 2px oklch(0 0 0/.3);transition:transform .2s cubic-bezier(.22,1,.36,1)}
  .guidetog.on{color:var(--app-ink);border-color:var(--app-accent)}
  .guidetog.on .sw{background:var(--app-accent)}
  .guidetog.on .sw::after{transform:translateX(13px)}
  /* ---------- ruler + stage ---------- */
  .rulerwrap{flex:0 0 auto;display:flex;background:var(--app-bar2);border-bottom:1px solid var(--app-line)}
  .rcorner{width:30px;flex:0 0 30px;border-right:1px solid var(--app-line)}
  .ruler{flex:1 1 auto;overflow:hidden;position:relative;height:22px}
  .rInner{position:absolute;top:0;left:0;height:100%;transform-origin:top left}
  .tick{position:absolute;top:0;height:100%;border-left:1px solid var(--ruler);font-size:9px;color:var(--ruler-ink);padding-left:3px;font-family:var(--mono);line-height:22px}
  .tick.major{border-left-color:var(--ruler-ink)}
  .stage{flex:1 1 auto;overflow:auto;background:var(--app-bg);padding:26px 30px 60px;display:flex;justify-content:center;align-items:flex-start}
  .devwrap{transform-origin:top center}
  .device{
    width:1024px;background:var(--t-bg);border:1px solid oklch(0.5 0.01 260);border-radius:8px;
    box-shadow:0 30px 70px -30px oklch(0 0 0/.55),0 4px 14px -8px oklch(0 0 0/.4);
    overflow:hidden;color:var(--t-field-text);
  }
  /* ---------- layout parts ---------- */
  .part{position:relative}
  .part + .part{border-top:1px solid oklch(0.42 0.01 260/.4)}
  .part.header{background:var(--t-header);padding:22px 40px}
  .part.body{background:var(--t-body);padding:30px 40px}
  .part.footer{background:var(--t-footer);padding:18px 40px;display:flex;gap:12px;align-items:center}
  /* part guides (layout-mode style) */
  .plabel{
    position:absolute;left:0;top:0;font-size:9px;letter-spacing:.13em;text-transform:uppercase;font-weight:700;
    color:oklch(0.62 0.01 260);background:oklch(0.18 0.01 260/.6);padding:3px 8px;border-bottom-right-radius:6px;
    display:none;
  }
  body.guides .plabel{display:inline-block}
  body.guides .part + .part{border-top:1px dashed oklch(0.6 0.08 205/.55)}
  /* ---------- objects ---------- */
  .title{font-size:30px;font-weight:600;letter-spacing:-.015em;color:var(--t-title)}
  .merge{font-family:var(--mono);font-size:12.5px;color:var(--t-label);margin-top:6px}
  .section + .section{margin-top:26px}
  .shead{
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--t-accent);
    margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid oklch(0.42 0.01 260/.5);
  }
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 26px}
  .obj .lab{display:block;font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--t-label);margin-bottom:6px}
  .field{
    background:var(--t-field);border:1px solid var(--t-field-border);border-radius:5px;padding:9px 12px;
    font-size:13.5px;min-height:38px;display:flex;align-items:center;font-variant-numeric:tabular-nums;
    box-shadow:inset 0 1px 2px oklch(0 0 0/.15);
  }
  .field.disp{background:transparent;border-style:dashed;border-color:oklch(0.42 0.02 260);color:oklch(0.82 0.01 260);box-shadow:none}
  .field.multi{min-height:auto;white-space:pre-line;line-height:1.6;align-items:flex-start;font-family:var(--mono);font-size:12px}
  .field.sel{justify-content:space-between}
  .field .chev{color:var(--t-label);font-size:10px}
  .checkset{display:flex;align-items:center;gap:10px}
  .box{width:17px;height:17px;border:1.5px solid var(--t-field-border);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--t-accent);background:var(--t-field)}
  .radios{display:flex;gap:9px;flex-wrap:wrap}
  .radio{display:inline-flex;align-items:center;gap:7px;font-size:13px;padding:7px 13px;border:1px solid var(--t-field-border);border-radius:100px;color:var(--t-label)}
  .radio.on{border-color:var(--t-accent);color:var(--t-field-text);background:oklch(0.72 0.11 205/.13)}
  .radio .rd{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--t-field-border)}
  .radio.on .rd{border-color:var(--t-accent);background:var(--t-accent)}
  .fmbtn{
    font-family:var(--sans);font-size:13px;font-weight:550;cursor:default;padding:10px 18px;border-radius:6px;
    border:1px solid var(--t-field-border);background:var(--t-field);color:var(--t-field-text);
  }
  .fmbtn.primary{background:oklch(0.72 0.11 205/.18);border-color:var(--t-accent);color:var(--t-title)}
  .foot-note{margin-left:auto;font-size:11px;color:var(--t-label);font-family:var(--mono)}
  /* ---------- bottom status ---------- */
  .status{
    flex:0 0 auto;display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:8px 18px;
    background:linear-gradient(var(--app-bar),var(--app-bar2));border-top:1px solid var(--app-line);
    font-size:12px;color:var(--app-dim);
  }
  .status .k{color:var(--app-faint)}
  .status .v{color:var(--app-ink);font-weight:600}
  .status .prov{color:oklch(0.55 0.12 70);font-weight:600}
  .status .path{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--app-faint)}
  @media (max-width:720px){ .grid{grid-template-columns:1fr} .stage{padding:16px} }
</style>
</head>
<body class="guides">
  <div class="fmbar">
    <div class="lname"><span class="swatch"></span><span id="viewName">Layout</span><span class="chev">▾</span></div>
    <div class="modeseg"><span class="on">Browse</span><span>Find</span><span>Preview</span></div>
    <div class="meta">
      <span class="chip">TO&nbsp;<b id="occ">—</b></span>
      <span class="chip" id="stencil">—</span>
      <span class="chip">Theme&nbsp;<b id="themeName">—</b></span>
    </div>
    <div class="spacer"></div>
    <label class="guidetog on" id="tgGuides"><span class="sw"></span>Layout guides</label>
    <div class="zoom">
      <span class="zbtn" id="zOut">−</span><span class="zval" id="zVal">100%</span><span class="zbtn" id="zIn">+</span>
    </div>
  </div>

  <div class="rulerwrap"><div class="rcorner"></div><div class="ruler"><div class="rInner" id="rInner"></div></div></div>

  <div class="stage" id="stage">
    <div class="devwrap" id="devwrap">
      <div class="device" id="device"></div>
    </div>
  </div>

  <div class="status">
    <span><span class="k">Platform</span> <span class="v" id="s-plat">—</span></span>
    <span><span class="k">Design width</span> <span class="v" id="s-width">—</span></span>
    <span><span class="k">Base table</span> <span class="v" id="s-base">—</span></span>
    <span><span class="k">Objects</span> <span class="v" id="s-count">—</span></span>
    <span><span class="k">Theme</span> <span class="prov" id="s-theme">provisional</span></span>
    <span class="path">layouts/utility/LAYOUT-global-variables/preview.html</span>
  </div>

<script type="application/json" id="layout-manifest">
{
  "_meta": { "app": "maw-budget", "kind": "filemaker-layout-render", "rendererVersion": "0.2", "generated": "2026-07-16", "note": "Real as-built render. Geometry + theme drive the canvas. Theme is PROVISIONAL pending the FMP themes doc-set migration." },
  "layout": {
    "name": "GLOBAL_Settings",
    "viewName": "SYS | Global Settings [DSK]",
    "folder": "utility",
    "occurrence": "Globals",
    "baseTable": "Globals",
    "mode": "Browse",
    "platform": "Computer",
    "targetStencil": "Desktop: 1024 x 768",
    "layoutWidth": 1024,
    "theme": { "name": "MAW Dark Utility", "status": "provisional", "themeRef": "meta/themes.md#maw-dark-utility (pending migration)" }
  },
  "sections": [
    { "id": "identity", "label": "Session & Identity" },
    { "id": "prefs", "label": "Preferences" },
    { "id": "vlists", "label": "Value-List Globals" },
    { "id": "import", "label": "Import / Process State" }
  ],
  "objects": [
    { "seq": 1, "part": "header", "kind": "text", "control": "staticText", "label": "Global Settings", "sample": "Global Settings" },
    { "seq": 2, "part": "header", "kind": "text", "control": "mergeText", "label": "Env / version", "sample": "PROD · v0.1.0" },
    { "seq": 3, "part": "body", "section": "identity", "kind": "field", "control": "editBox", "label": "Current User", "sample": "Michael Wizorek" },
    { "seq": 4, "part": "body", "section": "identity", "kind": "field", "control": "displayOnly", "label": "App Version", "sample": "0.1.0" },
    { "seq": 5, "part": "body", "section": "identity", "kind": "field", "control": "popupMenu", "label": "Environment", "sample": "PROD" },
    { "seq": 6, "part": "body", "section": "identity", "kind": "field", "control": "checkboxSet", "label": "Debug Mode", "sample": "off", "checked": false },
    { "seq": 7, "part": "body", "section": "prefs", "kind": "field", "control": "radioButtonSet", "label": "Theme", "sample": "Dark", "options": ["Dark","Light"] },
    { "seq": 8, "part": "body", "section": "prefs", "kind": "field", "control": "dropDownList", "label": "Default Account", "sample": "Chase Checking" },
    { "seq": 9, "part": "body", "section": "prefs", "kind": "field", "control": "editBox", "label": "Current Budget Month", "sample": "2026-07-01" },
    { "seq": 10, "part": "body", "section": "prefs", "kind": "field", "control": "displayOnly", "label": "Today", "sample": "2026-07-16" },
    { "seq": 11, "part": "body", "section": "vlists", "kind": "field", "control": "displayMulti", "label": "Account Types (seed)", "sample": "Checking\nSavings\nCredit Card\nCash\nLoan\nReceivable\nAsset (feed-less)" },
    { "seq": 12, "part": "body", "section": "vlists", "kind": "field", "control": "displayMulti", "label": "Transaction States", "sample": "Pending\nCleared" },
    { "seq": 13, "part": "body", "section": "import", "kind": "field", "control": "checkboxSet", "label": "Import In Progress", "sample": "off", "checked": false },
    { "seq": 14, "part": "body", "section": "import", "kind": "field", "control": "displayOnly", "label": "Last Import Session", "sample": "2026-07-14 · Chase · 42 rows" },
    { "seq": 15, "part": "footer", "kind": "button", "control": "buttonPrimary", "label": "Reset Session Globals" },
    { "seq": 16, "part": "footer", "kind": "button", "control": "button", "label": "Toggle Theme" }
  ]
}
</script>

<script>
(function(){
  var M = JSON.parse(document.getElementById('layout-manifest').textContent);
  var L = M.layout;
  var dev = document.getElementById('device');
  var T = L.theme;
  document.getElementById('viewName').textContent = L.viewName || L.name;
  document.getElementById('occ').textContent = L.occurrence;
  document.getElementById('stencil').textContent = L.targetStencil;
  document.getElementById('themeName').textContent = T.name;
  document.getElementById('s-plat').textContent = L.platform;
  document.getElementById('s-width').textContent = L.layoutWidth + ' pt';
  document.getElementById('s-base').textContent = L.baseTable;
  document.getElementById('s-count').textContent = M.objects.length;
  document.getElementById('s-theme').textContent = T.name + ' · ' + (T.status||'—');
  dev.style.width = L.layoutWidth + 'px';

  function byPart(p){ return M.objects.filter(function(o){return o.part===p;}); }
  function control(o){
    switch(o.control){
      case 'staticText': return '<div class="title">'+o.sample+'</div>';
      case 'mergeText':  return '<div class="merge">'+o.sample+'</div>';
      case 'editBox':    return '<div class="field">'+o.sample+'</div>';
      case 'displayOnly':return '<div class="field disp">'+o.sample+'</div>';
      case 'displayMulti':return '<div class="field disp multi">'+o.sample+'</div>';
      case 'popupMenu':
      case 'dropDownList':return '<div class="field sel">'+o.sample+'<span class="chev">▼</span></div>';
      case 'checkboxSet':return '<div class="field checkset"><span class="box">'+(o.checked?'✓':'')+'</span>'+(o.checked?'Enabled':'Disabled')+'</div>';
      case 'radioButtonSet':return '<div class="radios">'+o.options.map(function(op){var on=op===o.sample;return '<span class="radio'+(on?' on':'')+'"><span class="rd"></span>'+op+'</span>';}).join('')+'</div>';
      case 'button':      return '<button class="fmbtn">'+o.label+'</button>';
      case 'buttonPrimary':return '<button class="fmbtn primary">'+o.label+'</button>';
      default: return '<div class="field">'+(o.sample||'')+'</div>';
    }
  }
  function objHTML(o){
    if(o.kind==='field') return '<div class="obj"><span class="lab">'+o.label+'</span>'+control(o)+'</div>';
    return '<div class="obj">'+control(o)+'</div>';
  }
  var header = '<div class="plabel">Header</div>' + byPart('header').map(objHTML).join('');
  var body = '<div class="plabel">Body</div>' + M.sections.map(function(s){
    var objs = M.objects.filter(function(o){return o.part==='body'&&o.section===s.id;});
    return '<div class="section"><div class="shead">'+s.label+'</div><div class="grid">'+objs.map(objHTML).join('')+'</div></div>';
  }).join('');
  var footer = '<div class="plabel">Footer</div>' + byPart('footer').map(objHTML).join('') + '<span class="foot-note">'+ (L.viewName||L.name) +'</span>';
  dev.innerHTML = '<div class="part header">'+header+'</div><div class="part body">'+body+'</div><div class="part footer">'+footer+'</div>';

  var rInner = document.getElementById('rInner');
  var W = L.layoutWidth, step = 128, rh='';
  rInner.style.width = W+'px';
  for(var x=0;x<=W;x+=step){ rh += '<div class="tick'+(x%256===0?' major':'')+'" style="left:'+x+'px">'+(x%256===0?x:'')+'</div>'; }
  rInner.innerHTML = rh;

  var stage=document.getElementById('stage'), devwrap=document.getElementById('devwrap');
  var userZoom=null;
  function fit(){
    var avail = stage.clientWidth - 60;
    var auto = Math.min(1, avail / W);
    var s = userZoom!==null ? userZoom : auto;
    devwrap.style.transform='scale('+s+')';
    rInner.style.transform='scale('+s+')';
    document.getElementById('zVal').textContent = Math.round(s*100)+'%';
  }
  document.getElementById('zIn').onclick=function(){ var cur=parseFloat(document.getElementById('zVal').textContent)/100; userZoom=Math.min(2,cur+0.1); fit(); };
  document.getElementById('zOut').onclick=function(){ var cur=parseFloat(document.getElementById('zVal').textContent)/100; userZoom=Math.max(0.3,cur-0.1); fit(); };
  window.addEventListener('resize', function(){ if(userZoom===null) fit(); });
  fit();

  var tg=document.getElementById('tgGuides');
  tg.onclick=function(){ document.body.classList.toggle('guides'); tg.classList.toggle('on'); };
})();
</script>
</body>
</html>
