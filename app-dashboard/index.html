<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Apps</title>
<style>
/* INFRASTRUCTURE: self-contained (no external data file) */
:root {
  --bg: oklch(10% 0.012 250);
  --surface-1: oklch(16% 0.01 250);
  --surface-2: oklch(21% 0.008 250);
  --surface-3: oklch(13% 0.008 250);
  --text: oklch(94% 0.006 250);
  --text-mid: oklch(78% 0.008 250);
  --text-muted: oklch(62% 0.01 250);
  --text-dim: oklch(44% 0.008 250);
  --accent: oklch(75% 0.16 55);
  --accent-soft: oklch(75% 0.16 55 / 0.12);
  --accent-border: oklch(45% 0.10 55);
  --on-accent: oklch(15% 0.01 55);
  --green: oklch(72% 0.16 155);
  --green-glow: oklch(72% 0.16 155 / 0.4);
  --red: oklch(65% 0.18 25);
  --red-glow: oklch(65% 0.18 25 / 0.3);
  --cyan: oklch(78% 0.12 200);
  --purple: oklch(72% 0.12 300);
  --blue: oklch(72% 0.12 240);
  --border: oklch(24% 0.006 250);
  --border-hover: oklch(34% 0.008 250);
  --radius: 12px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

/* FileMaker window: same layout, purple skin */
body[data-window="filemaker"] {
  --accent: oklch(72% 0.14 300);
  --accent-soft: oklch(72% 0.14 300 / 0.12);
  --accent-border: oklch(45% 0.10 300);
  --on-accent: oklch(18% 0.02 300);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100svh;
  -webkit-font-smoothing: antialiased;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

.container {
  max-width: 540px;
  margin: 0 auto;
  padding: 0 16px;
}

header {
  padding: 36px 0 20px;
}

header h1 {
  font-size: clamp(1.6rem, 5vw, 2rem);
  font-weight: 900;
  letter-spacing: -0.03em;
  color: var(--text);
}

header h1 span {
  color: var(--accent);
}

/* Window toggle (additive) */
.window-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.window-toggle button {
  flex: 1;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 0.8125rem;
  font-weight: 700;
  border: 1px solid var(--border);
  background: var(--surface-1);
  color: var(--text-muted);
  cursor: pointer;
  font-family: inherit;
  transition: all 150ms var(--ease);
}

.window-toggle button:active { transform: scale(0.97); }

.window-toggle button[aria-selected="true"] {
  background: var(--accent);
  color: var(--on-accent);
  border-color: var(--accent);
}

.stats {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  flex: 1;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 10px;
  text-align: center;
}

.stat-card .value {
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}

.stat-card .label {
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

.actions {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.btn {
  flex: 1;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 0.8125rem;
  font-weight: 700;
  text-align: center;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: transform 100ms var(--ease), opacity 150ms;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent);
  color: var(--on-accent);
}

.btn-secondary {
  background: var(--surface-2);
  color: var(--text-mid);
  border: 1px solid var(--border);
}

/* Filter chips */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.filter-row::-webkit-scrollbar { display: none; }

/* FileMaker window hides category filters (not applicable) */
body[data-window="filemaker"] .filter-row { display: none; }

.filter-chip {
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  border: 1px solid var(--border);
  background: var(--surface-1);
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 150ms var(--ease);
  user-select: none;
  -webkit-user-select: none;
}

.filter-chip:active { transform: scale(0.95); }

.filter-chip.active {
  background: var(--accent);
  color: var(--on-accent);
  border-color: var(--accent);
}

.filter-chip.active[data-filter="dashboard"] {
  background: var(--blue);
  border-color: var(--blue);
  color: oklch(15% 0.01 240);
}

.filter-chip.active[data-filter="tool"] {
  background: var(--purple);
  border-color: var(--purple);
  color: oklch(15% 0.01 300);
}

/* Pinned reference section */
.pinned-section {
  margin-bottom: 20px;
}

.pinned-label {
  font-size: 0.625rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.pinned-card {
  background: var(--surface-1);
  border: 1px solid oklch(35% 0.06 200);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 200ms var(--ease);
}

.pinned-card:hover { border-color: var(--cyan); }

.pinned-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: oklch(20% 0.04 200);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.875rem;
  flex-shrink: 0;
}

.pinned-info { flex: 1; min-width: 0; }

.pinned-info .name {
  font-size: 0.8125rem;
  font-weight: 700;
  color: var(--text);
}

.pinned-info .desc {
  font-size: 0.6875rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pinned-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.pinned-btn {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 0.6875rem;
  font-weight: 600;
  text-decoration: none;
  transition: transform 100ms var(--ease);
}

.pinned-btn:active { transform: scale(0.95); }

.pinned-btn-open {
  background: oklch(30% 0.06 200);
  color: var(--cyan);
}

.pinned-btn-repo {
  background: var(--surface-2);
  color: var(--text-muted);
}

/* App grid */
.app-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}

.app-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color 200ms var(--ease), opacity 200ms, transform 200ms var(--ease);
}

.app-card:hover { border-color: var(--border-hover); }

.app-card.hidden {
  display: none;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.health-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.health-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
.health-dot.dead { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }
.health-dot.checking { background: var(--text-dim); animation: pulse 1.4s infinite; }
.health-dot.doc { background: var(--accent); box-shadow: 0 0 6px var(--accent-soft); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.app-name {
  font-size: 0.9375rem;
  font-weight: 700;
  flex: 1;
}

.recent-indicator {
  font-size: 0.5625rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--accent-soft);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.app-slug {
  font-size: 0.6875rem;
  color: var(--cyan);
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  margin-bottom: 8px;
}

.app-desc {
  font-size: 0.75rem;
  color: var(--text-muted);
  line-height: 1.4;
  margin-bottom: 10px;
}

.app-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.badge {
  font-size: 0.5625rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.badge-data { color: var(--green); background: oklch(20% 0.04 155); border: 1px solid oklch(30% 0.06 155); }
.badge-dashboard { color: var(--blue); background: oklch(20% 0.04 240); border: 1px solid oklch(30% 0.06 240); }
.badge-tool { color: var(--purple); background: oklch(20% 0.04 300); border: 1px solid oklch(30% 0.06 300); }

.app-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 0.6875rem;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.app-meta strong { color: var(--text-muted); }

.app-actions {
  display: flex;
  gap: 8px;
}

.app-btn {
  flex: 1;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 0.75rem;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  transition: transform 100ms var(--ease);
}

.app-btn:active { transform: scale(0.97); }

.app-btn-open {
  background: var(--accent);
  color: var(--on-accent);
}

.app-btn-repo {
  background: var(--surface-2);
  color: var(--text-mid);
  border: 1px solid var(--border);
}

.loading-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
  font-size: 0.875rem;
}

.error-state {
  text-align: center;
  padding: 32px 20px;
  color: var(--red);
  font-size: 0.8125rem;
  background: var(--surface-1);
  border-radius: var(--radius);
  border: 1px solid oklch(30% 0.08 25);
}

.cache-note {
  text-align: center;
  font-size: 0.625rem;
  color: var(--text-dim);
  margin-top: 8px;
  font-style: italic;
}

.empty-filter {
  text-align: center;
  padding: 32px 20px;
  color: var(--text-dim);
  font-size: 0.8125rem;
}

footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: oklch(10% 0.012 250 / 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 0.625rem;
  color: var(--text-dim);
}

footer a { color: var(--text-muted); text-decoration: none; }

@media (min-width: 640px) {
  .container { max-width: 600px; padding: 0 24px; }
  header { padding: 48px 0 28px; }
}
</style>
</head>
<body data-window="clickup">
<div class="container">
  <header>
    <h1 id="winTitle">ClickUp <span>Apps</span></h1>
  </header>

  <div class="window-toggle" role="tablist">
    <button data-window="clickup" role="tab" aria-selected="true" onclick="setWindow('clickup')">ClickUp Apps</button>
    <button data-window="filemaker" role="tab" aria-selected="false" onclick="setWindow('filemaker')">FileMaker Apps</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="value" id="appCount">&mdash;</div><div class="label">Apps</div></div>
    <div class="stat-card"><div class="value" id="healthyCount">&mdash;</div><div class="label" id="healthLabel">Healthy</div></div>
    <div class="stat-card"><div class="value" id="recentCount">&mdash;</div><div class="label">Updated (7d)</div></div>
  </div>

  <div class="actions">
    <a class="btn btn-primary" id="openRepoBtn" href="https://github.com/mawizorek/ClickUp_apps" target="_blank" rel="noopener">Open repo</a>
    <button class="btn btn-secondary" id="refreshBtn">Refresh</button>
  </div>

  <div class="filter-row" id="filterRow">
    <div class="filter-chip active" data-filter="all">All</div>
    <div class="filter-chip" data-filter="dashboard">📊 Dashboards</div>
    <div class="filter-chip" data-filter="tool">🛠 Tools</div>
  </div>

  <div class="pinned-section" id="pinnedWrap"></div>

  <div class="app-grid" id="appGrid">
    <div class="loading-state">Loading apps...</div>
  </div>
</div>

<footer>
  <span id="footerText">app-dashboard · v2.5 · <span id="refreshTime">&mdash;</span></span>
</footer>

<script>
const APP_VERSION = 'v2.5';
const APP_DATE = '2026-07-06';

// ─── Config ──────────────────────────────
const OWNER = 'mawizorek';
const REPO = 'ClickUp_apps';
const PAGES_BASE = `https://${OWNER}.github.io/${REPO}`;
const API_BASE = `https://api.github.com/repos/${OWNER}/${REPO}`;
const REPO_TREE = `https://github.com/${OWNER}/${REPO}/tree/main`;
// Infra + non-app folders never render as apps.
const EXCLUDED = ['template-app', 'app-dashboard', 'filemaker', 'brain-config', 'quickfire', 'agent-reports', 'routines', 'shared', '.nojekyll', 'README.md', 'robots.txt', 'index.html', 'canary.txt'];
const FMP_EXCLUDED = ['_template-fmp-app', 'README.md'];

// Cache is versioned: bumping APP_VERSION auto-invalidates stale data
const CACHE_KEY = `appDashboard_cache_${APP_VERSION}`;
const CACHE_TTL = 5 * 60 * 1000;
const RECENT_KEY = 'appDashboard_recent';
const FILTER_KEY = 'appDashboard_filter';
const WINDOW_KEY = 'appDashboard_window';
const MAX_RECENT = 2;

// App metadata: slug → { desc, category, badges }
const APP_META = {
  'world-cup-bracket': { desc: 'Live tournament bracket with match results and progression.', category: 'dashboard', badges: ['dashboard'] },
  'f1-racetracks': { desc: 'Interactive race circuit explorer with live data.', category: 'dashboard', badges: ['data'] },
  'on-track': { desc: 'Live schedule tracker with filters, timezone, and refresh.', category: 'dashboard', badges: ['data'] },
  'file-chunker': { desc: 'Split large files into AI-readable chunks with verification headers.', category: 'tool', badges: ['tool'] },
  'budget-code-mapper': { desc: 'Budget code authority lookup and export tool.', category: 'tool', badges: ['data'] },
  'markdown-viewer': { desc: 'Mobile-first markdown reader. Drop a .md file, read it clean.', category: 'tool', badges: ['tool'] },
  'pdf-splitter': { desc: 'Extract and split PDF pages client-side.', category: 'tool', badges: ['tool'] },
  'polish-demo': { desc: 'Live gated example of the full app-polish + access standard.', category: 'tool', badges: ['tool'] }
};

// ─── State ─────────────────────────────
let currentFilter = 'all';
let currentWindow = 'clickup';
let allApps = [];

// ─── Cache helpers (ClickUp window) ─────────────
function getCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (Date.now() - parsed.ts > CACHE_TTL) return null;
    return parsed.data;
  } catch (e) { return null; }
}

function setCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
  } catch (e) {}
}

function pruneOldCaches() {
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('appDashboard_cache_') && key !== CACHE_KEY) {
        localStorage.removeItem(key);
      }
    }
  } catch (e) {}
}

// ─── Recent (last-visited) helpers ─────────────
function getRecent() {
  try {
    return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
  } catch (e) { return []; }
}

function logVisit(slug) {
  try {
    let recent = getRecent().filter(s => s !== slug);
    recent.unshift(slug);
    recent = recent.slice(0, MAX_RECENT);
    localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
  } catch (e) {}
}

// ─── Filter helpers ──────────────────────
function applyFilter(filter) {
  currentFilter = filter;
  try { localStorage.setItem(FILTER_KEY, filter); } catch (e) {}

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.filter === filter);
  });

  const cards = document.querySelectorAll('.app-card[data-category]');
  let visible = 0;
  cards.forEach(card => {
    const show = filter === 'all' || card.dataset.category === filter;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  let emptyEl = document.getElementById('emptyFilter');
  if (visible === 0 && cards.length > 0) {
    if (!emptyEl) {
      emptyEl = document.createElement('div');
      emptyEl.id = 'emptyFilter';
      emptyEl.className = 'empty-filter';
      document.getElementById('appGrid').appendChild(emptyEl);
    }
    emptyEl.textContent = `No ${filter} apps yet.`;
    emptyEl.style.display = '';
  } else if (emptyEl) {
    emptyEl.style.display = 'none';
  }
}

// ─── Window switching ───────────────────
function applyWindowChrome(win) {
  document.body.dataset.window = win;
  document.querySelectorAll('.window-toggle button').forEach(b =>
    b.setAttribute('aria-selected', b.dataset.window === win));
  document.getElementById('winTitle').innerHTML =
    win === 'clickup' ? 'ClickUp <span>Apps</span>' : 'FileMaker <span>Apps</span>';
  document.getElementById('healthLabel').textContent = win === 'clickup' ? 'Healthy' : 'Docs';
  document.getElementById('openRepoBtn').href =
    win === 'clickup' ? `https://github.com/${OWNER}/${REPO}` : `${REPO_TREE}/filemaker`;
  renderPinned(win);
}

function setWindow(win) {
  if (win === currentWindow) return;
  currentWindow = win;
  try { localStorage.setItem(WINDOW_KEY, win); } catch (e) {}
  applyWindowChrome(win);
  document.getElementById('appGrid').innerHTML = '<div class="loading-state">Loading apps...</div>';
  init(false);
}

function renderPinned(win) {
  const wrap = document.getElementById('pinnedWrap');
  if (win === 'clickup') {
    wrap.innerHTML = `<div class="pinned-label">Reference</div>
      <div class="pinned-card">
        <div class="pinned-icon">📐</div>
        <div class="pinned-info">
          <div class="name">App Build Standard</div>
          <div class="desc">Folder scaffold, README template, build workflow reference</div>
        </div>
        <div class="pinned-actions">
          <a class="pinned-btn pinned-btn-open" href="${REPO_TREE}/template-app" target="_blank" rel="noopener">Open</a>
          <a class="pinned-btn pinned-btn-repo" href="${REPO_TREE}/template-app" target="_blank" rel="noopener">Repo</a>
        </div>
      </div>`;
  } else {
    wrap.innerHTML = `<div class="pinned-label">Reference</div>
      <div class="pinned-card">
        <div class="pinned-icon">📐</div>
        <div class="pinned-info">
          <div class="name">FMP App Template</div>
          <div class="desc">Standard 11-doc shape + schema JSON contract</div>
        </div>
        <div class="pinned-actions">
          <a class="pinned-btn pinned-btn-open" href="${REPO_TREE}/filemaker/_template-fmp-app" target="_blank" rel="noopener">Open</a>
          <a class="pinned-btn pinned-btn-repo" href="${REPO_TREE}/filemaker" target="_blank" rel="noopener">Repo</a>
        </div>
      </div>`;
  }
}

// ─── Dispatcher ───────────────────────
async function init(forceRefresh) {
  if (currentWindow === 'filemaker') return initFileMaker();
  return initClickUp(forceRefresh);
}

// ─── ClickUp window (original behavior) ─────────
async function initClickUp(forceRefresh) {
  const grid = document.getElementById('appGrid');
  pruneOldCaches();

  try {
    const saved = localStorage.getItem(FILTER_KEY);
    if (saved && ['all', 'dashboard', 'tool'].includes(saved)) currentFilter = saved;
  } catch (e) {}

  if (!forceRefresh) {
    const cached = getCache();
    if (cached) {
      allApps = cached;
      renderFromData(cached);
      cached.forEach((app, i) => checkHealth(app, i));
      return;
    }
  }

  grid.innerHTML = '<div class="loading-state">Loading apps...</div>';

  try {
    const [treeRes, commitsRes] = await Promise.all([
      fetch(`${API_BASE}/contents/`),
      fetch(`${API_BASE}/commits?per_page=100`)
    ]);

    if (!treeRes.ok || !commitsRes.ok) throw new Error('API error');

    const items = await treeRes.json();
    const commits = await commitsRes.json();

    const appFolders = items.filter(i => i.type === 'dir' && !EXCLUDED.includes(i.name));
    const apps = await Promise.all(appFolders.map(f => buildApp(f, commits)));
    apps.sort((a, b) => new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0));

    allApps = apps;
    setCache(apps);
    renderFromData(apps);
    apps.forEach((app, i) => checkHealth(app, i));
  } catch (e) {
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('appDashboard_cache_')) {
          const parsed = JSON.parse(localStorage.getItem(key));
          if (parsed && parsed.data) {
            allApps = parsed.data;
            renderFromData(parsed.data);
            grid.insertAdjacentHTML('beforeend', '<div class="cache-note">Showing cached data (offline or rate limited)</div>');
            parsed.data.forEach((app, idx) => checkHealth(app, idx));
            return;
          }
        }
      }
    } catch (e2) {}
    grid.innerHTML = '<div class="error-state">Could not reach GitHub API. Check your connection and refresh.</div>';
  }
}

function renderFromData(apps) {
  render(apps);
  updateStats(apps);
  applyFilter(currentFilter);
  document.getElementById('refreshTime').textContent =
    new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

async function buildApp(folder, commits) {
  const name = folder.name;
  const pagesUrl = `${PAGES_BASE}/${name}/`;
  const repoUrl = `${REPO_TREE}/${name}`;

  const folderCommits = commits.filter(c =>
    c.commit.message.toLowerCase().includes(name)
  );
  const lastCommit = folderCommits[0] || null;
  const lastUpdated = lastCommit ? lastCommit.commit.author.date : null;
  const lastMsg = lastCommit ? lastCommit.commit.message.split('\n')[0] : null;
  const commitCount = folderCommits.length;

  let hasData = false;
  try {
    const res = await fetch(`${API_BASE}/contents/${name}`);
    if (res.ok) {
      const contents = await res.json();
      hasData = contents.some(f => f.name === 'data.json');
    }
  } catch (e) {}

  const meta = APP_META[name] || {};
  return { name, pagesUrl, repoUrl, lastUpdated, lastMsg, commitCount, hasData, desc: meta.desc || null, category: meta.category || 'tool', badges: meta.badges || [] };
}

function render(apps) {
  const grid = document.getElementById('appGrid');
  const recent = getRecent();

  grid.innerHTML = apps.map((app, i) => {
    const displayName = app.name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    const timeStr = app.lastUpdated ? relativeTime(app.lastUpdated) : '\u2014';
    const isRecent = recent.includes(app.name);

    const badgeHtml = [
      app.hasData ? '<span class="badge badge-data">data.json</span>' : '',
      ...app.badges.map(b => {
        if (b === 'dashboard') return '<span class="badge badge-dashboard">Dashboard</span>';
        if (b === 'data') return app.hasData ? '' : '<span class="badge badge-data">data.json</span>';
        if (b === 'tool') return '<span class="badge badge-tool">Tool</span>';
        return '';
      })
    ].filter(Boolean).join('');

    return `
      <div class="app-card" data-category="${app.category}">
        <div class="app-header">
          <span class="health-dot checking" id="health-${i}"></span>
          <span class="app-name">${esc(displayName)}</span>
          ${isRecent ? '<span class="recent-indicator">Recent</span>' : ''}
        </div>
        <div class="app-slug">${esc(app.name)}</div>
        ${app.desc ? `<div class="app-desc">${esc(app.desc)}</div>` : ''}
        ${badgeHtml ? `<div class="app-badges">${badgeHtml}</div>` : ''}
        <div class="app-meta">
          <span><strong>${timeStr}</strong></span>
          <span>${app.commitCount} commit${app.commitCount !== 1 ? 's' : ''}</span>
        </div>
        ${app.lastMsg ? `<div class="app-meta" style="font-style:italic">${esc(app.lastMsg)}</div>` : ''}
        <div class="app-actions">
          <a class="app-btn app-btn-open" href="${app.pagesUrl}" target="_blank" rel="noopener" onclick="logVisit('${app.name}')">Open app</a>
          <a class="app-btn app-btn-repo" href="${app.repoUrl}" target="_blank" rel="noopener">Repo folder</a>
        </div>
      </div>`;
  }).join('');
}

async function checkHealth(app, idx) {
  const dot = document.getElementById(`health-${idx}`);
  if (!dot) return;
  try {
    const res = await fetch(app.pagesUrl, { method: 'GET', mode: 'cors', cache: 'no-store' });
    dot.className = res.ok ? 'health-dot live' : 'health-dot dead';
    updateHealthCount();
  } catch (e) {
    dot.className = 'health-dot dead';
    updateHealthCount();
  }
}

function updateHealthCount() {
  const dots = document.querySelectorAll('.health-dot');
  let healthy = 0;
  let resolved = 0;
  dots.forEach(d => {
    if (d.classList.contains('live')) { healthy++; resolved++; }
    else if (d.classList.contains('dead')) { resolved++; }
  });
  if (resolved === dots.length && dots.length > 0) {
    document.getElementById('healthyCount').textContent = healthy;
  }
}

function updateStats(apps) {
  document.getElementById('appCount').textContent = apps.length;
  document.getElementById('healthyCount').textContent = '\u2026';
  const sevenDays = Date.now() - 7 * 86400000;
  const recent = apps.filter(a => a.lastUpdated && new Date(a.lastUpdated) > sevenDays).length;
  document.getElementById('recentCount').textContent = recent;
}

// ─── FileMaker window (purple mirror, docs-only) ───
async function initFileMaker() {
  const grid = document.getElementById('appGrid');
  grid.innerHTML = '<div class="loading-state">Loading FileMaker apps...</div>';
  try {
    const [treeRes, commitsRes] = await Promise.all([
      fetch(`${API_BASE}/contents/filemaker`),
      fetch(`${API_BASE}/commits?per_page=100`)
    ]);
    if (!treeRes.ok) throw new Error('API error');
    const items = await treeRes.json();
    const commits = commitsRes.ok ? await commitsRes.json() : [];
    const folders = items.filter(i => i.type === 'dir' && !FMP_EXCLUDED.includes(i.name));
    const apps = await Promise.all(folders.map(f => buildFmpApp(f, commits)));
    apps.sort((a, b) => new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0));
    allApps = apps;
    renderFmp(apps);
    updateFmpStats(apps);
    document.getElementById('refreshTime').textContent =
      new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  } catch (e) {
    grid.innerHTML = '<div class="error-state">Could not reach GitHub API. Refresh to retry.</div>';
  }
}

async function buildFmpApp(folder, commits) {
  const name = folder.name;
  const repoUrl = `${REPO_TREE}/filemaker/${name}`;
  const folderCommits = commits.filter(c => {
    const m = c.commit.message.toLowerCase();
    return m.includes(name) || m.includes('filemaker');
  });
  const lastCommit = folderCommits[0] || null;
  const lastUpdated = lastCommit ? lastCommit.commit.author.date : null;
  const lastMsg = lastCommit ? lastCommit.commit.message.split('\n')[0] : null;
  const commitCount = folderCommits.length;

  let docCount = 0, hasSchema = false;
  try {
    const r = await fetch(`${API_BASE}/contents/filemaker/${name}/docs`);
    if (r.ok) { const d = await r.json(); if (Array.isArray(d)) docCount = d.filter(f => f.name.endsWith('.md')).length; }
  } catch (e) {}
  try {
    const r = await fetch(`${API_BASE}/contents/filemaker/${name}/schema`);
    if (r.ok) { const s = await r.json(); hasSchema = Array.isArray(s) && s.some(f => f.name === 'tables.json'); }
  } catch (e) {}

  return { name, repoUrl, lastUpdated, lastMsg, commitCount, docCount, hasSchema };
}

function renderFmp(apps) {
  const grid = document.getElementById('appGrid');
  grid.innerHTML = apps.map(app => {
    const displayName = app.name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    const timeStr = app.lastUpdated ? relativeTime(app.lastUpdated) : '\u2014';
    const badgeHtml = [
      app.hasSchema ? '<span class="badge badge-tool">Schema</span>' : '',
      `<span class="badge badge-dashboard">${app.docCount} docs</span>`
    ].filter(Boolean).join('');

    return `
      <div class="app-card">
        <div class="app-header">
          <span class="health-dot doc"></span>
          <span class="app-name">${esc(displayName)}</span>
        </div>
        <div class="app-slug">filemaker/${esc(app.name)}</div>
        ${badgeHtml ? `<div class="app-badges">${badgeHtml}</div>` : ''}
        <div class="app-meta">
          <span><strong>${timeStr}</strong></span>
          <span>${app.commitCount} commit${app.commitCount !== 1 ? 's' : ''}</span>
        </div>
        ${app.lastMsg ? `<div class="app-meta" style="font-style:italic">${esc(app.lastMsg)}</div>` : ''}
        <div class="app-actions">
          <a class="app-btn app-btn-open" href="${app.repoUrl}" target="_blank" rel="noopener">View on repo &rsaquo;</a>
        </div>
      </div>`;
  }).join('') || '<div class="empty-filter">No FileMaker apps documented yet.</div>';
}

function updateFmpStats(apps) {
  document.getElementById('appCount').textContent = apps.length;
  document.getElementById('healthyCount').textContent = apps.reduce((s, a) => s + a.docCount, 0);
  const sevenDays = Date.now() - 7 * 86400000;
  document.getElementById('recentCount').textContent = apps.filter(a => a.lastUpdated && new Date(a.lastUpdated) > sevenDays).length;
}

// ─── Shared helpers ────────────────────
function relativeTime(iso) {
  const ms = Date.now() - new Date(iso);
  const hrs = Math.floor(ms / 3600000);
  const days = Math.floor(ms / 86400000);
  if (hrs < 1) return 'just now';
  if (hrs < 24) return `${hrs}h ago`;
  if (days < 7) return `${days}d ago`;
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Event listeners ───────────────────
document.getElementById('refreshBtn').addEventListener('click', () => init(true));

document.getElementById('filterRow').addEventListener('click', (e) => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  applyFilter(chip.dataset.filter);
});

// ─── Init ──────────────────────────
try {
  const w = localStorage.getItem(WINDOW_KEY);
  if (w === 'filemaker' || w === 'clickup') currentWindow = w;
} catch (e) {}
applyWindowChrome(currentWindow);
init(false);
</script>
