<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quickfire Artifacts</title>
<meta name="description" content="One-shot standalone HTML artifacts. Filter by subject or type; Show all reveals archived and hidden.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0b0b0f">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔥%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: oklch(12% 0.015 250);
    --surface: oklch(16% 0.012 250);
    --line: oklch(25% 0.01 250);
    --text: oklch(92% 0.01 250);
    --muted: oklch(65% 0.01 250);
    --accent: oklch(72% 0.16 25);
    --accent-dim: oklch(72% 0.16 25 / 0.15);
    --chip: oklch(20% 0.012 250);
    --warn: oklch(74% 0.12 75);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 20px calc(48px + env(safe-area-inset-bottom)); }
  .container { max-width: 620px; margin: 0 auto; }
  .back { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--muted); text-decoration: none; margin-bottom: 24px; letter-spacing: 0.04em; text-transform: uppercase; }
  .back:hover { color: var(--accent); }
  header { margin-bottom: 24px; }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  header p { font-size: 14px; color: var(--muted); line-height: 1.5; max-width: 52ch; }
  .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .ctl-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .ctl-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); min-width: 52px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .chip-btn { font-family: inherit; font-size: 12px; font-weight: 500; color: var(--muted); background: var(--chip); border: 1px solid var(--line); border-radius: 100px; padding: 5px 12px; cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s; -webkit-tap-highlight-color: transparent; }
  .chip-btn:hover { color: var(--text); }
  .chip-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .chip-btn[aria-pressed="true"] { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 600; }
  .showall { font-family: inherit; font-size: 12px; font-weight: 600; color: var(--muted); background: none; border: 1px solid var(--line); border-radius: 100px; padding: 5px 12px; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; transition: color 0.15s, border-color 0.15s; -webkit-tap-highlight-color: transparent; }
  .showall:hover { color: var(--text); border-color: var(--muted); }
  .showall:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .showall[aria-pressed="true"] { color: var(--warn); border-color: oklch(74% 0.12 75 / 0.5); }
  .showall .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); transition: background 0.15s; }
  .showall[aria-pressed="true"] .dot { background: var(--warn); }
  .list { display: flex; flex-direction: column; gap: 2px; }
  .item { display: block; padding: 14px 16px; border-radius: 10px; text-decoration: none; color: var(--text); transition: background 0.15s; }
  .item:hover { background: var(--accent-dim); }
  .item.muted { opacity: 0.62; }
  .item-top { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 16px; }
  .item-title { font-size: 15px; font-weight: 600; }
  .item-date { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .item-meta { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.45; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; background: var(--chip); color: var(--muted); border: 1px solid var(--line); }
  .tag.type { color: var(--accent); border-color: oklch(72% 0.16 25 / 0.4); }
  .badge { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); background: var(--chip); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; margin-left: 8px; vertical-align: middle; }
  .badge.status { color: var(--warn); border-color: oklch(74% 0.12 75 / 0.4); }
  .empty { font-size: 13px; color: var(--muted); padding: 20px 16px; }
  .count { font-size: 12px; color: var(--muted); margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--line); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="../">← All Apps</a>
  <header>
    <h1>Quickfire</h1>
    <p>One-shot standalone artifacts. No versioning, no spec files, no task overhead. Just shipped HTML. Filter below, or Show all to include archived + hidden.</p>
  </header>
  <div class="controls">
    <div class="ctl-row">
      <span class="ctl-label">Subject</span>
      <div class="chips" id="subjects"></div>
    </div>
    <div class="ctl-row">
      <span class="ctl-label">Type</span>
      <div class="chips" id="types"></div>
      <button class="showall" id="showall" aria-pressed="false" title="Reveal archived + hidden artifacts"><span class="dot"></span>Show all</button>
    </div>
  </div>
  <div class="list" id="list"></div>
  <div class="count" id="count"></div>
</div>
<script>
  let ART = [];
  let activeSubject = null;
  let activeType = null;
  let showAll = false;

  function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  function render() {
    const list = document.getElementById('list');
    const rows = ART
      .filter(a => showAll || (a.status || 'active') === 'active')
      .filter(a => !activeSubject || (a.subjects || []).includes(activeSubject))
      .filter(a => !activeType || a.type === activeType)
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    if (!rows.length) {
      list.innerHTML = '<div class="empty">No artifacts match this filter. Try clearing it or Show all.</div>';
    } else {
      list.innerHTML = rows.map(a => {
        const st = a.status || 'active';
        const tags = ['<span class="tag type">' + esc(a.type) + '</span>']
          .concat((a.subjects || []).map(s => '<span class="tag">' + esc(s) + '</span>')).join('');
        const statusBadge = st !== 'active' ? '<span class="badge status">' + esc(st) + '</span>' : '';
        const tagBadge = a.reviewed === false ? '<span class="badge">needs tags</span>' : '';
        return '<a class="item' + (st !== 'active' ? ' muted' : '') + '" href="./' + encodeURIComponent(a.slug) + '/">'
          + '<div class="item-top"><span class="item-title">' + esc(a.title) + statusBadge + tagBadge + '</span>'
          + '<span class="item-date">' + (a.date || '—') + '</span></div>'
          + '<div class="item-meta">' + esc(a.desc) + '</div>'
          + '<div class="tags">' + tags + '</div></a>';
      }).join('');
    }
    const hiddenCount = ART.filter(a => (a.status || 'active') !== 'active').length;
    const bits = [rows.length + ' shown', ART.length + ' total'];
    if (activeSubject) bits.push('subject: ' + activeSubject);
    if (activeType) bits.push('type: ' + activeType);
    if (!showAll && hiddenCount) bits.push(hiddenCount + ' hidden (Show all)');
    document.getElementById('count').textContent = bits.join(' · ');
  }

  function mkChip(container, label, val, getActive, setActive) {
    const b = document.createElement('button');
    b.className = 'chip-btn'; b.textContent = label; b.dataset.val = val === null ? '' : val;
    b.setAttribute('aria-pressed', String(getActive() === val));
    b.addEventListener('click', () => { setActive(getActive() === val ? null : val); syncChips(); render(); });
    container.appendChild(b);
  }

  function buildChips() {
    const subs = [...new Set(ART.flatMap(a => a.subjects || []))].sort();
    const types = [...new Set(ART.map(a => a.type).filter(Boolean))].sort();
    const subBar = document.getElementById('subjects');
    const typeBar = document.getElementById('types');
    subBar.innerHTML = ''; typeBar.innerHTML = '';
    mkChip(subBar, 'All', null, () => activeSubject, v => activeSubject = v);
    subs.forEach(s => mkChip(subBar, s, s, () => activeSubject, v => activeSubject = v));
    mkChip(typeBar, 'All', null, () => activeType, v => activeType = v);
    types.forEach(t => mkChip(typeBar, t, t, () => activeType, v => activeType = v));
  }

  function syncChips() {
    document.querySelectorAll('#subjects .chip-btn').forEach(b => b.setAttribute('aria-pressed', String(activeSubject === (b.dataset.val || null))));
    document.querySelectorAll('#types .chip-btn').forEach(b => b.setAttribute('aria-pressed', String(activeType === (b.dataset.val || null))));
  }

  document.getElementById('showall').addEventListener('click', (e) => {
    showAll = !showAll;
    e.currentTarget.setAttribute('aria-pressed', String(showAll));
    render();
  });

  fetch('./manifest.json', { cache: 'no-store' })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => { ART = data.artifacts || []; buildChips(); render(); })
    .catch(() => { document.getElementById('list').innerHTML = '<div class="empty">Could not load the manifest. Refresh to retry.</div>'; });
</script>
</body>
</html>
