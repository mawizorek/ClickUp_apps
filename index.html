<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAW Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: oklch(12% 0.015 250);
      --surface: oklch(16% 0.012 250);
      --line: oklch(25% 0.01 250);
      --text: oklch(92% 0.01 250);
      --muted: oklch(65% 0.01 250);
      --accent: oklch(72% 0.16 25);
      --accent-dim: oklch(72% 0.16 25 / 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    header p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
    }
    .nav-section {
      margin-bottom: 32px;
    }
    .nav-section h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-left: 16px;
    }
    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s;
    }
    .nav-link:hover {
      background: var(--accent-dim);
    }
    .nav-link-title {
      font-size: 17px;
      font-weight: 600;
    }
    .nav-link-desc {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .nav-link-arrow {
      font-size: 18px;
      color: var(--muted);
      transition: color 0.15s;
    }
    .nav-link:hover .nav-link-arrow {
      color: var(--accent);
    }
    .footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>MAW Apps</h1>
      <p>Hosted apps and artifacts from the ClickUp_apps repo.</p>
    </header>

    <div class="nav-section">
      <h2>Apps</h2>
      <div class="nav-links">
        <a href="app-dashboard/" class="nav-link">
          <div>
            <div class="nav-link-title">App Dashboard</div>
            <div class="nav-link-desc">Full index of versioned apps with cards and status</div>
          </div>
          <span class="nav-link-arrow">&rarr;</span>
        </a>
      </div>
    </div>

    <div class="nav-section">
      <h2>Quickfire</h2>
      <div class="nav-links">
        <a href="quickfire/" class="nav-link">
          <div>
            <div class="nav-link-title">Quickfire Artifacts</div>
            <div class="nav-link-desc">One-shot standalone builds, no versioning overhead</div>
          </div>
          <span class="nav-link-arrow">&rarr;</span>
        </a>
      </div>
    </div>

    <div class="footer">
      <a href="https://github.com/mawizorek/ClickUp_apps" target="_blank">View on GitHub</a>
    </div>
  </div>
</body>
</html>
